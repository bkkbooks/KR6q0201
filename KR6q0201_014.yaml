body:
  text: 嗣法小師淨柱編詩偈二五言律對月懷白僧念屬懷君細宵嚴景亦工一方雲影淨萬里月光通好護北堂草須珍林下風團圞如有語應寄老山翁移菊何處殘秋色當窗復傲然以爭松柏秀因對雪霜妍冷淡宜孤衲疏狂見隱賢許多深遠意如不耐人憐石城送蘭友居士復遊江陵幾度天涯聚雲遊與客遊論心蕭帝寺讀賦仲宣樓世外成千古人間定白頭何難于此別吳楚一江秋同樹倩閉戶真州不期為市隱畏暑息肩輕畫壁秋煙動茶爐夜瀑清豈尋閒學解因對古先生未諳深山理寧知閉戶情立秋夕共嵌石韻懷諸法侶爽氣排空度涼暉迫暮低信懷邀滿月卻意斂長霓世路平難涉名巒險易梯引身招隱谷秋近海門西住天台香柏峰香柏峰無柏頻頻設問端秖因溪蘚滑錯認石頭頑砌冷蛩方鬧林幽草未殘不禁餘習遣常作舉頭看遊新安訪曹白僧一蕊同入黃山徐渭友同曹石葉浙下因贈渭友性情分地主隨往愜幽尋浩渺歸狂譜高寒得隱心飛橈輕與翼理杖迅於駸山水非吾輩悠悠空古今贈月涵二首廢燈空籟後啟幕信生平止水光能發頑虛性可成虧盈存至理黑白寄浮情霜重寒梢折一聲棲鳥驚精霜復嚴雪寂照亂雲平已許愁心寄還期淨業成晝光謙爾德秋氣浩吾情深岫梅胎結無令蝶夢驚立秋警眾草木接秋氣雨餘開竹扉扶花憐我道聽水覺前非白日靜於夜纖雲涼似衣無為山好住向便逐時機和答博山雪關禪兄原韻把茅既已蓋隨地復精藍插草一何易拙鳩殊未諳憐時初放菊清露正流甘深愧癡憨夢綠蘿空自菴入閩紀遊此去如招隱迢迢一老僧仙霞知嶺峻南浦挹波澄買渡懷船子登臺弔子陵一絲千古意離釣道誰能初春即事寄懷京臺王居士祖道春寒色遮遮猶在衣雪峰雲影亂長慶梵音微卻喜殘梅吐偏憐野鶴飛懷君還惜別未忍便言歸答黃井門居士謝茶韻偶攜身作客無語制三關茗碗方招隱詩筒已貯閒女蘿墻角外玉磬響餘間一點衣光白松燈獨照還雪峰元旦試作初生看山雞忽地鳴有峰先沐日無地更沾情保子能如赤求心不待誠夜來聞杓卜必定是虛聲答林有道居士原韻極目望何賒行行更結跏息心孤夜月耐眼澹秋花慧業蟬聲噪餘生峰影斜家風偏寂莫招隱愧袈裟喜陳孔端同鄭天御夜過靈隱寺相攜踏黑月遊覽得其神寺古傳燈遠僧貧款話真杯茶三刻飽疏雨一番新問到無心處超超物外人方賓侯居士先夢入雪峰及至一與夢中無異因贈交遊迥不雜選屐訪山僧目引秋空路心持臘月水山門相見了堂奧夢初徵一一生前境雖虛卻有憑同陳五臺希節二居士中秋夜話爽雨三日後對客當中秋不語朗天性或言消茗甌澹煙摹月去清露逼人流徙倚更珍重千峰峰上頭答林羽仲居士見訪韻且煮雪峰雪無論前後身煙霞開夢幻星月近天真片語投深夜杯茶試小春不辭酬酢禮為結再來因再和答翁公若居士客來無可待絕頂一閒身試問人間好何如我意真荷鋤三作禮倒屣一回春有興同懷古先應結淨因和韻送翁公千居士歸三山交理薄雲氣情真敬老松福田耕夢筆慧業掃邪宗語別燈花焰心期春草茸再來能不遠殘雪有餘峰九日絕頂當重九何由復問高捫天能不遠念友覺無聊下視吾安敢凌霜菊自驕折來許可寄插鬢任山樵藍長者名與雪峰大師並美其德可配給孤施德尊西竺神州一給孤王封唐代爵家慶富村圖遺囑言猶在法堂草已多後賢方繼美仍念雪峰無升山度元宵山已隨仙化誰開選佛場從唐推小劫禮塔辨遺香燈續人間火雲生月上光生平幾登眺此度較清狂對燈那須頻顧影入炤不勝情髮白明非鏡懷伸愧獨丁破窗星已散聯榻夢誰驚曉發天涯去修香助短檠遊桃源洞此行非誤入不復記歸蹤葉艇初辭釣花源已褪紅僧無迷路恨樵有避秦風鳥道誰為鑿神仙亦易逢秋夜同永中居士及來雲幻來諸子待月花不拈吾懶如何可破顏拾題人事外得句道情間雲淨依秋立山奇入夜閒鐘敲殘月上餘半在溪灣辭雪峰日寄懷王東里總憲擬寄雪峰雪毬門路不通兩番雖覿面千里但同風夢卷煙雲外懷伸杖履中昔年王太傅指缽定降龍從九龍入靈山寺欲療煙霞癖先憑佛祖嗔臨奇應冒難涉險在無因三峽夢曾幻九龍舟未淪挂瓢山寺小問法喜無人柘浦值筆山費明府貽詩和韻奉答度嶺衝雲腳晴風拂路塵崎嶇非世理蕭散任吾人交淺神先合機投話轉親相攜推出處家國與心身示休山龍門無宿客爾獨愛休山忍俊看雲幻安心傍石頑蕨肥克一缽茆短縛三間不逐春風暖寒爐古廟間立秋聽月寂寂先秋聲雜以微蟲鳴遶砌聽何極轉轉成淒清仰天發孤嘯怒者其誰生扣所以聽者月擊空潭明龍門山十二景半山亭信是來時道忘來知幾年澗分蠻暑外橋度早秋邊瘦策支還歇枯藤斷復牽躊躇當進止崖背一亭懸九曲嶺一歌登一曲汗漫不為遙逼面雲連石過頭杖沒腰竹疏生就懶松老養成驕鎖得溪聲住流泉不可招石壁土地伊誰懷巨靈一削開青壁老樹已栖神岑樓方篆額蛟龍信有門狼虎豈無宅樵牧所避趨願言仗威德鸚鵡峰名自何年命凌風勢欲飛無情能說法有恨復誰歸立雪懷西隴披雲學舞衣老僧禪定久爾亦竟忘機積雪泉洗出泉如雪玲瓏石罅中神功歸造化古跡見宗風照影誰無愧論心我未空難將妖怪膽似鏡得含容釣嶺霽色添飛瀑山僧徙倚時宜亭茆未剪擬釣竹先垂負命魚難得直鉤人正疑何如捲絲去名利不吾欺千丈崖孤危成久立一嘯振崔嵬鳥已銜花去猿難摘果來風雲磨歲月草木避塵埃小劫論初闢龍門自此開伏虎洞曠劫虛巖腹乘閒幾度登石頑疑伏虎洞暖合居僧不羡桃源好誰矜避世能更無煩結搆隨意捲蘿藤瀑布山無五嶽勢瀑掛一天虹雨過拖銀練風回挽玉驄滄洲歸浩渺帝座復靈通臨下登高者翩翩氣自雄石關石關僧似吏難禁採樵人恐趁銜花鹿還嗔主樹神淒清扃碧岫離亂在紅塵宰相無何宰煙雲經濟新雜花居偶搆藏經室山推此最幽雜花因聚散野客為焚脩變豹屯香霧飲牛歸上流當年李大士棗柏味堪求龍潭菴奇哉絕巘下每聽老龍吟鱗隱終難測潭空不可侵傾珠飛夏雪激玉寫秋琴上有尋源者禪安活水心甲申除夕逼近干戈歲人間夢不賒雪殘遮忍草春信報燈花談理何妨劇推心未有涯團圞聯友義不盡在杯茶乙酉人日硯拭隔年塵尋歡一試新羊朝剛積雪穀日始逢春屈指推前事伸懷想故人天涯多半在記此最靈晨春杪得曹白僧居士詩札依韻答之世路窮魚澀難禁海亦枯山空一病叟藍載幾門徒春月雲非淨晨燈影欲孤寥寥長夢裡子得獨醒無中秋苦雨乙酉一雨逼中秋況當多難日濕煙揮涕眥薄粥委飢質鼓戰轟溪聲兵交迸岩石月淹霄漢間僧亦誤良夕除夕贈適園主人是處靡寧日憑舟去若雲村深諸籟遠別業一香焚雞犬能無恙干戈付不聞未疑僧乍到卻喜歲將分丙戌試筆試筆先書吉無文莫問奇未堪銘座右聊且命詩題觀化臨池得占眉拂鏡疑志言俱有待趨避總相宜元旦用除夕韻二首春風初醞釀曉色護新雲園乃澹於古梅唯爛若焚履端端不俗卜響響何聞所願還明霽乾坤豈易分春與精華惜寒香復凍雲鶉衣僧尚結木佛許誰焚乍可離聲臭殊難遠見聞何期冰雪外一徑小橋分過陸菴弔楚石琦禪師遺蹤靈骨覓還無晝清啼夜狐殘碑摹碧蘚敗塔禮於菟大塊皆遺跡荒村一徑蕪徘徊青篠下翻惜老松孤夜雪示定嚴百物嚴身具心從何處生風吹柳眼大雪打竹頭輕啜茗推枯定脩香集夜晴雲中還見月月窟更誰明螺髻齋丙戌春居適園所搆屋如螺髻聳斜倚高花枝拜舞竹風細飛騰魚浪吹異香妍蘚徑苦茗啜微思儘力排春夢仍歸夢醒時菩提山雲萍兄壽日妄作彭殤語如何舉壽觴花枝春過半山路晝初長寂養沿流地閒超離亂鄉菩提果無樹時至亦芬芳機山錢太師過訪華藏菴原韻答之杯茗推名理無能話別傳懷深聊借問機契豈期然短棹垂楊外安車落照邊道人離合意多半信前緣初住佛日柬三宜兄翻思茆屋下日用不多忙地掃三苕帚爐供一炷香放參雲闃寂請益鳥蒼茫此意誰同得詩成即寄將佛日十二景向上菴每從公事暇便入皋亭間結屋貯遐想安心向上關苔花寒古砌天籟杳空山更有通霄路人何去不還尋本空禪師塔持帚覓靈骨雲波煙浪中風生猛虎氣草沒象王蹤掃石石無語問樵樵徑空我師名自達佛日豈朦朧黃鶴峰仙人事飛舉黃鶴化為峰禪室開初地明珠鬥二龍雲深丹灶冷霜重藥苗空會取西來意無情話始通渥洼池渥洼所以名怪石臥深清學士言猶重龍駒勢若獰藻荇生古鬣日月轉雙睛聽法魚曾化聞雷此弗驚悟道松趙州指庭柏明教種蹊松掩映亭橋外婆娑古寺東驚心鳴竹翠照眼露桃紅觸處能緣會言松悟亦通仙姑洞曾聞有女英采藥事仙行髻挽山花秀裙拖雲練輕深違閨閣夢秘養太玄羹歲月藏來久唯存古洞名石鼓亭西蜀有靈桐皋亭虛石鼓張華試一鳴佛日傳千古杳杳征途間淒淒問渡苦只知山塢名何不尋山譜蓮花峰西盻入林杪天中湧石臺名虛偏有韻形似復何猜拔地一莖起凌雲幾瓣開法空云是座不必坐如來別泉在水必同源分流是誰始幾年穿石垠一旦合溪沚味別胡為奇香芬未足美汲之不可盛性所使然耳龍藏山將添物色不耐隱龍鱗頭角崢嶸日泉源活潑春靈通溪窈窕遺蛻石嶙峋追彼藏脩意為吾擁護神龍洞頑然大塊下何物許玲瓏洞口搏虯樹溪隈舞籜龍雨餘雲吐白風靜霧埋空秉燭遊人意冥冥不測中松篁橋橋上山重重橋下水淙淙已無車馬至未許煙雲封春老斜風竹秋深細雨松不因閒送客誰續虎溪宗聞雪嶠大師訃道大不容偶如顛事獨征憐時垂老健易調譜新聲菊綻秋光重月沉霄氣清一林霜似洗山水謝閒名壁觀石影像有引大師面壁九年影射入石儼如墨蹟遠門首座以續燈元走少室用紙描歸眼鼻宛然此非測度所能知也格外提撕誰是其人持來呈舊面千里一何欽不是三光影分明九載心癩腮癩石入碧眼碧苔深莫作尋常看尋常何處尋五言古雪後獨遊耿天台先生天台山絕頂洗新青竹杖直取台之顛一步一遺世兩腋雲翩翩諸頂雪方霽於彼何凝然澗杳裂山色途窮每願還忽然響猿嘯引藤躡其玄一塢若天設寒犬遙迎宣人也居士禿不佛復不仙一宿理微徑回首迷曉煙俄耳躍而出宛然空處天周目渺不礙晨星納袖圓古跡鮮難覓蝕以枯蘚錢近代有先哲以山得氏焉脫冠隱其意題崖撐數椽況多浣其石粒土俱為田有岩可留月有池堪龍潛一葉觸其水晴空噴怒涎須臾雨漫漫須臾雲綿綿雷洞雷吼擊風洞風盤旋榜石曰試心心散者不前曰關曰了心未了者何緣吾欲挈同調力耕民其衣可以忘歲年投老七十二賢峰下我鄉無雲巒拳石乃如寶所以五嶽遊孤笻費鞋草歸老西谿梅溪與山相抱七十二賢峰朝暮可尋討俗人不願來願來幽士少何處是他鄉對此永為好題醉茶菴贈念庸菴主意思道忽絕醒極卻如狂所以趙州老一言千古忙主亦何攸往明珠嘗自藏長夜棲遲者寧辭驚異光解酲既須酒茶醉非荒唐不息參尋客長安在路傍再過橫山越嶺問遠嶂乃作平林行松竹塞古路幽尋邃隱情苔蘚足階砌溪澗何淒清屐痕不忍躡忍縱車馬聲引策歷重賞傑閣藏契經鏗爾發鐘籟深理超淵明塵氛久橫絕橫山所以名先是雪關禪師訂遊西禪不果華雨監院復同眾護法招余余至賦贈華公生愛遊名山心期遍區宇無奈杖頭何處處風霜苦山隨溪水深嶺入梵宮古所以入嶺人每憶玄沙虎首謁長慶稜蒲團破堪補百鳥啼殘冬單衫笑欲舞地暖海風和吹雪化為雨雨石亦雨花一喝定賓主庚辰夏杪天御鄭居士飄然來數宿而去書扇送之雪峰亦人間人乃不可到有客騎天風素影造玄奧暑氣辭衣裾寒雲信風掃重岩驕虎狼法窟恣荒草我聞跫然音一嘯輒傾倒采芝作香糜汲溪浣懷抱懷乎不可留指向來時道懷鴛湖禪兄雪峰作本是故鄉人同為異鄉客客路何參差一得復一失得者全節名失者信狼藉蒲團補愈穿毬門路愈塞賴有望州亭引領慰朝夕每見非其人中心轉抑抑三界無歸期唯期共加食沈槐庭居士生西實錄人生浮雲中昏昏長自蒙智者覺其幻一月光乃通愚者逐于水而尋來去蹤非愚亦非智問彼槐庭公槐公豈無來來兮水所宗槐公豈無去去兮水所窮水性辨消長月明隨異同既已知時至生方即有據覺號口應心貫珠手應句嗒然喪其綠倏然犯其忌良哉去住情示彼兒孫意相將眼共瞞一喜復一懼親友亦見聞何不玅于契胡然爾為爾胡然譽為譽我贊贊槐公槐公知也未武夷紀游二首披緇廁水雲願言羡肥遯名巒信衲衣奇嶮遍幽振入閩胡為哉三年僅一問款款潭之陽好友事玄論買楫聯游心復為春雨禁從者亦累人孤錫不容震日夕連霞光百里自囚頓病逐霞氣生一策夜中奮明滅星影低武夷乃在近巀嵲縱玄賞游次不欲工按圖非所願靈絕情已鍾手摹碑蘚碧九曲歌晦翁佳此善棲託妙與仙佛通層層捫仙掌天游豈無蹤雨氣吝遐矚凝意開晴空忽復雨如注歸臥舟自從雨復不為苦被笠搜蒙茸垂垂二三子扶蓑頗未慵指顧了不俗歸記相奏功壬午仲春作示范濟美居士人生天地間不知來所自茫茫幾十年去復何止至試于二六時反覆靜以思思不出其位下學以達之不達世間理安知出世書回觀頂至踵一笑當何如不爾第二義令勿信爾意致身清寂間看心當動處勿遏其不萌勿慮其不寧常念夢裡身與醒唯一靈夢時非無有醒已不能守應知醒所持至夢亦徒手夢醒同大夢吉凶人所共誰能一體觀趨避乃自重攝心于一經此乃避之精攝經于一義此乃趨之明譬之登絕頂一覽小眾景萬山拜其下煙雲任馳騁譬之臨濟水濟澄月斯美千江千月輪得一無此彼來知其所來去復何徘徊長空雲影靜廓然心鏡開游五洩初渡廿年游五洩漁浦得初渡臨浦江更幽食乞秋田富潮下魚蝦多稚子泥沙臥棲真寺裡僧袖香踏江路日暮肩輿歸說法因茶故茶醉人心醒達者妙於悟世界總不寧此何獨安坐奮此游山身竟若桃源誤入洞巖紀遊落葉驚杖履發我十日遊沿村正登穀瓢笠資晴秋積此廿年想擬一舒雙眸雙眸不足仗張炬開冥幽吁嗟天地裹天外誰舉頭復何幻空洞索隱垂玄鉤捫壁洗題字闢荒追蔣侯宅捨袈裟地不下祗給流挈妻裹糧去千古何悠悠往往踵其跡深嶮安能求或遇興敗返或畢窮日搜水隔深不測小隙煙氣浮忽忽附蛇鱉忽忽委馬牛百怪疑海市黃昏開蜃樓獨見天池徐志怪詩尚留不得袁石公文章覆甕休二子不可極欸乃聞江流我亦覓歸路魂夢殊難收五洩撥朝露遊侶興愈遒端午後三日柏子持象田書至因寄諸禪士孤燈忽自語晨鵲噪重簷復省夜來夢有因豈無緣苔扉向空寂此際誰垂涎或者迫於憤或者發於顛顛此乃為正憤此乃為賢盥沐禮黃面幽事非空傳剡上舊遊集染思多象田寶泉及蒿芝清夢猶拘牽草木澹生計鳥獸深雲煙一自飲苕水忘來不記年邇聞異人樹結影枝葉連枝葉所未貴心腹奚相憐心腹是何物哲人玩其先其所以玩者勿謂玄復玄言路不可繼意思徒蔓延明明一切境逆順何淪漣苦實不可逭觸目溟渺焉此時捫鐵壁銅牆覷應穿所以從門入最上長棄捐況當劫小濁一覽眉鬚攢丈夫別有淚途窮呼蒼天呼不再三應響寄空谷全神氣為虛化斯理胡無嫌試觀化化時殊難洞源淵如有所立卓旦暮遇始圓壽崑石馮居士六十偈我從寶壽山來住佛日寺不慣提綱宗何曾唱玄義攜笻黃鶴峰翩翩挹仙意忽逢檀施家眉壽方開際庭前多桂蘭偕老有伉儷百齡考會歡五福箕疇備貞下而起元歸根而復始所以耳順年恰與圓通遇如鏡與鏡涵光輝自相契處世世不羈出世世無繫周全乎兩間團圞乎一諦華封三祝優岡陵半偈記記復何所云寶壽閒家具拈出大家看賢峰七十二喜嵌石澹然二兄至癸未春作友道茲已忽所珍良在僧僧無情雲浮耐久來遠朋千里神自接命杖何騰騰閒林春正好蘭氣不覺蒸其二片言不易盡杯茗不易軋可以徵我道不羨空盤桓事存毫髮細理進百尺竿從此慎輕別天海何足寬其三舉論別無客雨久愁亦安採芝候新霽貧計聊為歡楚歌正楚楚春夢方酣酣但得每聯席安能愧素餐其四世界入小劫骨肉亦星列吾輩喘息餘何以慰時節平生空花交還願空果結所以憐我痴我痴笑不歇嘉興府嘉善縣聞子淨覺捐貲貳兩平湖縣弟子陳智谷王智因陸智元陳智遠趙智日各五錢梅智果陸顓奉各參錢仝梓
