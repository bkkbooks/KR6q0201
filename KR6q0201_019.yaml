body:
  text: 嗣法小師淨柱編佛事雪峰掛鐘板擊板一下曰八百年中祇是者個千五百人向甚麼處去也若論兵隨將印馬聽鑼聲也須各各有出身之路始得出不得山僧為你出去也乃擊鐘一下寶壽挂鐘板舊日規模一任梅花連夜發斬新條令豈容客子帶春回銅頭鐵額的到此也須重鍛龍馳虎驟的不妨依教奉行今有密言有誰唱和良久曰無則仰勞二上座去也遂擊鐘板為沖天開關三載黃金應失色一朝瓦礫自生光禪和特地來相接一句明明為舉揚乃舉鑰曰個個頂天立地為什麼被者個轉卻沖一喝師曰恁麼則更勞彌勒重彈指去也為瑞峰開關從門而入不涉程途從門而出豈離當處何用山僧重添注腳師以鑰畫此相曰三年暗裏添秋色一日清香菊滿林為來雲封關我手何似佛手露柱忽然開口我腳何似驢腳卻被燈籠道著上座生緣在甚處碓觜開花春又去大衆昔日黃龍禪師以此三關語勘人自古至今聞者各各藏蹤斂蹟今日山僧舉出莫是要封上加封鎖上加鎖麼良久曰欲知華藏莊嚴界且入微塵一點看為妙天蘊空封關化金牛飯不齊羅漢僧煮趙州茶懶作人天福腰包頂笠渡錢塘安心欲寄雲門足雲門因我不留情移笻更向清涼宿清涼山甚奇特不離紅塵高突兀忽憶騎獅看母人依稀尚有苔封跡就崖茅屋起三間隔斷紅塵喚作關有人問及關中主指出飛花共鳥語知見何須妙入天諸蘊空來不是汝不是汝倒跨文殊鐵獅子鐵獅子且置畢竟如何是封關一句乃舉鐵鎖曰鐵上座與諸人道了也喝一喝遂封為來雲遷關天華關不住雲門住不關聖凡無限意截斷在其間大衆且道如何是其間的意噫只尺不見他家事遍界無藏汝不干推來雲為監院開關入門不是藏蹤出門亦非顯跡若道不變隨緣猶是當年氣息饒你隨緣不變不妨等待他日且道如何是今日事良久曰腰纏莫惜衝寒去背負休辭冒暑回為隱明開關銀山鐵壁黃金失色淵海空天光生瓦礫若是密移一步看飛龍個裏依然無出入有出入畢竟以何為準的乃舉鎖匙曰看看且要勞他一臂力為尸行芥城封關海闊天空智者不居鐵壁銀山愚人不識然則如鏡照鏡不妨者邊那邊死限之心既固活埋之念須堅雖然欲知此話行須看三年後為正衡開關若論盡大地是個關房本無出入只因迷故關上重關亦是迷上重迷之意今人只思尋悟全不知迷既不知迷悟從何得所以老僧常向人道迷有十分悟有十分今日開關豈屬迷悟大衆聽取一偈有出入無門戶無開掩有封固若是香象截流機終不從他覓頭路乃舉鎖匙曰且道者個是甚麼試開關看蒼龍峰新建山門祝語蒼龍飲碧潭千古飲難乾放行兼把住來往客心寒宗乘中道無門為解脫之門教乘中道開廣大之慈門且道畢究從那一邊即是乃卓拄杖曰且從者裏入掃散木老和尚塔爛煮石牛頭活烹木虎尾供養不將來將來不供養大衆先師有伴也先師來也且道那個是伴舉數珠曰莫者便是麼噫無縫塔前無影樹果熟香飄劫外春遂展具曰仰勞大衆同聲回向掃靈雲祖師塔人見我亦見飛花如血濺昔日鷓鴣啼春風為吹斷斷不斷古月峰高事可疑從今掃破春風面喝一喝曰禮拜看掃九峰慈慧禪師塔溈山一脈天涯不隔會得此意峰峰秀出不止於八終不至十但能千里外逢師鳥語花香看今日咄掃升山道希禪師塔春鳥自語春花自紅古今有異仙佛同宗雪峰道絶玄沙路通咦平高就下承渠力山化為龍若個逢掃長慶安禪師塔讀無字碑知音罕遇禮無縫塔作者難逢不如撮黃土香作女人拜也圖個開山可報祖道重隆且道如何是重隆的意良久曰不須今夜明星現踏著源頭水自通掃玄沙備禪師塔我亦當年腳指破塔樣分明呈者個師不出嶺我不入世人擬說兩何故偶然踏斷偃水聲百萬人天俱見過昨夜黃犬吠大蟲侍者從今不回互亦回互解道原來不是你咄自此兒孫更莫疑個個疏通石頭路掃長慶稜禪師塔家家逗到清明節處處骨堆都迸裂獨有西禪長慶寺低灰化作白蝴蝶顧問大衆曰又向甚麼處去也各禮三拜看掃古靈贊禪師塔境寂山空百丈家風唯師證得歸報師翁無聲三昧末後路通大衆且道如何是無聲三昧噫青草凄凄沒不得鳥解啼春花解紅掃雪峰真覺大師塔奯竹森森柳枝曳曳掃出全身見聞即別望州亭相見了茶傾三奠不為多烏石嶺相見了香爇三枝不為少僧堂前相見事如何還讓再來藍長者且道以何為證不見余中丞道輥得毬兒是雪峰掃鼓山晏國師塔有來由無縫罅不堅久難敗壞分明寫出秋山容祖師靈骨難遮蓋卓拄杖曰好遮蓋他家有路通霄外諸大德還有把臂共行者麼良久曰且回向看掃雲門先師塔煙雲冬夏花鳥春秋有恩難報有怨難酬若道石傘峰依然突兀若耶水仍舊東流且喜未見先師靈骨在還要見先師靈骨麼良久曰不見道祖襧不了殃及兒孫喝一喝曰回向掃天衣懷禪師塔往昔曾挑水一擔兩頭脫傳得雲門宗我來為掃塔一掃葛藤窠一掃秋風葉噫祇因埋沒本空蹤至使吾師今受屈良久曰屈掃皎律師塔不舉宗乘不拈經教昭慶登壇暫時顛倒歸來擬欲露全身塔頭無縫埋荒草荒草枯蛇足多掃除一句問如何大家齊念薩婆訶薩婆訶且置不知塔還受掃也無師以坐具打一圓相喝一喝回向掃具足禪師塔克聖淨賢請欲攬青風以為帚朝雲掃卻暮還有欲撮黃土以為香山自高兮水自長汝欲克念以作聖以德報德非究竟汝欲淨意以為賢知恩報恩恐未然汝欲我為作方便遂以如意畫一相曰一切存亡此中見若是具兄嫡骨兒定應著眼急須薦若不薦作麼生成得個掃塔事良久曰不見道寶印當空錦縫開即以如意打聖一下曰後句也須你自道始得奠瑞白法兄塔挽青雲而作拱撮黃土以為香法門之理如斯兄弟之情何在不得已倒拈帚柄一掃寒空若掃塵不掃塔恭而無禮掃塔不掃塵同條生不同條死塵塔俱不掃爭奈白浪滔天塵塔一時掃且道我師兄靈骨在甚麼處欲知他日龍華會且續開山一代憕封爾密法兄龕巍巍堂堂輝輝煌煌出不全露入不覆藏打開玄路掣開金鎖欲助殷勤實傷我股賴有後昆交參鐘鼓鐘鼓聲何凄楚休凄楚雲門門外更封雲且看回互不回互為久默禪師起龕獅子出獅子入全在獅兒奮迅力雖然有手大家扶不勞動著纖毫忽大衆且道既不許動如何說個出入的道理咦海神不貴夜明珠信手撮來當面擲封塔日中月夜半日會得者萬里神光不會者惆悵何極太湖南方山北莫道此中無縫隙倣佛栽松當道青依稀字刻碑文白舟藏壑山藏澤天下情知不可藏祇貴瞞人雙眼黑衆中還有不受瞞者麼良久曰莫怪早秋涼都緣風雨急供佛日中興十二代覺靈齊呵呵者一隊老漢開山也是你中興也是你今朝鼻孔頭卻在我手裏顧衆曰還有與祖師出氣者麼賓則始終賓主則始終主祭金臺掄法師塔佛日既重興不能逃定業今日纍我來一一為公說且道說個什麼乃顧彼眷屬曰孝子與賢孫大家在者裏行知山封龕善行知山汝聽我言我來汝去六門緊關更須封固矢上加尖噫若要光輝前後際無過末後一堆柴澄源耆舊火曾以賣墨為行腳澄源老澄源老天下名山幾遍了不尋朋友不尋師不為參禪不問道隱向天華十有年晨昏惟數自家寶且道如何是他自家寶良久曰妙品極品大國香寥天一金不換莫遮便是他自家寶麼昨夜一時分散了直須貶向無生鄉也要天華重煆好幻虛禪人火時當雷雨乍歇虛空幻出無本性本性幻出無虛空霹靂一聲雲散後乾坤依舊月明中更有截斷聯纖一句仰勞大衆共送雲程安心禪人火盡道虛空突兀誰知大地平沉雖則名曰淨息未可號作安心乃舉火炬召大衆曰山僧欲煩者個上座送彼一程得麼擲火炬曰切忌攢頭入此中海火頭火一向你燒火今日火燒你但得火性空你性亦復爾海火頭會也未一陳無風波浪生智海雖深終見底尼僧火八苦交煎一老尼業緣了卻是歸期聯纖唯有髑髏在百煉精金略較些從此去莫狐疑欲識路頭真實處夜半烏雞焰裏飛俞宗明火臨終剃度沙彌身居士相三年已前絶較量忽然今日春雲生青天何必重遮障妻淚泣母淚泣一一為伊俱剖析且道剖析後一句作麼生從教爍盡無明火切忌西方祇者是遂擲火炬曰失玉函禪人火昨夜白牛臥深雪曉來有眼難尋覓迷時從此迷悟亦從此徹迷悟不相關撒手便言別大衆且道他路頭在甚麼處看取火聚婆羅門分明煉出黃金骨咄嗣南容公火白雲坐斷已三年頂後神光此日圓歷代祖師無巴鼻黧奴拈起一毫端恭惟嗣南容公一生操守精嚴末後孤峰獨宿若是今日靈龕自舉性火自焚無以慰彼高足孝思故特邀我山野聊借勝熱婆羅門火光三昧為津送之資且道津送一句如何舉揚擲火炬曰會得龍門無宿客誰分東土與西天勝蓮禪人火秋風清秋雨頻大地從今絶點塵臨行切莫輕移步乃舉火炬曰此個西方路最親且道路頭在甚麼處遂擲曰也勝蓮花足下生完修禪人火完修既以修完大衆作何話會若作末後商量莫惜山中柴貴咦一堆烈焰亙天紅道火須防燒著諱達之禪人火達之達之人謂你死我謂你生人謂你生我謂你死不是我不順人情只為你本來如此不如此青山雨後青達之在何處若道者個是松聲戚戚若道者個不是澗響凄凄噫總不如個丙丁童照破神光千萬里敬泉居士火草凄凄煙沒沒春復秋夏復臘分明指出是俗是僧又誰管你非生非滅擲火炬曰咄一生疑慮從今徹無說禪德火一念萬年萬年一念放過石火遺下閃電恭惟無說禪師一生竭力叢林頭目髓腦俱捨既植無漏正因必登無漏正果唯是兒孫孝思特請山僧舉揚末後一句聽取偈曰不假靈犀一點光情知瞥見我清涼今朝攪動無明火東土西方總道場乃擲火炬曰咄智憫火葬考妣雲棲一胍西方路通生前歸命死後遺蹤有子出家世孝匪同晨昏參叩父儀母容再三哀懇寶壽石翁無明一舉燒破太空眉毛猶在付與丙童喝一喝曰回向鷲林勤舊火白雲漠漠流水淙淙雲程迢遞木落林空鷲林公鷲林公破家蕩産安寧後捨命忘軀始見功雖然若非末後光生未免終成滯貨且道如何是末後光聻勝熱婆羅門惡發撩取眉毛過別峰靜虛耆舊火秋風蕭蕭白雲瑟瑟生名靜虛死稱其實向上一關恐汝未識大衆送汝莫留朕跡擲火炬曰咄心量庵主火青山寂爾緑水悠然生滅既滅寂滅現前路頭入手便擬爭先莫爭先烈焰亙天燒不盡一任人來看九蓮咄權厝嵌石兄佛事浮生如寄人所共知死亦非歸阿誰委悉且道今日將我嵌兄權厝於此畢竟圖個什麼婆心最在流連處水盡山窮卒未休具足禪師入塔生於越長於越股為療親刀見骨清道橋邊露夙根若耶溪上連枝脫遊剡溪住香雪拖泥帶水藏真說惹得兒孫逐隊疑今日分明都漏泄不漏泄無底鉢盂誰動得噫若是師兄滴血兒會取當陽遮一掇清池兄入塔分明一派清涼池幾度曾經劫火炊此物至今終不壞耀地輝天也大奇乃舉骨曰且道是什麼物與麼奇特遂擲曰大衆普送看靈鑒法師入塔舌頭有路不難尋轉入臨平路始深恐或賺人思自覆層層無縫復森森為宗明入塔時雷雨方息死不盡燒不盡霹靂一聲天地震天地震塔門開眷屬何須復舉哀咦青松依舊青如洗翠竹重重翠莫猜為淨坐送母明悲入塔母以大悲心生子子已出家子以大悲心送母母已苦拔雖然直待子母情忘方可入此無縫寶塔且道無縫塔作麼生入坐曰無縫塔且置某甲母親畢竟在什麼處師擲骨曰行到水窮處坐看雲起時靜安入塔有妻已為尼有子作沙彌故鄉情已盡何得更言歸風凄凄雨凄凄江北江南事可疑山僧特特與伊決日出三更未是奇乃擲骨曰咦定生禪者入塔無縫無影撐天拄地生決定生住實不住即此非此好個入處咄煙鎖雲門幾萬重不須回首頻頻去尼淨輪入塔若道是一堆枯骨又是淨輪尼若道是淨輪尼卻又是一堆枯骨他既赤體為人人宜全心委悉更要彼此利益莫待平空一擲為甚麼如是不見道迢迢與汝疏切忌從他覓為界如入塔死不盡燒不了去不得住不好無縫塔一時倒末後句莫尋討五番服毒達磨心爭如者個無煩惱乃舉骨曰且道者個是甚麼昨夜月明雲散了達禪人入塔出得者個入得者個不出不入當面蹉過欲不蹉過須是者個師指山曰為甚麼虎山缺了一塊衆回顧師擲骨曰達之向甚麼處去也良久曰六月炎風吹不到解轉身來能幾人為盤銘弟入塔盤銘弟盤銘弟爾謂我生忙我為爾死計我生既有所爾死亦有地畢竟問盤銘即今在何處若道此即是此內無盤銘若道此不是此外無盤銘好山不自秀好水不自清一曲兩曲無人會囀作迦陵頻鳥鳴於今不是苦吟聲咦依棲尚有石田熏千古為君作證明為法雷送母淨緣入塔白雲無跡緑水有源二俱不住誰是淨緣會得者男相女相悉歸安養不會者無縫塔裏暫爾偷安且道無縫塔又如何偷安昨夜花枝零落盡曉來依舊北風寒為有道夢期入塔桃紅柳緑盡是髑髏眼睛不勞左顧右盻日暖風和盡是亡靈神識何須說出說入到者裏直下會得無縫塔豁然大開如或未然春風昨日通消息鳥語枝頭指向西咄法平座主入塔是法平等無有高下此是法平座主一生講不了的公案今日要山僧與他了卻聽我偈曰生同大衆死同大衆塔頭無縫大家相送大衆既是無縫如何說個送的道理良久曰試回向看顧養心居士入塔雪滿乾坤江山一色色即是空唯君委悉生前奉素養心末後全歸子德大衆既是子歸就父為甚父全不顧良久曰但解早翻身何非極樂國咄為太常葛屺瞻居士點主山高為筆水長為墨先生之風描寫不及其天道也天何言哉其文章也文不加點雖然湖南夫子成千古風月依稀任主張嵌石兄入塔天無私不蓋地無私不載獨有者著子至公而無外恭惟嵌石明普師兄生緣在楚出家於當陽之青溪參訪適越受學於雲門之顯聖行道入吳駐錫於金澤之雲關總不出者著子的威德其間風霜雲水冰雪叢林潔身也畏五色糞之染污嚴心也學三無漏之精備譬諸美玉不過無瑕譬諸青天但能絶翳如我嵌兄帶水拖泥和光混俗末後又有酬還夙債之風流不食周粟之標致可謂世出世間道誼朋情無所不被者矣大衆我嵌兄既有如是作略山僧何故與他燒作一團煉作一塊只有東村王大老挑柴過唐公嶺忽然一擔兩頭脫卻向寶龍橋上高叫曰悔悔雖然如是我嵌兄一世清高又豈肯向俗人口中取氣且道如何是他清高處大家聽我一偈鑿石束虛空虛空入方器同條生不同條死喚作巖頭末後句送骨曰咦栖煙盤銘山鳴同入塔常寂光土凡聖同居土一手遮攔一手揭露棲煙盤銘山鳴三位覺靈既已共命同船從此不須回牙要回牙同氣相求同聲相和擲骨曰陊移寶壽舊普同靈骨入新普同塔如來禪祖師禪盡付春風二月天東雲水西雲水鷓鴣啼落花飛去衆覺靈且莫動雖然不食空王俸也要大家知奉重擲骨曰送九蓮庵主入塔朝九蓮莫九蓮今日晴明色更鮮雖是春初行夏令臘月曾經火裏看百尺竿頭開別徑密移一步絶聯纖爾等徒衆還知路頭麼良久曰蒼天蒼天鷲林勤舊入塔昨夜雨聲滴瀝今朝紅日西沒送者妙用無窮亡者神通叵測山僧有語叮嚀野鳥枝頭唧唧凡聖同居撩起便行常寂光土不勞駐錫只有一尊無縫塔動著依然入不得且問不動又如何不見道海為龍世界天是鶴家鄉遂擲骨曰咄為大和長老魯菴居士同入塔臘盡春回青山雪布虎咬大蟲一個兩個緇素同途有過無過噫看他直入無生土乃以拄杖擊三下曰露
