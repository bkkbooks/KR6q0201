body:
  text: 嗣法小師淨柱編法語付法偈無付即有法有付即無法有無付有無付有無無法示唐祈遠居士參禪到無參處始是參有得力有省但屬想邊收是明白路亦是門須打無門路處入且道無門路處又如何入若道入了也還見石女生兒麼參參禪到昏沉妄想衆苦交逼處才好下手不得躲避不得等待待得清間安樂十個五雙要打在無事甲裏故於清安處似得力多於苦難處似退失易然寧向苦難處退到大洋海裏莫向清安處得力到佛祖頭邊還有從大洋海裏下手的麼劍去久矣徒勞刻舟參禪到公案明了處且莫草草急簡點山河大地明暗色空身心世界衆生諸佛有毫髮許差別也無逆順境緣有毫髮許留礙也無參到自己明了處亦莫草草急舉個古人公案看一則兩則至於千七百則有毫髮許差別也無三乘十二分教有毫髮許留礙也無於此二邊合看分看橫看豎看看得腳跟穩貼貼地不妨著草鞋行腳若遇著沒個面目漢把住要津透不去掇轉頭來上大人丘乙己從新念起方有些子丈夫汗臭氣莫局定自己有夙根無夙根必遠得必近得但限一刻立一時萬不得已流至第二第三直須念念如初及至到家説個太近尚爾隔津況遠乎哉居士字祈遠則遠在目前且問目前無法又作麼生撥開寶壽山頭浪揚取苕溪水底塵示金曼庸居士凡學道人打頭切忌分儒分釋要從自己不明處發心便無許多是非畔岸即發心不在廣學見聞不在避喧求靜所以道此事在穿衣喫飯處迎賓待客處舉心動念即不是也請看不舉心動念賓客如何迎待衣食又如何穿喫於此徹去儒不能拘佛不能束可稱過量丈夫士曰我於此似略沾味道余笑謂只恐不是蜜是蜜也大甜毋自欺焉示晉朗旭天欲朗野水先明俯仰優分融然忘謂此功奏之極玄導達之遒邁也在晉之上九當伐其私如禪者之治心勿以纖過而存之雖然獅子搏兔頗費全力亦可吝也示竹虛三冬養就一旦干雲亭亭直上終不倚墻傍壁者竹之性也枝葉婆娑隨風搖曳根本不動者竹之韻也外實中虛首尾有節獨見知於君子者竹之品也今子字竹虛應具此性神超物表受世外之風韻立衲僧之品節庶不虛此字矣示秋萍秋風萍浪淡泊江湖辦道高流殊堪受用一任春回草末鳥囀花梢而寒暄無變矣無變隨緣剖微塵以出大千經卷納須彌於芥子此秋萍開士之轉雜花也木蛇為祁季超居士所得以偈贈之有敘木蛇子打風打雨不曾打著些子即有一二見而死者久矣委諸岩壑戊寅秋杪適居士四九初度入山深語數日夕偶爾失手侍者相救勢已入穴不可倒拔因笑曰若欲取之必固與之木蛇子蒼天蒼天而已唯偕我處者十有餘年矣羞囊頗賴渠逢人接言語可隨優劣機優劣可隨此秋夜挑殘燈寥寥扣知己一擲西風寒蕭蕭拄天地和取寒山詩拾得祇者是附祁季超居士復語昨見寶壽山澄浪千尺偶爾涵泳誤觸香餌被大師放出無影木蛇彌天開口擬欲渾身吞噬雖則不惜性命一手擒下然已遭他毒氣不少矣者個保社為須大家打鬨一場昔日頑皮懶骨未免帶鎖披枷冷面疏情也應搽脂抹粉本是木石野人強作登場傀儡冷地思量沖天怨氣一點深恨萬劫難忘吳山越水同作證明大地虛空無從回避恭伸惘愫伏惟鑒涵示藻雪潔如藻白如雪究竟不知是何物江南聞説有雲門但有纖疑必可決我無玄亦無奧相逢只唱漁家傲更問如何性與心斷拂一枝當面挫也作詩也作偈協韻何曾有文字興到隨腔信口歌記取是名雪書記四十一初度香泄梅梢好禽唧唧初度因緣忽然記憶説是來朝卻是昨日人人有氣出娘生鼻若能摸著一時賀畢書扇示照渠侍者扇面雖醜不可棄渠秋月在照暑尚有餘縱經臘後亦可應機何必破也覓犀牛兒題松菴圖為青林兄六十青青者松神靜而工無矯於夏無歉於冬擬共松老結菴於中聽入耳順忍俊不禁風聲松聲雜然不混忽遇趙州豎指勿吝付大鼎新掀翻教網重重拾得金針玉線繡出枯木生花雪峰毬子如箭驀爾拈歸本處也是玄沙舊面示柱書記負律入禪萬無一失以古較今語不同日古推見地今論操履諸方不言言自余始況當汝躬機與言同回波逆浪無逐澆風願志不深我宗莫尋不許離我我不許親明月藏鷺有過無過速道速道錯不錯錯示悉檀法孫惜哉大荒宗風碌亂洞上一派不容妄薦遍代相傳徵文驗券賴有契書柴林一段樵牧放歌狐狼恣踐溯流得源任恩任怨柴林蓋九默別號也付寶維那曹溪一滴耶溪之源耶溪一滴流入龍門當軒布鼓若個知恩愚者一擊打碎乾坤速須縫起付與兒孫五位全彰開寶鏡半輪新月在絲綸付律侍者洞上一宗機貴回互人天衆前密受密付金砂易辨有話不墮見不拈出竿頭進步師資道合偶成唱和不肖兒孫永永流布示一葦楖栗一條道人活計片語不合掉頭而去可憐世人反耽世味縱有學人自稱標致觸著便喝胃承臨濟忽遇利名如蠅死涕汝其慎之聽我半偈佛法世法一葦瞥地示自勉銅墻鐵壁趨向不得百尺竿頭動步即失諸佛現前無可為力唯自勉之識渠是賊渠正是汝墮身荊棘橫行直撞以怨報德何以故轉側轉側示肅容真實踐履無剪爪工拌速朽質山窮水窮銀山鐵壁虎豹後攻動著即喪不動即凶轉得一語巍巍大雄不轉不得攝身其中意不在語為超生死生死既超虎豹自恥壁裂山崩歸家莫止佛佛道同無住真空打天打地罵雨罵風將五道五拿空道空從空放下仍入此中此中樓閣百萬億重重重涉入善肅其容盤珠宛轉何去何從始堪道入長慶堂曾參洞上之宗乙酉冬從寶壽至興善補祝馥生兄五十壽值馥兄又過東塔歸晤舉棹何捷波瀾匪別萬方多難路引風雪空堂客襟信宿獨吟相彼何適雲水為林天命不虞知之者娛雙溪秦溪乃避乃趨示景林智志諱爾智志豈在溫暖至冷莫中精進無轉字爾景林取舍從心心若了了景亦無侵了心有法戒品善達先參其身身從心發心在何處參參不住一鉢天涯衣瓶錫具坐臥之中行住相從暫時失照其過無窮示相鯁生居士萬法歸一一歸何處自問自答應無所住無住無功無功無空泥牛吼月木馬嘶風示無外汝發大心我説大戒從此永無退其大乃無外付劉養純居士我道東籬菊綻爾言黃葉飄空既已善知時節密移步看飛龍四威儀山中行竹杖只宜輕撥撥草不過使蛇驚山中住客來都不懼説説鬼亦自饒幽趣山中坐石爛莓苔破白雲歸忘卻來時路山中臥那得論朝暮有夢時好歹俱應做遠門以續燈元辭遊嵩嶽搜求諸祖遺言偈以付之繼祖續宗貴子眼通純金璞玉野鶴孤鴻千里萬里踏倒能峰還鄉一曲善為道中示端白侍者僧心本淨當臺明鏡端謹儀形清白梵行寂照虛容垢盡斯證禪無妙玄亦無動靜貴出生死一喚一應應者是誰冰澄月映道懷告假歸恐其耽著窠臼以此警之菩薩未離覺不能證極果而況凡夫僧乃敢倚門戶直須方外遊隻影自擔荷有無面目人真是汝親故相逢出是非佛日始獨露鯁生居士從雲間遠來時余兼理龍門喜留信宿雲間過武林誤入西溪裏相逢匪無人何以為雞黍迎笑情頗歡指看溪源水此去龍門高登春雲起雲中隱逸流語子必有以鸚鵡為朱爾干居士作金籠鎖鸚鵡鸚鵡苦思歸既失煙霞伴徒傷錦繡闈臨風吐音響對月理毛衣但得君恩放還尋隴樹飛念佛偈示鯁生令慈戒用念佛須念心心淨佛土淨六字大真言生方親把柄眷屬團圞頭修行堪共命世事只隨緣同遵法王令參禪偈示鯁生內壼智達參禪參自心自心在何處早晚細追求莫隨煩惱住眷屬同勤修超出人間世請看愚癡人忙忙作何事詩偈一四言為來雲題畫山藏雲出雲入山開試問雲山從何處來示深谷還鄉古佛道場秋風肅肅擬傳其聲好深其谷爆竹者儱侗漢通身毒藥劫火洞然七零八落煨黃獨種似西來單傳有據每顆一食地爐生計晒鹿皮南軒奏晴午睡乍醒復展臥具瑤光奪睛牧牛圖雲門山前草足水足若欲牧牛返被牛牧寄曹白僧居士五首山胡為高水胡為長石雨道業白僧文章其二常行粥飯一飽便歇鬼臉神頭弄巧成拙其三弄拙成巧是名顛倒夜光投人按劍不少其四一月在溪一月在谷請出指觀匪僧匪俗其五聞我欲去聞君欲來狹路相逢咄哉咄哉住天目山西方菴以下五言偶以天為膽攀空躡其奧回首笑猿猱猿猱可能到其二杖頭紅日挂眼底白雲行何獨無人迹寥寥絶鳥鳴紅梅人間脂粉氣染不到梅花分得海棠色春晴散曉霞訂訪嵌石兄因病不果寄懷六首生平托知己懶集一身貧兼病三月餘遣人安得人其二夢我復夢君與君同笑語尸臥仍隔津夢醒俱逆旅其三買舟一葉輕欲棹每無力何處輕薄兒飛帆去能疾其四深夏金石流溪水卻膠舟負病乞時雨一雨安能周其五雲出山則雨入山農復苦安得呼長風吹雲到青浦其六立秋秋已立喜雨雨已集鴈來還未來何處斂高翮題畫一葉橫煙波絲綸已在手試問浩蕩情亦知秋暮否和橫山草堂詩有序橫山草堂武林江邦玉居士偕隱處也訪之欲有言以入集索其題指歷幽勝復出文起文公所詠視余余歸躬耕問就題攜钁依韻運鉏其奈山荒草深興敗中止何漱雪橋石梁千尺雪且作漱流觀十載忘歸道於茲一倚欄蓄翠泉苔影寒不留烹試此常想蘇子於虎跑匏樽詠清賞鹿藩初防鹿女心銜花亂幽景不覺老維摩默然深以靜扃岫山有囊雲岫溪無留水花漁郎從此去著意斂餘霞竹浪居隱小若知足深山在夏涼數椽浮竹杪搖撼接江光空蘊菴蘊豈蘊諸空空豈空諸蘊微風拽梵音每與書聲近香夢窩遊夢入衆香若為香所轉覺起坐巖窩爐煙裊餘篆挂屐寮挂冠潔其名挂屐淨其聲相逢啜茗事多半聖之清巢松倚葛量蒼松危樓更架重擬將身類鶴一唳響千峰雲肆酒徒初散霧茶侶乍生煙物物蜃樓耳長生不是仙悠然見南山齋採菊意何深無絃空抱琴南山亦在望真得古人心卻月廊每當明極處不忍坐其下挈影就回廊深於愛月者浴硯池一洗黑雲亂魚龍競其光唯故所難革我亦惜遺香醉山樓酒其可解醒何物不堪醉所以江家樓對山有酣致雜詠八首雲氣秋未清道心貧未切未清秋未深未切貧未徹其二節山高結屋種竹插天緑日月繞人間捫天何所欲其三碧沼不盈尺竹影深不極兼彼高雲天沉沉安可測其四秋花不易開秋花不易落所以老成人出處慎輕薄其五有言入荒草無言空渺渺萬竅因風號聽者俱了了其六幽徑苔無痕至人言無門望之若可即鳥迹空中存其七上山不能遲下山不能疾鄙哉猛虎行誰為山水惜其八悠悠日復日丈夫挽弓射衲僧拄杖頭撑撑願努力百丈巖巖有凌空志人無物外愁相將尊百丈六尺自甘休一線天誰將巨靈斧劈破青山痕人遊向幽谷一嘯開天行鐘有聲復無聲放下復懸起勘破老闍黎從今不打你鼓牛皮在者裏牛在甚麼處來朝升座時分明指示去古鏡揭開方寸光大地現神力誰醜復誰妍塵堆二三尺初住寶壽得石田禪師塔故身俱地土地土中為誰千尺松根遠其如事可追其二五百年前後曾聞長者言塔門非自啓吾輩未知源其三廣廣六尺餘深深一尋許唯不逐滄桑焚香薦藜糈隱真火頭忽爾飯香藹忽爾茶氣伸何時茶灶墮免爾勞其薪丁怙思居士以乩仙語指來佛日一見如故志感相看明鏡裏佛日自無塵彼此如相信何煩復問津贈道懷禪士五十初度出家復出家佛日照袈裟學到知非處心空自雨花夾紗扇竹影空中拾鳥迹寫出竹心虛似隔紗窗月橫空雪一枝示趙淨塵居士一日入名山三日無俗慮雖然非急務此中有深趣贈伯瑞仁丈勸省夙因超此濁世人生定有因性善習相纍知此返夙根果熟為人瑞松江府華亭縣弟子丁智感參兩嘉興府平湖縣弟子泰智岡管智韶徐如水劉智京喻天桭袁敏文釋淨津各二錢智雷四錢五分同捐資壽梓
