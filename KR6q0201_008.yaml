body:
  text: 嗣法小師淨柱編紹興府象田語錄崇禎三年庚午冬結制小參春已暮落花紛紛下紅雨南北行人歸不歸千林萬林鳴杜宇我無家兮何處歸十方剎土奚相依老夫有個真消息昨夜三更月在池此先象田梵卿禪師上堂語也山僧今日拈來大似冬行春令雖然爭奈先象田與山僧同個鼻孔共個舟航他既攔頭我須把柁然此柁子把來久矣奈何不遇其人未免東飄西泊今值大眾問渡於我欲入溟海採寶求珍如是則大眾性命全在我渡子手中矣倘遇洪波浩渺白浪滔天切忌動著動著即喪身失命莫道我不先道破好更有一個把柁歌昔在雲門若耶溪上學得來的今日拈來供養大眾歌曰逆風去順風回溟海重重寶所開波斯不必頻頻獻探取驪龍頷下來拈拄杖曰此是驪龍頷下還有不惜身命者出來探取看若探得不唯堪為破闇之明燈亦可作人天之眼目若探不得只得轉過別灣更與大眾說個甚深方便去也遂放下拄杖開示小參初七排遣將畢未畢大好光景莫待來日枯木堂中枯木僧枯木花開在今夕舉拂子曰枯木花開也還見麼若不見是無明窟黑闇獄合喫山僧二十拄杖若見是眼裏花空花狂花妄想花亦合喫山僧二十拄杖如此看將起來山僧大似關吏把關相似然諸方關吏只要散金碎銀秤平斗滿便放過關去獨象田者裏不須他物只要公驗分明所以於中個個張帆駕馬求出無繇屢將憑票試驗只為來處未真盡成滯貨此等說話似乎官不容針太少方便又未免為大眾私通車馬去也復舉拂曰大眾枯木花又落了也小參無為堂須說無為法無為法須是無心人者無心二字實無階級但近時人多淺識不能造人真正無心境界錯認者多所以勞他世尊道供養凡夫聲聞緣覺菩薩諸佛不如供養一無心道人者樣看來今時閉眉合目外寂中搖者盡是外道凡夫及乎厭有而空諸所有著無而實諸所無是聲聞無心至於無無明亦無無明盡是菩薩無心度生無生可度說法無法可說是佛的無心直饒到我說無心處不與有心殊猶是祖師無心與道人無心了不交涉且道畢竟如何是道人無心若識得日費斗金非分外若識不得寸絲粒米也難消普茶示眾將斟茶師舉拂曰住住諸方先吃茶後開口象田先開口後喫茶且道為什麼如是也只要象田令行畢竟如何是象田令良久曰逢人且說三分話未可全拋一片心解制示眾舉拂召大眾曰者斷拂子雲門先師不識好惡付了個杜撰禪和從來不曾舉出今因象田寺裏拈來結制坐禪直至解制都用者拂子于中領眾排遣坐香經行也是拂子受十方檀信供養也是拂子謝諸菩薩殷勤也是者個拂子者拂子人人本有箇箇不無奈何不覺更勞先象田在拂子頭上放光現瑞高喚道拂子惺惺著莫顢頇好須知恩好莫道自悟自解忘卻立期運力好莫忘卻山僧不惜眉毛好還聞得如是告報麼若聞明星見道當年事若不聞頂笠腰包明日人紹興府蘭芎山語錄崇禎四年辛未小參藥苗已枯丹灶已滅丹井已竭轆轤上下何忙忙汲得龍王頭腦裂仙家伎倆止如斯衲僧三七功夫切切則切矣還識得蘭芎真面目麼花開不待春秋節有眼者覷不及有鼻者嗅不著獨有白牯與犁奴觸翻哭笑一齊發哭者哭未曾有笑者笑無奇特馨香馥郁不能藏切忌粘皮并搭骨拽出山僧掀倒寶席要且未是蘭芎真氣息且道如何是蘭芎真氣息直須向未入大殿未出禪堂已前輕輕將山僧攔胸把住問道向甚麼處去待開口便劈面掌方有少分相應今己事不獲已未免向肚底下翻個交兒看還有翻得者麼良久曰梁湖隔斷娥江水萬古人悲行路難小參喝一喝曰者一喝密不通風管取黃金失色又喝一喝曰者一喝七通八達從教瓦礫生光遂舉拂曰大眾我者斷拂子也有一喝供養大眾以拂子拋出曰且道者一喝是把住句是放開句還有定當得者麼若定當得不妨在拂子頭上現寶王剎若定當不得拂子在大眾頭上轉大法輪去也復收拂子曰者拂子從雲巖老人因先洞山問無情說法話一番拈出爭奈洞山不會勞他老人鼓粥飯氣云不見道水鳥樹林悉皆念佛念法念僧洞山便隨語生解道也大奇也大奇無情說法不思議若將耳聽終難會眼裏聞時始得知山僧今日亦因一僧問及只得也把者拂子豎起問他曰見麼他云見我對他道既見卻又不會茲復重新拈出供養大眾他日大眾若在十字街頭開粥飯舖接待往來也少他不得若信得者拂子及則草芥人畜瓦礫墻壁都來是你自己還信麼昔日東坡居士自無正眼便道從上佛祖言句如醫者醫眼相似只有去翳藥實無與明藥殊不知山僧者裏則不然若有害眼人來也不用金錍刮金鍼剔藥來塗也不用去他翳啟他明只辦得一個石灰把子凡有來問便驀面撒使他立地識取無自己去要他識取自己即是者拂子去要他立地識取拂子說法去眾中還有聞此不生驚疑者麼若有則不於一佛二佛三四五佛而種善根僧問趙州門墻承引入願聞堂奧事如何師曰如何是趙州的門墻僧擬進語師遂起身以拂子作搖鈴勢曰玲琅玲琅穿長街過短巷去也示眾白浪滔天曹娥江北蘭芎絕頂垂絲千尺當年把釣王弘之今宵平地撈魚客撈不得辜負西江那一吸且道為甚麼卻成辜負去留待來朝煮茶喫大眾結制茶已喫了不語茶已喫了普眾茶已喫了還有知茶味者麼者盞茶亦能殺人亦能活人在天而天在人而人即在蘭芎分中可以聚幽人可以集韻士可以資談柄可以清客襟可以興叢林可以訓童行可以導一方可以作佛事在行人分中可以拌性命可以忘疲勞可以利自他可以成無漏在禪師分中可以作話頭可以起疑情可以興問難可以破死生大眾且道者杯茶在山僧分中又成得個什麼有出來道得者麼良久有僧將致問師曰憶昔管鮑貧時交何事今人棄如土示眾師召大眾畫圓相曰還識得那個麼那個與天地同根與虛空同壽在凡不減在聖不增人人本有箇箇不無山僧於二十二歲出家南高峰西竺菴結伴念佛一日念佛真切忽於日中踏著一塊石頭只覺軟如綿絮拾得將來卻是那個以手作拋向後勢曰那個且置又以手作圓相曰還識得者個麼者個不與虛空同壽亦不與天地同根在凡不識在聖不知人人非有個個本無山僧自得那個之後參禮雲門先師先師纔見便說放下著卻又拾得者個自得者個之後到南京看朋友侍病僧同三宜兄入楚中見黃蘗住茆屋嘗盡淡飯黃虀因聞先師入滅歸來掃塔入天台住香柏同瑞白兄結冬顯聖去年象田今歲蘭芎總不出者個今夜拈來供養大眾復召曰眾檀信從此還家便好孝順父母尊敬長上和睦鄉里教訓子孫各安生理師以拂子畫一畫曰住住且道後句為什麼不與諸人道良久曰凡事留人情後來好相見示眾舉拂子曰者拂子今夜不答話有問得希奇者一任問將來又舉曰者拂子亦不問話有答得巧妙者一任答將來大眾且道既不問不答為什麼卻教人問教人答寒鵲簷前噪不休嶺上梅花笑不徹解行拳者不須手解談論者不須舌所以蘭芎者裏佛殿山門燈籠露柱他也會行棒也會行喝雖不立賓立主亦且有縱有奪百丈聞之三日聾臨濟道如蒿枝拂妙矣哉樂樂樂白銀世界平如漠怪矣乎苦苦苦孤舟獨釣空歸浦也不樂也不苦伸腳眠縮腳坐也會歌也會舞打開布袋笑呵呵一任吹簫并打鼓忽憶巖頭與雪峰鰲山此日成莽鹵且問大眾雪峰與巖頭說行腳鰲山成道為什麼卻成莽鹵去惜乎雪峰當時猶欠急風暴雨的手腳若有待他說直須從自己胸中流出便好驀胸扭住問他道不從自己流出難道向別人流出的麼他若開口便劈頭槌方有獅子返擲之勢不至遺臭至今今夜大家打開布袋將一期行腳傾將出來簡驗簡驗看普說普明普說朝來一雨灑遍塵埃更欲普說天何言哉大眾若便爾休去只具一隻眼還要雙眼圓明麼不見黃面老子受無傳之傳迦葉頭陀受無付之付乃至安無心之心懺無罪之罪皆從一模子上脫將出來初無彼此初無旁正六祖大師恐分旁正衣止不傳如石頭馬祖青原南嶽父子承繩兄弟和協馬祖見丹霞來呈起襆頭便道據子因緣合在石頭以後洞山見雪峰覆卻米盆便道據子因緣合在德山你看他是甚麼眼目後分五家亦不過如一人乘馬一人乘舟一人乘車一人策杖一人懸崖絕壁懸崖絕壁的駐足不得相逢不相遇策杖逍遙的撥草驚蛇相遇不相識龍車鳳輦的左右歡呼相識不相知乘舟入海的見風使帆相知不相值乘馬登山的瞬目千里相值不相交到者裏還分得麼若要分分在汝邊汝邊覓得定多分別定多是非不達源頭不知根本大眾要知根本麼教中謂本覺者本來明覺本自圓成人人本具個個不無不勞修證本無言說但有言說俱是始覺中收今有一等稱善知識登曲彔床的將世尊一手指天一手指地天上天下唯我獨尊以為本覺以為極則便欲擬傍他一味氣吞殺人謂四海之內唯我獨尊還慚愧麼何不將人人本有的來合合看還合得麼既已大本語錄刻將去還有人簡點麼佛法平沉此其兆矣此是極易明極易辯的事如世尊辭家入山睹星悟道便云一切眾生具有如來智慧德相始覺得人人本有故名始覺若以唯我獨尊為本覺且問者始覺還合得來麼既合不來不得名為始覺合本覺矣口稱知識輕訶座主你且去問問座主看此不特座主即纔入講席的也知你者等判斷決定是邪是外又何敢分洞分濟分青原為旁分南嶽為正耶你不知臨濟照用同時洞山遍正兼舉還分得麼如南嶽見六祖是主看賓纔見來便問甚麼物恁麼來嶽云說似一物即不中祖曰還假修證也無嶽云修證則不無染污即不得祖曰即此不染污是諸佛之所印青原見六祖是賓看主故問曰當何所務即不落階級祖直得無轉身處不得已說個汝曾作甚麼來原曰聖諦亦不為祖曰落何階級原曰聖諦尚不為何階級之有祖深器之即舉為首座你看此不落階級與不染污還有旁正也無論旁論正俱是向汝邊覓的人不知根本妄自批判生人我心造地獄業故山僧常勸人務本不可向半腰裏參起參到老來根本不立終無穩處今日普明者裏有兩個堂頭挨拶你們憑你從臨濟入也得從曹洞入也得謐然居士不惜身命護持期場特請普說略舉法門弊端更有一偈贈之人生入堪忍譬如行險徑隱怪信多端所貴在眼正謐然洞其靈擇師如擇鏡真寂光寂然普明復輝映髓腦俱可捐鬚髮何足剩留以護叢林以振臨濟令我今為證明范居士尊姓此偈如牛過窗楞相似頭角四蹄俱過了只有尾巴過不得大眾過過看僧曰不辭向和尚道相續也大難師曰只道得八成又數僧俱下語竟師曰恁麼則畢竟難過也良久曰山僧也過不得下座普說僧問懶居明國不住夷邦且道是什麼人師曰不是鈴鳴不是風進曰未審此人還許親近也無師曰癡人認作主人公進曰與麼則和尚也須下座師曰老僧罪過僧禮拜曰謝師答話師曰大眾看取乃曰昨日十一明日十三西來祖意不用顢頇於此會得省力多少若更如何只得為汝扯葛藤一上秪如山僧只舉昨日明日何故不舉即今只為即今一句不唯一切人舉他不著即諸佛諸祖亦難下口所以石屋禪師要道即今句子只可說個梅子熟時梔子香任你說個即今說個十二不知一晝夜有三十須臾一須臾有三十息一息有六十瞬一瞬有一百二十剎那一剎那中有九百生滅到者裏你還道得麼若是真實道流左看右看看到牛角尖裏一毫頭上直是動轉不得施為不得開口不得到者裏方喚作擬心即錯動念即乖說個即今不知過去多少時了也今人不知事無一向有等從無量劫來般若根深才出頭來一聞千悟言下知歸棒下了辦有等初心精進必假工夫窮參極究做到動轉不得處觸著磕著不覺悟去得遇真正知識不許他坐在百尺竿頭要他轉一機著一語使他更進一步今人還曾真到轉動不得處麼古人真到的逢人便問剎那便去時如何你看答者是個作家對他道逼塞虛空作麼生去若是如今弄虛頭漢敢保摸也摸未著在只好說個無事禪說時相似背地看來若逆若順于苦于樂還真得無事麼若是不得即是騙茶騙飯圖人恭敬哄人供養的無賴惡人因他自家不曾經過每遇入理深談便一向推開以不知不識謂之最上不知者個知字在凡夫分中知之一字眾禍之門在得的人知之一字眾妙之門所以道百姓日用而不知百姓若知即是聖人聖人亦日用而不知聖人若知即是凡夫可笑一味執死蛇頭的以謂圓通不開生藥鋪單單只賣死貓頭殊不知死貓頭兒今日賣不得了也何故不見道東風急被簑立示眾一天華示眾有貴見識而不貴操履者有貴操履而不貴見識者貴見識者一味學轉語學機鋒弄得口頭活脫操履全無則心行不佳心行既不佳縱有見識亦是魔王眷屬貴操履者一味灰頭土臉以苦行為極則若無見識與外道何異殊不知古人論見識即是操履邊的見識論操履即是見識邊的操履故天華者裏也不管你有功夫可做無功夫可做有道可悟無道可悟你若道無功夫可做還是未入天華便有此見還是已入天華纔有此見若未入天華便有此見且問你又來作麼若已入天華纔有此見你試為我說看乃舉黃龍南禪師住歸宗因火燼入獄六十日不食得釋後住石門謂門弟子曰我當時在獄中得法華遊戲三昧故經云菩薩遊戲神通於淨佛土中心不喜樂蓋因小乘不能度生耳弟子請聞其說南曰大凡獄吏之治有罪者痛加槌楚欺詐情盡雖有嚴刑不能加也就死無恨今學者有狂妄心欺詐心不以知見慧力治之何繇得安心哉故天華苦苦教你不要求安樂病來痛來一切苦來警策來一一不如意事來都是你親切善知識若將情見待你恣縱你放逸你使你一一如意便要曉得是你生冤家此等說話那個不知只是境界臨頭依舊只要如意去了我若見你放捨得做到緊要處我或扯你一把不惟我扯你即鐘聲鼓響鵲噪鴉鳴一切都與你發機去在久立珍重示眾藥無貴賤貴在對病法無邪正正在投機故我先師曾道汝等一人所在也要到半人所在也要到即當時南堂亦曾示眾云參學至要只在最初句與末後句若透得參學事畢如或未然更與汝等分作十門今天華一一要與大眾簡辯第一須要信得有教外別傳教外別傳且道怎麼樣信即如香嚴教乘該博問一答十問十答百忽要他向父母未生前道取一句便不能得退去將平生所參所習的一一翻過卻將不得來答向後直待擊竹始信有教外別傳大眾既入天華定相信者須更明第二知有教外別傳故香嚴悟了便道一擊忘所知更不假修持又道我有一機瞬目視伊若人不會別喚沙彌所以他憑人勘驗驗他不倒雖然你若向他言語上辨的便是過在尋他舌頭路不知有言外知歸的意見說時道有不說便無所以第三要知無情與有情說法無異若知須要諦實若不諦實只如我前日問眾兄弟香爐說法意旨大家東湊西泊不能了決故第四要見性如觀掌上了了分明一一田地穩密既穩密已亦只是我自了漢若是為人更要第五具擇法眼假如兩人入門一人已悟一人未悟不待開口就能簡別得出方可為人雖然若不行鳥道被獵犬一味尋蹤嗅蹟若是羚羊掛角不但蹤蹟氣息也無你尋處是故第六須行鳥道第七又要文武兼濟要教便教要宗便宗雖然若不具大骨力不能驅邪顯正當時有端師子推倒回頭趯翻不托此是樣子又古人道三家村土地廟裏若有個漢我也托缽供養始得與第八驅邪顯正相應若一味門庭施設一機一境分別宗途利人不普故第九要大機大用雖然若第十不向異類中行不能超玄截妙如此十門南堂所設辨驗人的他是臨濟的骨兒孫何嘗不細故我前日舉無情說法話人以為道理支離曹洞則可臨濟不然殊不知古人雖立門庭不同於中為人無別故南堂又道若是只圖自了閉門作活不在此限若要為人須將此十門一一透過始得還透得也未若透得方可踞曲彔床若一味弄虛頭被閻老子打窟臀有日在示眾諸方禪易學而難參此間則易參而難學所以尋常接待弟兄不用門庭施設一味寒暄若是本色人自然賓主協通言語合他古轍只為不本色不得已設個門教你入我門來殊不知入門即入本色門無有希奇玄妙今人不知將謂入門是有奇有妙又有將一棒一喝為入門者有將輕安寂靜為入門者有將一知半解為入門者也憑你當個門只是入門了更須知有堂奧中事我說個堂奧也即是本色堂奧亦無奇妙奈何今人又將三玄三要四料揀五位君臣等為堂奧不知此亦是尋常本色語今日天華結制須將平日求玄覓妙處盡情吐卻吐不盡未入我門在若得言下知歸入門辨主何用一期百日即今開堂已竟且開堂一事大明國裏屈指不多江南卻有三處可為末法中極盛時節然而盛必有衰切不可作久長想不可作一期想不可作如意想做得一日功夫是一日了得一日是一日事大家緊把繩頭打得徹去待他盛也好衰也好一日也好一期也好此等即是本色道流雖然也須驗過始得示眾舉拂召大眾曰十方諸佛六道眾生卻被斷拂子把住腳根要行行不得要住住不得要坐坐不得要臥臥不得大眾山僧恁麼告報不是落水拖人只為同船合命你若要行山僧與你同行你若要住要坐要臥山僧與你同住同坐同臥只是者斷拂子性子惡切不得觸著他若觸著他則孤魂杳杳不知歸亦不得背著他若背著他則業識忙忙無本據于中還有不背不師忽作咳嗽聲曰斷拂子敗闕了也且道為什麼如是不見道不斬蕭何律不行嘉興府嘉興縣弟子沉淨素朱行應陳德成各壹兩天寧寺淨御智圓各壹兩仝梓
