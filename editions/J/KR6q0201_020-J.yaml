body:
  text: 嗣法小師淨柱編祭文祭具足法兄文於乎於乎於乎哀哉一慟欲繼再慟復甦三慟復欲繼道乎情乎腸俱可裂生未同埋死未同穴此慟於情也生也不及死猶可追此慟於情之至也而又何慟乎死者自滅生者自存此慟於道也死實生也生實死也此慟於道之至也而又何慟乎繼復甦甦復繼道乎情乎吾已矣乎於乎尚饗祭麥浪法兄文雲門一派兄為次子我又次之百難一比兄具說通拖泥帶水我溺煙雲掉頭不理不水則山忽數寒暑散曰自高愧不能耳聞先師赴歸首訊兄法座改觀金光增明天台且入蠅翅已成修涂驥尾終擬附行不期法華竟成終席我過聯床劇談兩夕登座指揮屬累如昔兄亦有心我自不識指雲門言寥落何堪老弟當此我亦已甘兄再三讓我再三謙今日迴思句句哽咽以哽咽意可奠兄乎復不成歌奈何奈何祭西築宗禪師文至靈前拈祭文曰生從何來死從何去那個能無此一滴淚將此一滴飛入九天九天不知滴入九地九地不會且問靈骨畢竟在什麼處良久曰到江吳地盡隔岸越山多維那遂宣祭文曰師乎師乎赴至之日殊不可信云已二七所可疑者先有十日夢師怡然欲有他適送師遲遲雲颿只尺追不可親如千里隔無可疑者師向無疾曰近有之無眾苦厄別子將聞趁殘暑入九日不出索飲食畢兀坐胡床合掌西訖隨暮課聲渺然圓寂某曰不然師願頗堅字雖曰西意不在焉築西築室錫杖泉邊志之所共證諸流泉同辭西築受雲門囑某苦遊詢師歸碌碌效古定光示人以福詩乞補松號栽松子古殿一新莊嚴不止至孝慈嚴語溪所傳事翁與母相繼解縣寄聞天華薦昇於天書乃約曰世事紜紜了武唐局可以就焚獨憶雲門汝已潦倒屈指諸方磬山已老我獨慕之門庭尚悄得遂所懷是生可了是故聞之痛為躕踟夢耶非耶占其來辭紅輪既隕秋風凄其採菊盈把雨淚如澌西湖已竭棹不可拽高峰已頹杖不可挈愁雲四垂蕭蕭落葉定光無光法相相滅末後殷勤無德可畣問師何之示人親切人自不知某亦饒舌撮土為香當龕一爇大眾哀哀一時漏洩祭爾密法兄文嗚乎日中玉兔夜半金烏霜飛六月大地淆訛哭既不成歌復無聲要終原始實煩忍聽花宮燁燁同參乍結萬指叢中目擊而合並觸逆流洞水分遊剡溪雪棹東山是幽初開講席香臺煥赫循循誘人憧憧謝屐石傘忽摧載撐載持未克手足力曷可支重開五位推兄獨貴一整復整頹綱大備傷哉法流運不可週津梁示倦一疾弗瘳嗣法有人庶得其真我歸自閩陟江若奔合掌一別笑談不撤如深夜燈熾然乃滅是眼可瞞神光卻圓敬修杯茗滴破重玄重玄若許烏兔復處紅爐迫霜瓣香一縷祭瑞白法兄文正惜狂瀾不可遮那堪砥柱復傾斜纔掀百丈潛狐穴又逐千江湧素車葉落有根歸石傘法流何處剩龍華瓣香一掃尋靈骨痛唱新豐慰克家祭久默法侄文惟苗有種靈根獨擁一穗兩岐分香播隴得名蘭芎天華首眾得地龍華其名愈重或出或處或奪或縱去就得宜低昂賈勇欲隱如影欲諱如鐘靖共爾位人天接踵建無勝幢妖邪震恐戒雲棲虎法雲門龍端規肅矩復整頹風水之四海月之天中影分流散莫不朝宗法流寶壽句與山崇當我閩適扺掌談衷閩歸未久訃音何從珠光含浦劍氣埋豐不堪著眼爍破虛空今夕何夕鴈墮塔叢薄修缽飯淚捲西風尚饗祭嵌石兄文於乎兄之生也荊南之青溪我之生也浙西之武水雲水相逢影形相倚共禮雲門於石傘耶溪聯策諸方於名山勝水兄精嚴也嫌五色糞之惡臭我疏散也事一瓢飲之閒遊參詢既暇隨緣去留或高或下一出一處兩心相參易地相許兄念母儀兄母即我母也我不遠三千里之波濤代為親省我勞拮据我處即兄處也兄不惜一喘息之匡贏躬為佐助我已倦飛而知還樂西溪之偏僻兄又無心而出岫欣金澤之雲關往往來來越寒度暑擬投老於龍門之鸚鵡峰居詎意單絲不線寄遨遊於寶壽之七十二賢峰畔此則孤掌誰鳴脫爾長行謂宿債之必酬勤乎囑累示定業之難逭嗚呼精嚴畢竟先驅靈骨先歸無縫塔疏散終成滯貨痴魂滯此最頑皮兄其有靈忍受蔬儀我雖不敏敢輕杯茗一滴九泉三生永賴嗚呼尚饗祭即念關主一炷香一杯水將謂汝供我誰知我供汝一生上下分明今卻拈頭作尾且道何故如是良久曰不順非孝不奉非輔奠正法禪侄文即唐祈遠嗚呼惟靈處為真儒唯孝與廉出為真釋唯淨與禪其外護也雲興霞舉其內護也珠藏玉貯龍華得名閒名已成金粟得地地偶欹傾干戈四起歸寧故里一方廬舍庶幾可倚咄哉性空撒手波洪佛法世法兩不耐功噫不因昔日旁參我誰送嗚嗚一笛風尚饗雜著規約讀賀家池上天華寺一一軒窗向水開之詩則知寺之閱人多且久矣今復新於陶章諸宅宗曉張道尊共請先師湛然和尚雅集龍象重整宗綱復得達虛關主輔翼之自先師圓寂門庭愈肅僧眾愈調關主茲又以謙自居特虛丈室見招山野欲思所以報佛恩於不朽防滲漏於未然耳奈山野久耽山水少入叢林無可益於法門但憐時弊慕古道近賢者遠不肖或堪與同志者共諸師友能不以人廢言信從少分清規遞相砥礪即是自信信人終不至於慢人自慢矣又何佛恩之不可報檀信之不可酬慧命之不可永繼乎堂約若未知有者須信礦中有金必用勤淘勤汰既知有者須信金中有礦還有熱灶熱爐一口氣打將來管取成釵成釧遲延些冷將去未免費炭費柴作是觀者則惟恐規矩之不嚴又何慮繩墨之絡索哉恐有以放肆為灑落將狂妄作逍遙者鼓而攻之約罰如左寶泉寺規約上古叢林都遵佛制自百丈大師以來宗門大盛故有不作不食之風開田說義之舉及乎沿流至今半以耕鋤為業惟汲汲以利自圖竟不知義從何說智眼觀之實為可嘆僅有壽昌黃蘗諸老雖不離鋤鑊不妨規矩可觀威儀可畏此真可起作食之風者今寶泉破宇頹垣大眾雲集二時所須不能盡取給於檀那未免有效顰之愧若更疏慵威儀全缺不惟向去道法不隆吾又恐退失一方善信而後已故趁此時約諸兄弟為法為眾為此一方各自努力執務恪守清規共安澹泊必以見道為期至於興廢盛衰自有分在無甚強焉約立於左題法相戒酒卷後長耳古佛風顛無定蹟遞代沿流變現不盡應以宰官居士諸男女得度者能俱現身為說本法更多酒徒詞客應接無虛往予踞西築菴聞酒氣與茶香鬥額愧不能和其光因尋參方外往來二十年矣今值司理黃公一整茶鎗酒旗大敗予來得陞座話清平話漚和勤舊出卷讀之何異老衲法言此又宰官之現比丘身也逆順隨緣彼此相現莫要扶持此末運麼請看腳下是什麼下得一語現與不現俱成剩義其或未然且喫茶去雲門初住規約近日住持不無條約但設而不行行而不整致使人心日下叢席就衰今顯聖家聲未墜先師遺屬猶存諸兄弟惜乎丈室久虛恐負方來龍象復蒙護法宰官正信居士見招山野住持業已不辭眾請規矩重新則我豈敢謹就先師所未足參入雲棲之少分佛法無多貴在力行而無倦行之既整何煩王法以加焉題蘇門黃孝廉太上感應袖珍聖賢經傳深淺隨機易乎明著難乎隱微如藥之性妙於應病如影赴鏡妍醜斯正或專受持或工書寫或隨傳唱同歸善也棗割新裁繼往開來功高敷演其利博哉工於佩帶無往不在曲順人情體物無累放生大意登越山得山林居士邀過草堂坐忽蒼頭告主人有饋生魚者主人即速命放以適丁禪侶良集為喜余因引鄭子產章為問孔碩諸公子各說所見已余曰子產之道恐即在圉圉洋洋悠然而逝處蓋校人烹之即校人之魚也使畜而至於得其所哉是子產之魚也子產可欺也子產放魚之道不可欺也即子產之魚亦千古不可烹也諸公子俱躍然喜得放生大意時武林報國院三學師在座索余為文以竟放生池事遂走筆記此倘見聞者以余語為當則同證無生不特同證子產之道同放子產之魚而已又何止放生得長生耶說夢篇方賓侯先曾夢遊雪峰及入山歷諸境喜與夢中無異告余余曰即今是夢唯文殊菩薩親證所以道卻來觀世間猶如夢中事真是大夢覺人故能於夢醒俱夢之中承昔願力善入游夢三昧指迷人間示同迷夢非真如夢中人於違順境起苦樂見也亦非冥然無苦樂違順而言醒也余自乙亥冬主會稽雲門席喜陶石梁居士講學甚得宗門旨趣一日偕祁季超居士訪余曝背簷下梁曰連日講學談及因果人不甚信因以夢喻頗覺曉了余曰山僧亦喜說夢每對人說你即是我人不甚解乃以昔年夢事告之初夢入山覺幽邃可愛忽值虎哮吼奔突余時魂分失意復得樵者相救擊虎虎斃且感且醒身汗漓漓魂猶未定見月明在牖山雞奏更斯時斯境夢耶醒耶莊周蝴蝶了不可辨復自念曰一臥如尸尸是我也夢身入山身是我也夢山山亦我也虎亦我也我復愛我山畏我虎復得我樵擊我虎而救我身以感我之樵醒時一覽違順苦樂物物頭頭亦復如是兩居士大笑余又嘗以我證我境遊我之夢告我之人而我之人亦不信真可謂寥寥天地間獨立望何極安得人焉與同遊夢鄉同作夢事心心相知鏡鏡相炤牙為賓主振我說夢之宗而大夢覺仍書贈賓侯居士其為我分身說夢乎普明寺安執事引泥金剛不入水筋骨不出木羅漢不入火舍利不明所以普明寺寒爐發焰紫雲峰白浪滔天要使久參初學各各量才堂內堂外齊齊知有倘有出格漢子不拘繩墨也要還我三玄三要的落處方可明窗安置如或不然大家相聚喫莖虀不吃任從伊齋單引經云飯千億三世諸佛不如飯一無念無住無修無證之者且道普明寺裏誰是其人有甚饆饠䭔子一任下來還有麼不見道財法二施等無差別堂規安禪結制原是好肉挖瘡以世無生知必待挖瘡而醫藥瘡愈而後知全體之妙有瘡未愈而遂廢醫藥者如大事未明而便忽規繩也野鶴孤雲誰非自在既肯放下雲頭必有大不得已事然後信人入人保社聽人爐韝豈又厭鉗錘之嚴密哉姑立十則務在力行微細條章事憑眾職行狀師諱上明下方字石雨出禾之嘉善陳氏望族父文錦進禮退義以型其躬一鄉儒者為之下晚以艱於育子令其庶徐氏如法相禱定光古佛而有身徐實為師生母師之生明萬曆癸巳正月廿九日午也自幼徇齊氣宇俊逸如獨鶴摩霄稍長入塾所誦習即了大義不屑句讀亦不慕儒冠二九諧伉儷則曰從父所制匪我思存也父遊雙塔師隨之行見緇衣攸敘宛然三代禮樂計決出家既又曰老父在未可奉身而去也迨父捐館營窀穸已母令依法相西築宗禪師薙染相傳甲寅孟秋之朔云嗣是恒與靜安老宿專修淨土一日念佛忽擿魚子笑曰不特西方可生東方亦可生矣靜曰莫艸艸未是汝到家處示以南泉三不是語師鈍置疑礙橫生胸痛不止乙卯春參雲門湛老和尚於禾之石佛師以前念佛事呈門曰此信心真切塵勞暫息耳復以礙胸作苦事告門曰愚癡東西參禪圖大安樂豈是苦得來的縱苦得來也是苦禪參他作麼師承啟迪如暗得燈自此工夫不用氣力矣時輩多弄口頭擎拳豎指者滿堂師竊謂禪若是者等參的我也會得一日見鄰單商量公案到相關處師出曰我卻道得眾曰你試道看師作女人拜而出一眾失色師笑曰禪至此亦為可憐俄舍去一缽飄然有孤身萬里之志遂為新安諸名士所重後憩承天閱楞嚴至如汝文殊更有文殊是文殊者忽覺身心世界打成一片同參微相謂曰石公似有所得請試看驀扭住曰道道師滿口逼抑無對聞門主東塔又如請益門示以一人所在也要到半人所在也要到遂南詢撥草乞食羅岩山下雖無深入宇宙每一頫仰自謂寸絲不挂人矣丁巳春參博山來禪師以頌偈呈政山曰語句未玄諄諄以死工策勵直抵衡嶽結茆毘佛洞刀耕火種值歲儉即以帶沙糠為禪悅師恬如也戊午夏遊五乳謁憨山大師談至無生話酬唱甚洽己未覲雲門升壇納滿壬戌春辭門住山門曰下流甘墮小乘那師曰豈懶贊之流亦小乘耶門曰亦是小乘奈單丁苦究之願甚堅登天目最奇嶮處菴曰西方潛一載餘枯槁淡薄倍於南嶽工夫至此所謂死得活不得者是也癸亥冬聞雲門大開爐韝海內英衲無不畢集即下山進堂默禱韋馱曰一生所參學問積劫所護命根盡情交與菩薩惟憑菩薩慈悲說竟大慟自此精進日倍一日因見堂中商量浩浩結同志者十人約不語限七日徹證未至所期門上堂曰放下著忽覺通身慶快如窮子歸家口占偈曰平空一擲絕躊躇轉眼風波徹太虛會得竿頭舒卷意放生原是釣來魚錄呈雲門門閱畢大呵曰弄者個彀當作麼門取偈入袖中又三日聞僧舉大慧竹篦子話曰如荔枝相似殼也去了核也去了放在人口中只是不解吞師不覺失聲大笑首座麥大師問曰做甚麼師正色曰幸遇我持不語戒自是首座每邀入室不讓於師矣一日門火浴僧有問亡僧遷化向甚麼處去身甚抖戰門曰且莫問話先把者抖戰去了著師出曰和尚何得以相貌取人門將答師即作抖勢曰又作麼生門曰賊師曰賊賊便歸眾嗣同化山和尚入室門問曰如何是一口道不盡底句師曰晨昏禮拜和尚也是尋常事門曰趙州道無意作麼生師曰和尚喜著棋某甲麤知門曰他道有又作麼生師信口頌曰家家有幅遮羞布放下便能當雨露獨怪當年老趙州擿卻頭巾頂卻褲門喜之以偈印曰分明識得趙州狗拾得鼻頭失卻口莫於萬丈峰頭立且向叢林陸沉走并付斷拂一枝故師自號斷拂子嗣為洞宗三十三代也繼謁黃櫱有禪師於棋隆以絕學無為徵論竟日大為賞識尋往黃安鷂兒山養靜冬夜不設臥且竟夕趺坐積草為裯時當體罷則幪首假寐畢盡抖擻之風偶遊渚宮聞雲門訃音南還顯聖卜塔竟治任入天台棲息香柏峰庚午春同具足和尚住嵊之西明作活埋計有翻轉杜園還杜田那管十年廿年三十年之句繼徙寶泉因象田蘭芎堅請結冬不得已而起壬申出住天華暨登座舉揚大法玅協全提至若鉗錘學者別具作家手眼因邪打正俾簾外轉身知有尊貴一路每見狂妄之徒謬稱證悟師以金鍼玉線細密工夫為之落草盤桓則口噤不能加答蓋師平日所貴者真操實履直達佛祖堂與其家風嚴密率類此甲戌冬峨雲王冢宰世培祁中丞等請主顯聖杭州司李黃元公聞師敏捷未有以異之一旦徒步入山即鳴鼓請說法師便陞座公禮拜問曰請大師舉揚雲門未了公案師曰竹拖鳳尾慵迎客公曰今日親見作家師曰松作龍吟嬾送人乃垂示法語皆赴來機公嘉歎復問曰明頭來時如何師曰耶溪不許扁舟宿公曰暗頭來時如何師曰此去錢塘尚隔程公曰不明不暗來時如何師曰杭州理公事時向居士道一日在報國院與石車和尚同座公問車曰往天童還到雲門否車曰且看公曰雨大師不放過時如何車曰與他一頓棒師曰居士還甘麼公曰天童和尚在背後師曰原來不甘公又問車曰兩石相磕時如何車曰一輾便死公顧師曰和尚如何師曰只可自怡悅不堪持贈君師之應機詳載語錄茲不廣引也丙子春嚴印持聞子將諸居士請主寶壽即宋石田薰禪師息影處也先是有五百年前石田五百年後石雨之讖故諸居士請師益堅師顧眾曰能事钁頭者隨我而去師見法門愈亂不久自有定論掩關大書曰定論不須下千古偷安聊爾約三秋于關後葺茆為別室忽得石砌如八角古井師啟視之見舍利雜五色土知為薰公窆地印持諸公以為舍利藏見有時讖之所云良不誣矣集生余中丞會同閩紳京臺王光祿等於戊寅冬迎主閩之長慶己卯夏徙雪峰集諸房眾導以上進漸知嚮風辛巳遊古汀艤舟韓埠緇素遮道延入靈山結夏秋寓獅峰開戒及冬應鴛湖禪師孝廉朱聯岳黃蘇門普明之請才解制而贛州嵯峨漳州三平俱以住持相延師底力辭之居考亭之靈峰凡五閱月復歸寶壽是冬再主天華癸未春屺瞻葛太常請興龍門師見棟宇湫隘乃卜築東偏鼎新殿堂躬先荷畚為大眾倡鳩工庀材不兩載而已落成甲申冬石倉曹侍御等請主禾之東塔期畢歸龍門乙酉秋會四方多難兵燹交加龍門鄰剎半作行營一眾聳懼師示以安心靜守晝夜結參因或少懈荷戟之士欽其道力莫敢舉刃相傃焉山阿以寧皋亭之陽有佛日者唐本空禪師故剎也邇來住持難得其人本山勤舊偕護法存憶唐總憲武山錢郡伯等數延師主席師不允丙戌秋敦請至三有泣言大師不往古剎必廢者師幡然從之比入院參徒駢集廩無宿春領眾行化以瞻不足而廢者修缺者補叢林應用翕然就緒及開爐弘戒眾萬有二千餘指師書門以示來參曰擇木嶺相見了也松篁橋滑倒時如何松篁橋相見了也為甚僧堂前不肯住僧堂前相見了也且道丈室向東向西若也道得許汝相見不則且居門外丁亥夏閩撫佟君持景師道望修幣遣官迎興芝山雪峰二剎師婉辭以謝撫軍順其意不強起之孟秋魔事忽作師不惟不校深加憐惻故唐總憲曰道高魔高道與魔原相對待吾師汪汪千頃於人何所不容尤見道力弘深化人以不屑之教誨大為羡服大為浣慰屆冬結制宿衲響臻倍於客歲一日坐金湯閣歎曰世界如此多事不如歸去好乃囑維那元正三日解制眾咸驚異蓋師歷坐道場凡結冬俱於正月廿九日解因師以是日誕諸禪德必申慶祝而後去也眾白師請如初師不許三之日解制上堂曰人人藤斗笠個個水雲包出門踏著草途路轉迢遙到者裏不倒斷得一回直饒說個回途得妙就路還家便是千里萬里昔洞山辭雲巖巖問向甚麼處去山曰無巖曰莫還鄉去麼山曰無巖曰幾時回山曰待和尚有住處即回巖曰此去難得相見山曰難得不相見今日若道難得相見便生幾多情見了也只因洞山是個得的便道個難得不相見看他何等穩密何等把細佛日期中豈少一知半解只是到者些原委處未免走作即今你要東去西去不見古人道直須向萬里無寸草處去又云出門便是草又云不出門亦是草便見舉措不得只因你不能向異類中行且道異類又如何行乃屈指曰一雞二犬三豬四羊五牛六馬為甚麼七人不道參至晚陞座示眾曰一期圓滿可謂有始有終若論本分家風一落始終必不免于始終之患須知本自無始又何有終今人不解自推只管向外推求推到伏羲神農黃帝以上說盤古便為分混沌之始不知盤古是個甚麼混沌是個甚麼若看一念未萌以前父母初生之際豈不真是盤古真是混沌只因不覺總在始終裏面安身一有始終便有生滅便有輪迴所以一切聖賢苦口教你參禪參到一舉一動亦無始終處便是就路還家便是出輪迴處且道始終畢竟如何免得你且將年月日時推看推到一剎那際如擊石火閃電光相似以拂子擊案曰如者一響說他始也得說他終也得說他生也得說他滅也得若再推到初生即有滅再推到當處發生隨處滅盡再推推即是不生不滅便好孤迥迥峭巍巍一任逆來順往七縱八橫踢倒便行撩起便走有甚麼拘戀處便是解脫丈夫便是出塵羅漢還有此等人到此等地步麼不則惜取眉毛好初四日辭眾出山柱作禮問曰和尚幾時來師曰初八九日便回初五日次上墩初六日至寶壽囑付事宜諄諄不倦初七日上龍門是日山風甚厲師有寒色遂泄瀉示疾至晚付託後事亦如寶壽次早命具湯沐浴旋謂侍者智海曰扶老僧起來師端坐不語時同門兄妙首座寶首座律監院等侍側察師有去意亟問曰和尚還有分付也無師曰我無甚麼分付少頃寄浮法師仝陳華甫益朋二居士恰從禹航來問候師一見合掌微笑遂坐脫時戊子正月初八日申時也赴及遠邇靡不驚痛越九日化山和尚渡江來封龕容貌如生封竟乃筮塔於龍門案山金龜巖下去寺三百武坐南向北師世壽五十有六僧臘三十又五初師主龍門葛公屺瞻恐師再受別請師曰脫余若赴諸山畢竟歸根此地公欣然今師豫知時至示寂茲山信師言之不爽已師天性沖醇凡應緣酬物俱以慈忍力循循善誘有媺必彰有瑕必隱為世導師罕有其比然整躬勤勵自超方以至行道三十餘年雖祁寒溽暑丙夜不寐先覺有言古之君子其責己也重以周師之謂與嗣師而建幢者即念現主越之象田石浪如主信之鵝湖饒之薦福其餘尚在水邊林下潛行密用師嘗謂門弟子曰誘引後學度量須倣博山接納上流機用宜如顯聖雙眼圓明振起吾宗使狐狼野干假借不得是所深望也每見時輩分洞分濟抑此揚彼主普明時撾毒鼓推出瞎驢使接斷橋一脈有曰洞濟相參千古一遇至若所歷道場去住如雲停鳥飛不可方格其機辯峭拔入理深談則見於各會語錄中其遊戲翰墨綽有風雅則見於雪蕉諸作別有闢邪說合若干卷並傳于叢林後之覽者將藉是以知師者焉不肖柱覲師有年維是生平涉歷本末機緣聞之頗詳謹倣年譜例譔次行實惟祈立言君子博綜先師遺墨摘其大要論而著之以垂不朽後學幸甚往哲幸甚時戊子仲春朔旦攝佛日方丈事嗣法小師淨柱拜狀杭州府海寧縣慧力寺比丘淨時等助刻資肆兩檇李苾芻弘籥梁溪苾芻等睿鹽官苾芻智圓仝勸募刻此佛月石雨大和尚法檀二十卷費銀九十五兩歲在己丑春王正月鼾關道人識
