body:
  text: 石雨大師法檀敘自五鐙分焰洞上一宗精詳綿密辨魔揀異真如寶鏡高縣狐妖落膽救顢頇大病之良藥也一橛頭亂統禪望崖而退矣乃反從而譏之曰是義解也是教理也猶越人安於斷髮文身見章甫玉帛而譏其為繁文縟節耳夫一棓一喝出自德山臨濟覿面提持自是迅雷掣電利劍慧刃奈法末人漓稍具一知半見者能倣而行之矣久之而狂狐野干之屬竟冒而行之矣惟洞上宗旨慧刃利劍即是玉線金鍼掣電迅雷具有正偏回牙以儱侗承當之不得以意識湊泊之不得苟非徹法源底脫盡窠堀烏能達五位之玅用出三漏之網羅哉從上諸大老潛機密用至今日而猶有升其堂入其室者寶鏡之光煇其佛法之命脈乎中興洞宗而為法王之周宣漢光者江西則有壽昌兩淛則有雲門焉石雨大師雲門之法嗣也知見超越機用敏捷導大行於閩淛之間真雲門克家之子憶癸亥歲雲門大開鑪韝集龍為萬指而蒙印可受付囑者乃為兩少年沙彌石雨三宜二大師是也當時一軍皆驚而後皆服雲門擇法之精盍分豪不爽益信雲門深得曹洞不傳之秘而辨驗之下自能棄汞取金進璠璵而退碔砆也大師初披緇於武林法相即有俯視一世之概一缽飄然寸絲不蓄遂為新安諸名士所重而納交焉非所謂虎生三日氣已食牛者乎大師門人集師語成錄予讀而快心焉直截與精密盍兩得之矣亟請梓之以救末法顢頇之病而因弁數言於首予之師事大師猶先大參之師事雲門也不復以不文為辭矣山陰祁彪佳拜譔石雨禪師法檀敘雲門宿古廟中拾得洞山寶鏡圓明清淨鑒照十方佛來魔來面目全露末後以光明藏囑付石雨禪師余舟過鏡湖寶光露現鏡中相見眉目宛然乃知雲門猶在也鏡裏機緣無容久薀特為拈出以示諸方海道人黃端伯題石雨禪師法檀總目原敘祁彪隹黃端伯卷第一住紹興府天華禪寺語錄卷第二住紹興府雲門顯聖禪寺語錄住杭州府寶壽山光孝禪寺語錄住福州府怡山西禪禪寺語錄卷第三住福州府雪峰禪寺語錄住汀州府靈山禪寺語錄住建寧府普明禪寺語錄卷第四住建寧府考亭靈峰禪寺語錄再住紹興府天華禪寺語錄再住杭州府寶壽山光孝禪寺語錄卷第五住杭州府龍門山悟空禪寺語錄住嘉興府東塔廣福禪寺語錄卷第六住杭州府皋亭山佛日禪寺語錄上卷第七住杭州府皋亭山佛日禪寺語錄下卷第八紹興府象田禪寺語錄紹興府蘭芎山禪寺語錄普說示眾一卷第九示眾二卷第十機緣卷第十一頌古卷第十二贊卷第十三法語詩偈一卷第十四詩偈二卷第十五詩偈三卷第十六序記銘跋卷第十七疏書問一卷第十八書問二卷第十九佛事卷第二十祭文雜著行狀塔銘嗣刻
