body:
  text: 嗣法小師淨柱編贊騎牛出山像贊食雪山雪白而且肥一色邊事人所見希隨類而墮如虎之赴驀爾騎歸忘卻舊路噫隨緣水草納些些花落珠藤鳥亂啼蓮花座觀佛贊法身本無相無相非法身六載雪山雪忽爾春風新春風新鷓鴣頻寶花王綻絕纖塵剎那邈得伊神否擬議幾何失卻真佛牙贊如何佛說法亦不惜齒牙牙法兩無壞永永鎮群邪細字金剛塔贊金剛為體無縫可通慧命所寄能仁所宗天光明淨雲色朦朧如沙聚海如蟻行空即之也寒潭月影撈摝無蹤望之也撐天拄地八面玲瓏斯之謂寶王塔而現於一毫之中接引像贊不立一塵捨師不得不捨一法取師不得不取不捨恁麼得依舊勞他一臂力吾師腳跟不點地纔聞喚著忙回視一縷纖雲引臂長逢人便道西方事霜林夜半鳥驚棲無令好夢風吹去盡作唯心淨土觀遲遲五濁放身安迢迢每欲空回首臂已長伸屈復難普賢大士贊二則熱惱場中眾苦交逼左之右之無法可釋騰騰象王以雪為食從眉山來業示其白異類中行普眼莫測但存想間儀容儼集咄咄獲得真贓走卻賊萬行莊嚴如意之故走遍大千不曾動步盡道恩承白象力誰信曹山立三墮獻象圖散星成象睹星成佛牧象以奴獻象以法法邪乃狂法正乃降佛從海湧波浪汪洋汪洋奈何截流而過得善現者庶不負圖觀音大士贊聞得老兄當年買胡餅放下卻是個饅頭只今在此死丁丁立個甚麼噫踏著了也貪他一滴枝頭水不得縱橫自在遊鰲頭手執楊枝瓶不提魚去沽村酒不踏鰲頭海上來鸚鵡堤邊銜柳去南詢童子未曾回咄且問你將什麼利生休休騰雲駕霧不如你說法還須老比丘雲端應現重重三十二光彩無非一月真除卻寒潭千尺影誰得當天指示人水月神悲行苦言真露甘熱跣其足寒幪其毿無剎那頃思靜離喧婆心最在無人處細把楊枝著意參楊枝淨水應無子之求憐有子之累隻手迎送間施彼了無畏送子幪頭唯衲被觀者自知音逐臭隨香者多從紙上尋纔放魚籃便把經卷掣電之機換善財眼噫淨瓶打破方知歇今且從人亂指點因看月在水萬境悉平沉再四親撈摝良哉觀世音水月世界大海中眾生沒于苦自古運悲人慈航把柔櫓西行浪復東無計回長風業有所不免變現終無窮獨有普門士應身三十二如解轉拳人手無縛雞勢聊爾借婆衫拜婆了年事隱隱袈裟吹隱隱雙趺危寶髻青山聳纓絡秋雲垂忽爾全身坐忽爾眾生度不見有眾生秪把楊枝顧癡情盡說飛甘露分明以水濟于水丈夫終不從他誤誌公十二面難描從茲筆底無回互大海中柳枝即此物非他物得到手鮮潑潑任君殺任君活價不相應賣不成短巷長街喚一聲人人打動化龍情猶待春雷撼地鳴魚籃原非男女忽示女相女人得度何男女相垂手不入廛動足不點地身居潔白中好願酬還未稽首挹香風萎花願吹去更雨新好者接人方有據噫憶昔孤峰絕頂時一捏直教成粉碎蓮花隨眾生機性惡性善覿面提撕寶花利劍目橫秋水眉舒柳色喝開童子渺然玄寂一字一句從胸流出通身是口示普門德誰是知音還從胸沒女人應受因類女則普門細字像從胸書起末復至胸可開神妙大士既證此圓通又不肯住在裏許要我題破其中意言外知歸還讓你圓光下像一波纔動萬波隨之雲行風捲柳露垂絲一釣便上當機者誰不擇異類良哉大師布袋和尚贊遇物便採入遇人便傾出問他作什麼倚杖笑而立設更擬議間提起走不及無奈袋口何所以成狼籍包乾褁坤容妍納醜四十九年何所不有忽爾知非拄杖在手便好乘閒打開袋口呵呵寶壽山高月半銜漸出雲衢人見否攜歸更問長耳叟為法相可公五十壽松根為枕布袋為蓆白雲青天懶去求食一覺醒來腹猶果哉千古一笑兩眉豁開伏虎羅漢贊猛於虎者唯慈忍力大空小空就手而食大空既空小空不從頻頻回顧示以怒容朝陽補衲贊荷葉收香秋麻正長鶉衣結就糞掃堆旁衲頭下事針針相似咬斷線頭方可接續寒山拾得贊寒岩寺裏討飯來國清寺裏燒火去盡道文殊與普賢相逢狹路難回避噫石塊木樁有何憑據十八大阿羅漢贊長眉曝日而童子進香者離離披披水田其衣霏霏拂拂霜雪其眉心擬向日乃負其坐背癢不禁侍者之故對巖花而翻貝者依文解義三世佛冤離經一字即屬魔言頹然一翁二俱不羨巖花似火雙眸若電傾瓶放光而出神遊戲者倚光而出非意所生不知何日打破淨瓶放過一著落在第二一若不存二復何寄山居靜坐而猿猱獻果者蟠桃既熟知是幾年偷心所得誰為汝憐爾不異我不許藏躲但辦肯心妙哉厥果坐參經義而執卷忘倦者老老大大手不釋卷懶逐文言只圖遮眼眼既自全月亦自圓世人若看牛皮也穿攜卷坐柳陰而次第簡閱者出息不涉入息不居眾緣陰界不能礙渠楊柳春回莓苔轉綠一大藏經從頭再讀定中有鬼撼錫而不動者把住要津官不容針略通一線山鬼入林不采無窮伎倆有盡過十小劫金錫乃振倚樹高臥而獼猴為伴者津梁既疲未忍言歸尚有侍者聊以應機侍者為誰二獼猴子一動一靜自成賓主拈丹桂枝以示鹿麋者無法可說花拈一枝香生滿谷悟者為誰鹿性既馴馴復何守庶幾無聊可以為友騎三腳蟾以出海者無物不有無時不然龍宮雖好不可久延撒卻驪珠衣中自有為有力者負之而走騎蝦精破浪而出者江既無底海亦無邊路頭在手白浪滔天如人履地人乃不會何獨疑于一蝦之背握玻璃盞以調藥餌者玻璃盞子內外明徹人兮無此何以利物藥餌漸調慰彼疲勞匪酥匪酪飢渴乃消擎缽多而降龍者我無神通神通在龍雲周雨遍不離缽中縱以為體奪以為用誰為阿師只堪應供努臂目而伏虎者爪牙既斂夙習未除努目而視安敢縱渠大空小空始絕回互若欲把門還少一箇亦有布袋而非彌勒者同不在心異不在腹以有布袋令人描摸是耶非耶擬之即差可知兜率不是爾家坐睹塔光而擁衲者孤峰一衲似有來繇誰知只在光影門頭光不透脫雖云是病不妨借此為炤妖鏡坦腹而布袋者天上無姓地下無名當年一問粉碎乾坤廓落一囊嗒然忘我大千有物無不包裹擊磬而出定者欲觀自在未絕偏圓離出入際默爾忘緣既非無語亦非有證誰似其人一鳴其磬寶公贊鶴凌侍者請十二時歌步步嬌曾從異類出鷹巢還須化鶴凌霄漢尺拂休忘鏡剪刀初祖贊崑石請崑山有良璧如何喚作石武帝問西來西來道不識不立文字誰是知音楞伽四卷可以印心但能推倒嵩山壁便好為他的子孫立雪齊腰贊齊腰不沒膝此意許誰知只可面當壁翻身早已遲冷眼難瞞熱心一段死不干休雪花片片可憐坐斷十方者到底被他將眼換好雪片片落不著面壁多年不禁寒心未安時臂未斷展開還好與人看真歇了禪師塔在皋亭山方被劫火其僧以繪像索題募建題落驢前贊落馬後秪這些子火燒不透殃及兒孫是誰之咎使有人云歇了休拽取鼻頭來寶壽不應觸諱犯當頭紅爐雪又重芳茂雲棲宏大師贊生平不識彌陀面今日毫端全體現人人盡道見雲棲誰向雲棲那邊看雲門湛然和尚贊洞山於良久邈得雲巖禪誰知因過水兩眼方始圓年深代亦遠幾希失所傳江南雲門裏放下無聯纖復為分明極令人話正偏寶壽山何秀西溪水亦鮮以此示後賢後賢曰儼然古越雲門法幢獨露價賤如金貴如土故有空王俸了不知顧邪風振搖即隨類墮令人對此憶曹山毀之譽之誰之過聞說雲門夜半日出一人傳虛萬人傳實捧拂拈篦對面不識祖彌不了所以殃及兩手握何物持歸問汝師汝師曾問我我今復何辭譬如溯流者溪石多參差攀攬所不及情知源在斯因師乃聞我因我聞祖翁祖翁曰耳聾知此乃可起曹洞之正宗為寉陵智超請宗傳曹洞戒受雲棲教尊賢首總作全提或拖布袋郎郎當當或登寶座巍巍堂堂雲門惺惺天華寂寂養子之緣子肉不食擬報師恩幾缺師耳描師邈師隨類墮只真不可邈一邈便像眉目儼然卻成兩樣不兩樣能隨類墮者是之謂雲門湛老和尚石傘在上若耶在東門齒不缺耳朵不聾是耶非耶豈力未克噫持書千里迢迢客畢竟何繇到此中博山無異和尚贊腳下無私隨往自適今之古之路逕開闢舉壽昌宗起博山宅把住要津為眉毛惜噫拂子橫拖不顧人至今幾個知恩澤密雲和尚像贊一條白棒顯家風今日相看影現中道師不足隆臨濟怒髮莖莖直指空麥浪法兄如六賊戲彌勒像贊舉動如天衣再來遊戲如彌勒應世秉拂於顯聖雲門住持於彌陀梅市悄地裏結卻袋口忽然間拽杖而去那管伊六賊六通一任他扯來扯去斯之謂麥浪懷兄永不負先師之記聞谷大師贊雲棲的嗣淨土正宗龍池有囑掉頭弗從西來祖意曲暢旁通川趨流赴苕溪道中隨方應化雁過長空影非留水此似誰容我生武水鄉與師同擬議師德海月可籠吾師之德撈摸無蹤瓶窯火發庶幾可攻說淨土法開慈悲方師去我來喜挹遺香淨慈隔岸游芝山堂開卷拜贊是我同鄉東山爾密和尚贊東山阿兄宗通說通誰是其人水上尋蹤具足禪師贊白石之上青松之下是誰似伊得能瀟灑何以孝聞左無股者解脫自居世間頓捨同師點沸共抽薪也派出源分易幾冬夏泡漚復親活埋話新電影忽墮空花未淪且結空果聊以獻蘋秋風落落難擬其神春流浩浩彷彿其身身與神會午夜紅輪手執何物欲誰付與我為證明須一轉語不是木蛇豈曹家女喚作如意非我儔侶兄雖點頭我亦不許薦取薦取不負同處題瑞白和尚住陽明洞銕壁居秋景畫像時開法雲門坐破銕壁伊誰可測常扃柴扉見亦不識別峰拜之一龜毛拂舉兔角杖摟陽明窟飛一葉秋揭藤斗笠不離把茅啟雲門席豈忍不禁先師累及噫盡道世間行樂好逍遙那及在山日巍巍堂堂辨邪別正六出瑞花其白無並寒殺闍黎韜幾晦微曹洞一脈大地春歸南明大師贊遠臨臨濟中接斷橋車車溪水鴛湖淊淊噫者個緣何無一滴沿流不止問吹毛自題若耶溪上雲門月流落清流話圓缺平旦拈來作鏡看卻教胡餅知時節何時節試問黃橙與綠橘寓清流橘山為旦平請曹洞正宗何背何向試問觀者果像不像不是暫時落魄便是白衣拜相寶壽龍門枯藤槁木顧虎頭輩十描九錯寶鏡無塵黃金無真因緣時節藤木生春噫省然眉目霧將散看取麟湖月上新省眉請雁過長天秋霞作箋一筆兩筆影落寒泉泉不留蹤雁不遺影你是何人示人以景不是景手執木蛇知為誰昨夜夢溪清夢醒咄印如請西溪深處古杭之餘峰七十二何處逢渠昔有政公好騎黃犢人或擬之柳鞭一促騎牛象奇哉寶壽追蹤熊耳九年面壁沿流不止魚魯鬚眉鳥焉衣履畢竟如何逆流洞水九壁請寶鏡堂前一輪明月背觸俱非如入虎穴擬犯其威遭其耳缺吾道欲隆記取時節正月小盡梅花似雪寒影入溪任人拈掇道隆請三喚三應意豈有他只此斷拂覿面非賒梧桐瀉影秋月欲斜西山雖好不是你家為日生侍者請時生將歸寧化之西山菴因汝識我我不是汝高踞要津把斷拂子淨玉瑕生曹溪洞水何物沿流云祗者是淨玉請衲僧氣宇山清水碧塵累既清無往不適拄地撐天此外無禪可密傳者密在汝邊傳侍者請如是之法佛祖密付逗到靈峰一拶便露任伊描得十分真寧識曹山尊貴墮咄玄豹齋中偶然佇立一人傳虛萬人傳實若道是曹洞正傳為甚麼到者裏拈椎豎拂咄汀州本然請是渠非渠鏡裏尋渠撲破鏡來觸處逢渠天華顯聖雪峰長慶只因寶壽扯拽不定扯得定綿江撈得獅峰影衣裏戒珠須自證寶壽之寶雪峰雪分付諸人莫辨別若搭生薑賣與人管教辣斷娘生舌雲庫頭請說像不像野燒不休燎天灼地此箇獨留愚者怖走此復誰收問取淨節是真火頭節火頭請旁通法眼曲暢雲門即此面目曹洞後孫題久默像弁嶽峰頭浪潑天誰云妙唱不干舌太湖澄碧峰影斜不務速說今已說唐存憶居士行樂圖子孫拱立童子送芝人生行樂耳玅云樂有極寶樹行有林盤陀坐有石花輪胎始成蒲輪擬相迫此際紫芝香即之不可得色果即空耶壽茲良可釋選佛亦選官語諸賢子息題章天對居士小像角巾原不染風塵博得清閒倍爽神樹下有形能息影石邊童子慣隨人破瓢擲去成奇響斗笠掀開不厭貧古鏡自來如面闊一回深炤一回新題穆溪野老小影即曹愚公居士優哉游哉出朝入埜豐草長林是所思也道可樂乎道可行乎溪影自炤渠正是吾題江陰芙蓉菴渭筠真日中逃影既已知非攝身松下似與世違身亦是影孰究其微芙蓉湖上秋月輝輝再三撈漉始得忘機遠思曹司理乞題行樂圖三首一經既明志忽青紫春至花發於我何喜勵志一經歸受一錢恐傷我廉傳經之外此復何嫌廉風兩袖身心家國擬負而出月明星稀照我迥立靜夜憂時澄泉行樂圖華嚴五山一山之首有老比丘年七十九見慈舟翁親雲門叟靜養自怡不遑他走香水海月豁開戶牖如寶鏡光畢彰妍醜隱現之機永垂不朽明年好學趙州禪若到龍門即寶壽孫冶堂居士像五百頭陀結一緣扁舟別業到梅川紅衫竹杖追蓮社世外風流不問仙劉元城居士像遊雲遊宦前身後身水月既隱鏡花復新撥轉鏡看何喜何嗔是速朽業是千古真嘉興府天寧菴比丘明淨施貲一兩信士徐煥淨璞智萌各五錢廣遠霞谷智開各三錢金門智全湯門智信各三錢仝梓
