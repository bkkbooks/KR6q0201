body:
  text: 嗣法小師淨柱編示眾二中元示眾大眾今日是目連救母地官赦罪之辰雲集懺悔亡者可以超生存者可以獲福此是世間父母也然出世間亦各各有個父母他能長你法身養你慧命大眾還知麼者個父母非形像可求非遠近可見非呼喚可應然眾中亦有父母俱喪者亦有父母俱存者且道又如何懺悔使他超生又如何保佑使他獲福還有停當得者麼冬至普茶示眾因咬核桃聲遍響師曰圓眼殼薄核桃殼厚爆地一聲如獅子吼乃佛乃祖拋向腦後人喜神歡應個時候大眾圓眼已喫了核桃已破了還有一個果子自古至今不曾有人咬著你道是什麼果子昔日洞山與泰首座喫果子次乃問有一物上拄天下拄地黑如漆常在動用中動用收不得且道過在甚麼處泰首座云過在動用中洞山喚侍者掇退果卓今夜還有與首座雪得屈者麼良久曰洞山果子且置天華者裏也有一物上不拄天下不拄地明如杲日不在動用中動用即收得有什麼過處且道與洞山是同是別若道是別喫了洞山的還須更喫天華的始得若道是同如何是同的意請將平生所參所悟的盡力攜來細細商量看祁季超居士昆仲請示眾簷前滴瀝非關雨階下臘雪作春水一輪明月黑雲遮不照其餘照盆底于中有句全扶有句全捺有句半扶半捺有句不扶不捺還有簡別得者麼問答竟復舉拂子曰喚作拂子則觸不喚作拂子則背畢竟喚作什麼良久曰應以居士身得度者即現居士身而為說法遂擲拂子歸方丈為來雲進關示眾教網彌天禪關匝地須具透網功能方可遊身網內不有過關作略那堪滯跡關中出入自由者將大地作一關房不用大家著力隱顯無礙者將關房作一大地豈容獨自承當著力承當也須驗過始得今夜且與大眾略序閉關大意有世間關有出世間關世間關又有多種出世關亦有多種然在來雲分中實非此例喚作總不與麼關得麼良久曰池邊柳欲拖金裊屋後梅將趁蝶飛法相寺示眾別復聚聚復別五年絕足不曾來生者自生滅者滅若知生滅本來無大小眉毛喜生睫若不知更饒舌須信說時無可說深夜諸山萬籟空孤雁一聲天外切更不會爭奈何不如念句阿彌陀阿彌陀最親切莫動口莫動舌莫將心意默默然數珠不用頻頻撥大眾既不動口不動舌不默然且道畢竟作麼生念良久曰錫杖卓開流不住秋盡西湖徹底清寶壽示眾若論向上事本無迷悟本自現成只為你信不及不肯承當所以又入者個行隊既入行隊切不得又說無修無證的話須實實從腳根下苦參力究必須識取自己病根在甚麼處從病重處著些子力氣不得斷他須一一透過始得比如貪嗔痴等雖重似難治若能勇猛卻易治無貪無嗔無痴病雖輕似易卻難治凡做工夫先須識病次須識藥次識取藥中所忌又須知在向上事則無與麼事不見瑯琊覺禪師問講僧如何是居一切時不起妄念答曰起即是病如何是於諸妄心亦不息滅曰息即是病如何是住妄想境不加了知曰知即是病如何是於無了知不辨真實曰辨即是病琊曰汝識藥矣然未識藥之所忌也為之偈曰黃花熳熳翠竹珊珊江南地煖塞北春寒遊人一去無消息留得雲山到老看此是諸人做功夫次第榜樣請看他頌與圓覺四句如何會通只因他是真悟的人所以將病與藥與忌簡點將來何等親切頌將來何等脈絡所以悟與解天地懸殊你看二祖見初祖初祖不曾道一個字只因他信得及聽說輕心慢心便把臂斷將下來要求安心及覓心不得只與他一點道與汝安心竟便知他是悟的若是信根微薄雖也解去覓心也到覓心了不可得只因下手輕信根薄所以道是解解只解得個古人公案商量時便相似遇境逢緣便不相似矣示眾大顛擯首座只為佛法一樣西禪打首座只為世法兩般若要名布寰宇父子仍舊團圞團圞且止秪如韓文公問大顛春秋多少顛舉數珠云晝夜一百八公不會乃問首座座扣齒三下復見顛問前話顛亦扣齒三下公曰元來佛法無兩般顛乃打趁首座出院且問一樣扣齒正是師資道同為何打趁出院大眾會麼若會得即知西禪打首座意其或不會則被我父子翻轉面皮換卻諸人眼睛便各生驚異各起是非有甚交涉須知者一場熱鬧直待三賢膽喪十地魂驚眾中還信得及麼如信不及一任是非去開火路示眾有路有人行通途通車馬為甚麼今日開火路火卻不能通只恐大眾不知昨夜特舉雪峰在僧堂內燒火卻閉門叫曰救火救火玄沙以片柴從窗櫺投入峰便開門汝等下語雖略有相應恐是鬼窟裏活計即今當面另下一語看眾下語不契師乃曰雪峰捨得自己贏得他財玄沙明知故犯我已為汝下語汝為我開火路去示眾做功夫元要死中得活且問兄弟曾死得也未只管怕到死樁樁地要人激發不知古人亦有言下知歸者俱在去死十分的人纔聞點著便即搆去不是你一毫放捨不下專等人來激發也山僧舉則話與兄弟試試看昔日瑞岩常自喚道主人公惺惺著莫被人瞞好從古頌者不少近日有個沒頭腦漢頌得頗奇頌道白日青天做夢夢中頻喚主人直饒惺惺諾諾也是無主孤魂此頌有一險二難如何是二難他若知有爭肯與麼道若不知有爭解與麼道如何是一險若被大眾看破討甚麼飯喫險難且置祇如瑞岩是了手的人他頌道是無主孤魂不知瑞岩過在甚麼處眾俱下語不契師曰莫道沒有人激發好靈峰示眾昨夜雨今日晴若作晴雨會諸佛眼難明金剛經道若見諸相非相即見如來你看男是男相女是女相房廊屋舍是房廊屋舍的相畢竟如何是非相若即相求非相者是菩薩也離相求非相者是外道聲聞也相上求非相者有二一者析色明空二者即色明空析色明空者如法堂相似棟樑椽柱一一分析開來棟是棟樑是樑椽是椽柱是柱法堂相在甚麼處若道法堂相雖不可得棟樑椽柱仍有相在乃更分棟樑椽柱總是微塵合成微塵又是鄰虛塵合成更析鄰虛便是非相即色明空者如鏡炤物一往觀覽不起分別實無有相以第二念分別故有相若離分別終日喫飯不曾嚼著粒米百花林過一葉不沾此二種非相若真實見到行到亦名自了漢若只見到便為了當以謂大道不分男女相說在空中行在有中此與無為密密等外道無異從上祖師也只為此等無慚愧的別立宗門殊不知一等下流到處瞞人圖人利養硬硬說道我自悟的一切無著逆行順行天也莫測尋常委實難辨所以宗師家不得已說個探竿子奈者探竿子一些也瞞他不得故見人來便問喚作拄杖子則觸不喚作拄杖子則背畢竟喚作什麼道得相應便休不然終不肯他終是外道乃拈拄杖曰且問大眾畢竟喚作什麼眾各下語不錄誕日示眾把酒稱觴舉茶為壽僧俗雖殊二俱有咎拄杖子生則山河大地明暗色空草芥人畜一切皆生拄杖子老則山河大地明暗色空艸芥人畜一切皆老生不慶生老不壽老不得已說個如鏡炤鏡似空合空還照得麼還合得麼到者裏直得無舌人解語無手人行拳木人撫掌石女呵呵且道石女作麼生呵呵木人作麼生撫掌無手人作麼生行拳無舌人作麼生解語會得者方可與山僧慶壽不唯與山僧慶壽即與汝自己慶壽亦即與三世諸佛慶壽亦即與大地人慶壽還會得麼若不會記得盧仝七碗歌曰一碗潤喉吻二碗散孤悶三碗搜枯腸惟有文字五千卷四碗發輕汗平生不平事盡向毛孔散五碗肌骨清六碗通仙靈七碗喫不得也但覺兩腋習習清風生眾中有不隨世諦流布者不妨亦有一番快暢如或未然山僧亦有個七碗歌一碗要知有二碗不須守三碗主賓分四碗絕滲漏五碗振先宗六碗隆末後獨有七碗難下口直饒飲到半夜子雞鳴丑若人不解自知時七七元來四十九且道畢竟何時是五十再斟茶看示眾古人道諸方說禪浩浩我者裏種田博飯喫雖然此是因病施藥如初祖見我此方落於文字特來掃除今人執藥反成大病此為不可若一向坐在潔白地上謂之坐斷白雲終不妙謂之萬里無雲天有過故不妨青天上著些子塵明鏡上著些子垢不見凡夫發心至於妙覺順流而至佛乃逆流而出直是蹲坐不得既生西方連忙便要回入娑婆分身無量度脫眾生方成了辦才一坐著便名得少為足亦名悟習未除今人還曾到此地位麼還得如大夢覺麼還得曠劫無明一時頓斷麼既不能到此地位那有閒工夫覓他諸子百家的糟粕況三乘十二分教及祖師公案尚未叨陪但做得幾句詩學得兩句話便擬輕人傲物如半瓶糟水相似被人搖著便噹噹響若真滿的有甚麼響處頤浩寺示眾相遇故鄉人須唱故鄉曲欲聽故鄉曲麼須知各各自有一段本地風光向因不覺賴他世尊四十九年橫說豎說其實不出故鄉說話如華嚴最初三七其中所談不過直顯當人日用尋常現成境界其奈迷來既久致使二乘聲聞如聾若啞何況博地凡夫故不得已諸佛菩薩放下一頭教人發心興立叢林化利一方然發心有二有自未度而度人者有自己度而度人者自未度而度人者即是諸方粥飯叢林接待往來賢聖供養知識使若僧若俗各各知有故鄉田地其於自己甘心勞苦不求自度故名菩薩全身放下不顧得失不慮安危使十方施主一文一粒投入真福田中生生發生真種功德難量若徒有粥飯佛法不弘賢聖不集縱有施主布施投入邪途不唯無益抑且有損今日頤浩寺禪堂房室粗完賢聖已集當家之德不當小可眾中還有知德者麼知德即知心知心即知故鄉田地知得故鄉田地即知故鄉語話雖然古人道若人識得心大地無寸土又作麼生參昭慶菴示眾我說你不信你信我不說相遇不相逢天機俱漏洩從上古人發一言垂一語盡是垂絲千尺意在深潭不論居家出家須知古人為人苦心方肯立志若得自己明了必須利人以自己明了不過復還做人本等然後隨我願力垂手接人化利有緣今人不信成佛成祖皆因眼前不見佛祖現身隱顯不定應以顯現得度者即以顯現度之或現神變或於臨終才有遺付應以秘密得度者即以秘密度之或為人父母妻子或為人朋友鄰里但得一人一家於一言一念種真種子一了夙願又遷他化使人不知不覺故我現在大眾凡遇有眷屬發善心勸善行當如佛菩薩想莫當容易故說必須知佛菩薩苦心捨命為人如船子和尚從藥山處悟道已後獨向洙涇把釣輪竿不避風雨扁舟撐渡得一夾山便踏翻船子而化故稱船子祖師此即菩薩度人榜樣凡為佛子者須辦苦心勿令放逸示眾大道本無男女相不知出何教典此語有一利一害如世尊說法有比丘比丘尼優婆塞優婆夷四眾人等同緣共會和光相集僧盡僧學尼盡尼戒助轉法輪了無異說此一利也若僧尼混雜壞教敗倫此一害也有一等俗人聞得是法平等無有高下之說便君不成君臣不成臣父不成父子不成子主不成主僕不成僕乃至男不像男女不像女攪亂世間皆因錯會佛語不通理路以至如是殊不知世尊大意要汝君君臣臣父父子子主是主僕是僕男是男女是女不得動著不得違越自然平等平等如世尊為母上忉利天說法竟眾欲遙迎有蓮花色比丘尼自念女身見佛必居僧後乃現神力變為轉輪聖王千子圍繞最初見佛佛見訶曰汝何得越大僧見我汝雖見我色身且不見我法身此教體如是若論宗門會下別有出格一路如妙總尼因參訪得悟後為郡守張公請住資壽禪寺開堂曰始從鹿野苑轉四諦法輪度百千萬眾山僧今日與此界他方乃佛乃祖山河大地草木叢林共轉大法輪若一草一木不轉法輪則不得名為轉大法輪大眾且道者老尼得個甚麼道理便解開此大口雖然有個疑處山僧蘊於胸中三十餘年不曾舉著今日要問大眾既是乃佛乃祖至於一草一木共轉法輪不知聽者是誰參示眾若論此事十方無壁落四面亦無門只為你不肯承當一向入門入戶不能通達無礙所以佛日者裏隨汝顛倒更說個門與你刻期立限若是個漢一入門來便出得去解制已竟不是死定要你坐滿一期名為結制即在堂外執事於苦心志勞筋骨處透得一關不妨痛快若無個出路便是倚門傍戶的人若要硬硬裏大言不慚以為了手以為解脫殊不知者裏有個辨金石子不被你瞞過若是真解脫漢時時現前點著便到觸著便知若是假的忽地問著便面如墻壁正是暫時不在如同死人待你停機佇思便有禪道佛法機鋒轉語搬出一栲栳來總名鬼家活計亦名心識運為有甚麼用處如今日貼單大家只管貼單正碌碌中被山僧一問曰名是虛的為什麼貼將起來個個認得到那裏去大家一時無語雖元木維那請歸方丈也只救得一半此皆謂之念頭不在的人以後須知慚愧努力參究堂內堂外倘能遞相護助遍相警策庶不負此艱難世界相聚喫杯茶說幾句家常話莫當容易施主一粒一絲捨來都是要償還的不是等閒努力努力示眾古人云有佛處不得住無佛處急走過又有道祖師心印狀似鐵牛之機去即印住住即印破又有道藏身處沒蹤跡沒蹤跡處莫藏身此等垂語圓活約有兩義若作道理依通唯是不許人住著若別有說唯在學人善會今夜且問若無住著大似腳不點地的人若有住著便不相合如何古人有許住阿蘭若如何又許佛子住持須知不許住者恐你住於身住於心住於家事住於眷屬住於冤住於親等你若不住於色不住於聲香味觸法終日釘釘著也是無住繩縛著也是無住所以得無住者方許住持方許住阿蘭若方可受施主供養所說施主供養一法施者受者各約有三種也有人情施者有輕慢施者如蹙爾謼爾之類此是下等有望報而施者捨一文要一文福不與你兒戲此是中等若是上等即是施恩不望報即是無住相布施受者亦然有受而不知恩者騙得些哄得些因果不顧自私自利一味放逸無慚無愧此最下流也有受一文必要報一文者此中等受施者也若是上流不見有所施者不見有能施者此等方可報不報之恩如今日養虛堂主不肯自受利養特為施主轉為供養佛日禪眾亦見無住之一班矣所以經云供養多凡夫僧不如供養一四果供養多四果不如供養一菩薩供養多菩薩不如供養一佛供養多佛不如供養一無心道人但不知如何是無心道人所以常對大眾道古人云佛法在屙屎放尿處在穿衣喫飯處在迎賓待客處你若舉心動念即不是了也畢竟如何是舉心動念的穿衣喫飯如何是不舉心動念的穿衣吃飯若分不出饒汝說妙談玄都是從半中腰參學起的都是不知先後的所以只管學機鋒學轉語做頌做偈大似未學跁先學走一般饒你走得不知跁的光景亦不能接引後來不可為人向來山僧住幾處道場都貴單提向上將謂者些粗淺門頭戶底定是明白的不知問著個個面墻山僧自出家一兩年者些便解無有遺餘只是用不著常念先師見學人到做不來處便學機鋒轉語歪知歪見築著一肚說道今生縱不能徹悟得個正知正見也永無退失故山僧近日拈出極尋常的話問人要人從腳跟下穩實去所以拈出雲棲大師見道偈來問人云祇如道二十年前事可疑三千里外遇何奇焚香擲戟渾如夢魔佛空爭是與非那裏見得他見道處若道二十年前話頭不明直到三千里外遇著某知識纔悟為奇何故不見他行實裏參某話遇某人逢某境某處是三千里外縱許有參某話遇某人逢某境便述此說話如何見得他悟道若不知他落處不見他有宗門眼處便好一日做他幾首人人做些難道都好筭得悟道麼若於此看得他個落處看得他眼出來不妨喚他個知有的人今年大眾可稱老成可謂精進眾中也有棄功名來的也有丟書本來的也有捨安樂來的大家同堂共住無是無非無爭無鬧不要說請方要此期場絕少即我坐道場以來總不能及此故道糧雖有欠缺叢林事雖繁雜山僧不敢辭勞雖甚辛苦因心甘受不至疲病恐你們坐在此中不知難得若知得自當慶幸死心守住孜孜參究久久不放山僧情願化米供養此亦可報不報之恩處也珍重秋輪禪人備茶筵請示眾佛說天下有二十難貧窮布施難富貴學道難拚命必死難乃至善解方便難隨化度人難心行平等難如山僧住佛日難又豈止二十而已大剎復興難今已興新舊和合難今已和合末法開堂難到處狂禪熾盛呵斥參究今堂中二百餘眾俱是苦參離亂集眾難今禪戒共有千二百餘如水乳合歲儉募化難今各會首領募四十八願成就者多化了一直到家難今已得路途無阻到岸運入常住難今已運入運入了炊煮的人難消受的人難今喜各各歡喜各知慚愧道場圓滿難今已圓滿圓滿已從新起頭難大家領領緣簿願者領去不得勉強謝茶
