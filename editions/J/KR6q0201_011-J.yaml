body:
  text: 嗣法小師淨柱編頌古世尊初生二首風淒淒出林虎煙迷迷霧鎖鎖大地眾生眼欲開忽然撞著雲門普楚歌聲一何苦八千兵散何所裊裊餘香滿世間伊誰聽者忘淒楚鶻臭娘生褲一腰痴人道是赤條條縱然夜半明星皎汲盡天河洗不消世尊睹星悟道今也見古也見何曾能得全身現抬頭失卻眼睛光大似優曇時一獻奇哉三界苦眾生一時炤破娘生面世尊拈花世尊逼豬迦葉打狗李四知香張三識臭我欲驢前為證明依稀又落馬蹄後若是雲門偃祖來滿口不消道個瘦菴提遮女問文殊明知生是不生之理為何卻被生死之所流轉殊曰其力未充後進山主舉問脩山主脩曰筍畢竟成竹即今作篾得麼進曰汝向後自悟去脩復問進進曰者箇是監院房那箇是典座房脩禮謝說真方賣假藥絕處逢生還須扁鵲甚麼處去也千里追風趕不著金剛王寶劍出匣寒光四海寧收來滿地血猶腥太平原是將軍定不許將軍定太平踞地獅子斂爪藏牙合兩睛全身不動轉威獰狐疑不決忘前後香象愴惶醉未醒探竿影草家家深夜穩眠床風送花陰過短墻欲識裏頭真富足定多籬竇吠寒𪚓不作一喝用鳶飛戾天魚躍淵哥哥騎馬嫂乘船若還說與孃知道朝打三千暮八千德山托缽破爛袈裟搭半肩出遊無度取人嫌歸來獨掩三更月又被狂風揭草簾密啟意太聯纖活得三年豈偶然洛浦參夾山前腳不著實後腳忽移步跌倒爛泥中傍人稱怨苦莫怨苦喚得起來連累汝興化擯維那其父攘羊子證之三通法鼓擯猶遲維那昔若能幾諫不枉稱為唱道師以今世人輕賤故先世罪業即為消滅關關幽鳥啼紅翠一榻熏風驚午睡舞袖單衫入市廛張公喫酒李公醉日日是好日日日是好日歲朝不是年初一端陽粽當重陽糕中秋月餅元宵喫風日陰晴屈指推臘盡都言是歲畢咄趙州狗子家家有幅遮羞布放下便能當雨露獨怪當年老趙州擲卻頭巾頂卻褲藏身處沒蹤跡沒蹤跡處莫藏身花落花開花復殘鵑喉宛轉旅魂單傷心最處啼成血萬古人悲行路難趙州勘破婆子以楔出楔弄巧成拙銕打心腸綿團口舌活人即用殺人刀至今遍地流腥血疏山造塔愚者見之名正言順智者見之一味慳吝驀地相逢老算師掀翻幾個醃虀甕趙州與侍者賭餅同調相憐事隱淪深山鋤土不鋤金拈開覺得金如土高下千秋定管歆上馬金送去下馬銀接還存亡漢室在其間思歸不解亭侯印一劍如何破五關不見道行路難路難不在登高山雲門一棒打殺與狗子喫紛紛落井去拖人愧我無繩千尺深萬里無雲天有過碧潭似鏡月難尋乾屎橛門外小人至門內有小人一掌一握血一棒一條痕噫桃花浪破漁舟穩萬里征人泣斷魂南泉斬貓蓼花汀裏小機關物外獨超也著瞞入水救人春浪起至今點額未曾乾釣得乾魚架火熬逢人失手可憐宵朝來無限風波活赤鯉從今帶尾焦心不負人雙首座滿面羞慚王老師舉直更兼能措枉草鞋頭帶較些兒收拾乾坤把住貓飛刀血濺梵天高無端變作金獅子萬里迢然路正遙女子出定酒逢知己千鍾少話不投機半句多我醉欲眠君且去明朝有意抱琴過舉一不得舉二因緣短亭不覺又長亭秪為留君與別君忽憶虎溪橋外事笑聲今古許誰聞僧問審下如何是佛法大意下云貧兒抱子渡恩愛競隨波盡謂易分雪裏粉誰知難辨墨中煤音書有恨曾相寄未審遊人歸不歸婆子燒菴冬令冬行也大奇何緣劫外起春鸝驚殘旅夢天明後幾個惺惺幾個迷高峰無夢無想主人公半生活計一漁舟幾度風波為下鉤行向桃花源盡處歸言獨自訪仙游武陵守親垂叩興敗無寥方自咎休自咎一溪水緣仍如舊雪峰義存禪師參德山問從上宗乘學人還有分也無山打一棒曰道甚麼峰曰不會至明日請益山曰我宗無語句實無一法與人不是騎牛覓牛便是以水探水一劈華山兩開自首從來免罪未免罪黃金無假不須真纔到鰲山俱撲碎鼇山成道因緣隨風逐景探煙霞浪子回頭便做家若道今朝方悟道鼇山依舊在天涯鹽官洞上德山來桶底三番大脫開不是巖頭周匝好至今儱侗不堪抬雪峰見僧來以手托門放身出曰是甚麼僧亦曰是甚麼峰低頭歸菴僧到巖頭舉前話頭曰我當初若向他道末後句天下人不奈雪老何僧後再請益頭曰雪峰雖與我同條生不與我同條死要識末後句秪者是一箇為人須為徹一箇殺人須見血欲得燒成九轉丹同條生不同條滅雪峰見僧來參便曰是甚麼是甚麼月滿長安路正堪眠不免曹山墮是甚麼紅爐不是火煉成金今人棄如土雪峰上堂輥出木毬玄沙捉安舊處半夜三更神出鬼沒演咒書符還見也不雪峰因玄沙來三毬一時輥出沙作臥勢峰曰你尋常用幾個曰三即一一即三人人盡道雪峰有當陽難掩玄沙口一三三一是幾多分明露出家常醜南山鱉鼻蛇因緣父子相將學弄蛇一千五百眼俱華南山喝去全身露毒氣彌深莫觸他拖人下水不濕腳下水拖人腳不濕玄沙不顧犯當頭一手扶人一手搦雪峰示眾曰飯籮邊坐餓死人臨河渴死漢玄沙曰飯籮裏坐餓死漢水裏沒頭浸渴死漢雲門曰通身是飯通身是水說邊說裏說通身總是畫蛇添足人曠劫無名名飯水一番拈出一番新雪峰上堂曰盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶問雲門曰雪峰與麼道還有出頭不得處麼門曰有慶曰作麼生門曰不可總作野狐精見解電卷星馳會者稀滿山依舊雪霏霏雲門長慶遵師旨普請搬柴尚未歸雪峰遊山次指面前地曰者一片地好造個無縫塔沙曰高多少峰乃顧視上下沙曰人天福報即不無和尚若是靈山授記未夢見在峰曰子作麼生沙曰七尺八尺顧視上下七尺八尺佛界人天分等級無等級通途特地栽荊棘一尊塔樣兩人爭塔卵爆盡我還出雪峰指火曰三世諸佛向火焰裏轉大法輪沙曰近日王令稍嚴峰曰作麼生沙曰不許攙行奪市雲門曰火焰為三世諸佛說法三世諸佛立地聽殺人火活人火火性無情莫莽鹵鑿壁偷光已有人兄弟相將學步武久假不歸歸便休眉毛惜取留還我雪峰普請次路逢一獼猴乃曰人人有一面古鏡者獼猴亦有一面古鏡三聖曰曠劫無名何以彰為古鏡峰曰瑕生也聖曰者老漢著甚死急話頭也不識峰曰老僧住持事繁話端使不是瑕生古鏡無明辨不清驀地持歸相炤耀獼猴從此露全形雪峰在洞山作飯頭覆卻米盆因緣一枝佛法到龍潭吹滅殘燈徹髓寒九上三登明此意砂盆覆卻總無端雪峰因僧問古澗寒泉時如何峰曰瞪目不見底曰飲者如何峰曰不從口入僧舉似趙州州曰不從口入不可從鼻孔裏入僧卻問古澗寒泉時如何州曰苦曰飲者如何州曰死峰聞得乃曰趙州古佛遙望作禮自此不答話藥因救病出金瓶劍為不平離寶匣相如何事愛廉頗趙國方今在兵甲雪峰曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈玄沙指火爐曰闊多少峰曰如古鏡闊沙曰老和尚腳跟未點地在從來好手讓僧繇畫影圖形未肯休自古誌公無面目于今點出一雙眸化為龍飛去了堪笑三郎坐釣舟雪峰因閩王施銀交床僧問和尚受大王如此供養將何報答峰以手拓地曰輕打我輕打我欲見雪峰無處真閩王銀椅驗來親誰知一代傳持者卻作靈山護法人雪峰因閩王封柑橘因緣咒咀諸毒藥所欲害身者念彼觀音力還著于本人雪峰僧堂內救火因緣柴頭發火救須柴此事誰人省得來要見父慈因子孝自將門閉自還開病入膏肓可奈何良醫拱手藥誰和如非別有超師作海上奇方有幾多三聖金鱗賣油娘子水搽頭不覺衣衫盡是油更欲當風兼賣俏被人掀倒罵無休雪峰因閩王問擬欲蓋一所佛殿誘人犯法得人僧反逼將來愧不勝兩手攤開遮不住至今枯木倚寒藤雪峰望州亭相見話烏石嶺頭石色鳥望州亭望趙州過二番相見無差舛及到僧堂便懡㦬一大藏教是個之字只知以楔出楔不解將空塞空葛藤窠裏翻身易當道難栽無影松玄沙三種病人將謂抱贓叫屈原來賣弄家私硬證烏龜作鱉釣魚習氣還癡甘贄入南泉請黃櫱散嚫癡憨頑鈍瀟灑風流學人不會休休休休玄沙因我得禮汝因我得禮汝誰云話彼此隔岸咬蛇聲帶累蝦蟆死夾山無舌人解語無舌人無舌人千年枯木一回新杜鵑元不喚春去客路傷殘夢自嗔不用嗔就路還家盡是親法眼問永明智云隔壁聞釵釧聲便名破戒今男女駢闐又作麼生智云好個入處眼云此子他日有五百毳徒幾多媸蠢幾多妍覽遍名山又市廛無奈家貧遭劫久借婆衫子拜婆年其一春光別貯一金壺擬學江南唱鷓鴣謾把花枝招石女橫推不倒直須扶其二和普明禪師牧牛頌無端露地忽咆哮蹤跡分明路已遙無計喚回奔競苦權將野草當靈苗未牧崎嶇石徑四蹄穿水盡山窮下一鞭且得鼻頭繩在手東西從此任吾牽初調顛狂每欲息驅馳你若思歸我亦隨運足不知途路遠綠楊鞭影送頑疲受制也只尋常這一頭何須今古較剛柔前村更有閒田地水草依依且暫留迴首每憶溪山山那邊飢餐渴飲更天然一聲黃鳥春歸去鼻有芒繩不用牽馴伏踞虎盤龍總不如隨緣坐臥已無拘橫拈短笛松陰下一曲斜陽尚有餘無礙倦來聊睡柳陰中牛入花茸又草茸隨分納些終不犯睡惺重睡睡猶濃任運人牛俱在此山中何必相煩問異同隨處風光隨處好不妨明月下天東相忘覺來拍手一身閒記得當年此日間獨立曾無牛可牧無牛猶有一重關獨照阿誰不欲共追蹤到此方知萬象空空處不留如不信前村芳草又茸茸雙泯密移一步看飛龍日出東方月落西茆堂端坐掩柴扉春來夜雨雷初動松老成龍喚不歸轉身就父那個臺無月誰家樹不春反手摸著枕定是夜眠人嘉州牛喫禾益州馬腹脹拈曰牡順和尚只知拈頭掇尾不解泥裏洗土塊頌曰長亭又短亭趙氏送夫行雁杳魚沉後孤征萬里情松江府弟子相淨權三兩丁智感趙淨塵各壹兩
