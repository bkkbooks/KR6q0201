body:
  text: 嗣法小師淨柱編住杭州皋亭山佛日淨慧禪寺語上順治丙戌九月十五日入院山門維摩不二門密密難通彌勒樓閣門重重雜沓總不如密移一步普門開法雨共霑甘露潤伽藍你是外護我為內護內外無私鼎新革故祖師西天四七東土二三若人不會前三後三大殿巍巍堂堂只是者個者個不識許多回互要不回互別行一路且道別行那一路展開坐具大家看切忌前瞻并後顧入室據此室行此令若論曹洞雲門不用棒頭取證拈拄杖曰且道者個木上座要他何用須知佛日開山老坐斷乾坤不放行咄上堂拈香祝聖畢師乃就座曰日日是好日登高也待重陽時時是好時收稻必須霜降若不登高焉知眼界之寬廣若非收稻安得香積之充盈所以道時節若至其理自彰秪如大眾要請山僧來應豈不是自彰的理出寶壽送者送迎者迎豈不是自彰的理過北新關此時賓主未分中途棲泊宿紫雲菴豈不是自彰的理過拱辰橋至軍屯裏到松篁亭雨露霑濡心田得潤豈不是自彰的理只為你大眾顧盼不及攀攬不著必待山僧登座指揮以為入院佛事殊不知換卻諸人多少眼睛了也設若更要黃鶴峰兩翅蹁躚佛日峰輝光燦爛則山僧罪過不少不得已引古證今說過去說未來說現在要你按圖索駿因言會意各各溯流窮源觸著磕著那裏欠少一些那個智眼不具若是辜負己靈全仗山僧鼓兩片皮說開山本空禪師用木上座十三歲行腳震起佛日家聲至今不墜總不如松篁亭外承清韻流水橋邊聽好音監院化主請上堂衲僧本無事無事非衲僧會得個中意符來好奉行所以古今叢席得人則興失人則廢若是其人則富之與貧橫擔而走好之與惡直負而趨乃至任恩承怨超是越非盡是當家本色更要橫拖布袋為眾打街坊在山僧讚助不及中峰國師有個托缽句子略為舉似或與多出門拍手笑呵呵或與少但得慳囊開便了或言無隨緣善巧著工夫待得傾倉都捨與翻轉缽盂渾不取且道渾不取教大眾喫個甚麼到者裏百千三昧無量義門一時現前若真是個漢如經蠱毒之鄉水也不肯沾他一滴何故聻十萬八千圓滿日歸來一一報君知上堂舉拂子畫圓相曰大眾看看三世諸佛跳不出歷代祖師跳不出一切若聖若凡總跳不出于中有個東西不辨南北不分的漢銜取一莖草來個個供養得著又畫一圓相中書十字曰三世諸佛向甚麼處去也歷代祖師向甚麼處去也一切若聖若凡總向甚麼處去也于中有個七通八達眼目分明的漢儘辦得饆饠䭔子乃至珍饈百味從教沒處殷勤所以道把住則黃金失色放行則瓦礫生光黃金失色則野老謳歌瓦礫生光則野老顰蹙大眾此雖從上法式萬古規模且道黃金失色處野老何故謳歌瓦礫生光處野老何故顰蹙若分析得出不妨橫行直撞自在自由如或未然總不如橫肩布袋米個個不肚饑為鷲林入塔上堂僧問百骸潰散皆歸土一物長靈何處安師曰你問那個長靈進曰暗地好驚人師曰度亡已竟進曰秪如死人路上有活人出身處活人路上死人無數又作麼生師豎拂曰且道者個是死是活進曰死去生來更不疑師曰拈一放一不是好手乃舉僧問曹山靈衣不挂時如何山云曹山孝滿僧云孝滿後如何山云曹山好顛酒師曰若向好顛酒處會得鷲林覺靈往生已竟若向曹山孝滿處會得無竭孝道已成若向靈衣不挂時會得大眾助往已畢雖然若要入他無縫塔日輪午後再商量結制上堂祖師心印古佛過去久矣山僧只有斷拂一枝三十大光錢買的也解穿人鼻孔直饒你踢倒須彌踏翻海水繞四天下走一遍且問他草鞋繩斷也未所以道凡夫日用而不知凡夫若知即是聖人聖人亦日用而不知聖人若知即是凡夫佛日者裏總要往來絕跡凡聖情忘行也赤條條坐也赤條條逗到他浴鍋裏去見得既不洗塵亦不洗體忽悟水因尚是依教修行只可博他饅頭粉湯風菱橘子若要金襴袈裟直待彌勒下生何故不見道雞足峰頭風悄然喝一喝上堂因裱瑞白和尚像僧指問曰和尚終日上堂為甚麼弁山和尚口挂壁上師曰恰好進曰秪如弟全歸兄一句作麼生道師曰更須歸父進曰歸後又如何師曰同時不識祖進曰謝師答話師曰還識祖麼僧禮拜歸位師曰一場懡㦬乃舉拂子曰看看于此鑒得定踏得穩那裏有干戈擾攘劍戟紛紜所以道道人行處如風行草偃開口則天魔拱手動舌則外道潛蹤還鑒得定麼踏得穩麼不得已說個銀碗盛雪明月藏鷺義解者喚作一色爭奈類之弗齊混則知處又道意不在言來機亦赴祗如此是言還動得些子麼動成窠臼還差得些子麼差落顧佇老僧如此判斷且道與義解者有甚麼差別若識得破即喚做一人發真歸元十方虛空悉皆消殞還知麼臘梅花放處何待曉春回上堂僧齋僧金博金如鏡照鏡似心合心大眾今日具之履澄請山僧上堂欲令戒基堅固殊不知離金澤跨船舷早已破戒了也過嘉興由崇德早已破戒了也到塘棲入佛日登戒錄要羯磨早已破戒了也何故聻你向佛求是出佛身血向法求是破轉法輪向僧求是破和合眾俱不得戒若不向佛求不向法求不向僧求自然如珠走盤宛轉橫斜有甚麼留礙離金澤跨船舷也是就路還家過嘉興由崇德也是就路還家到塘棲入佛日登戒錄要羯磨也是就路還家雖然若是家親作祟也須識破始得須知者著子直是觸他不得背他不得所以資鏡三昧道背觸俱非如大火聚但形文彩即屬染污到者裏十個五雙未免坐在潔白地上不得已又說個夜半正明天曉不露大眾既是夜半正明為甚麼天曉不露良久曰為物作則用拔諸苦道懷禪人薦親上堂如是之法佛祖密付教家以經首二字為指法之辭不知所指何法到者裏一場懡㦬不意雲巖老人寶鏡三昧付囑洞山也說如是之法佛祖密付不知早已顯說了也及乎道個汝今得之宜善保護大似將常住物私做人情只知智動君子不顧利動小人至今有得法保護之說不見秋來葉落春至花香時節若至其理自彰祗如今日群陰剝盡一陽上升君子道長小人道消焉有亡靈不能超脫則知今日道懷設齋薦親也是將常住物私做人情山僧應請也是將常住物私做人情大眾濟濟共臨法會也是將常住物私做人情如何得至公無私去不見道銀碗盛雪明月藏鷺上堂舉拂召眾曰會麼此是波羅提木叉盧舍那佛已如是結千花上佛亦如是結千百億釋迦亦如是結此方教主亦如是結今日山僧亦如是結山僧且不是老胡群隊他只會好肉挖瘡山僧要瘡挖好肉如何是好肉只在膿滴滴處如何是膿滴滴處過去佛已說未來佛當說現在佛今說且道說個甚麼過去菩薩已學未來菩薩當學現在菩薩今學且道學個甚麼咦有條攀條無條攀例上堂召大眾曰還知萬方多難麼為甚麼法地不動且問諸人喚甚麼作法地莫是清淨伽藍草木叢林是法地麼此是凡夫庸見不勞拈出莫是沉空滯寂凝神斂念是法地麼此是小乘邪見不勞拈出莫是攪長河為酥酪變大地作黃金是法地麼此是如來禪不勞拈出莫是泥牛吼月木馬嘶風是法地麼此是祖師禪不勞拈出啊恁麼則居士設齋禪和應供是法地了也似則似是則不是何故你若求福福在東海你若求壽壽在南山縱饒中間踏得著立得穩更須知有佛日一關在所以道句中別有意意中別有句意句不相知方有汗臭氣不見初祖西來武帝問朕布施度僧有何功德祖曰實無功德可謂髻中明珠兩手分付爭奈武帝承當不下更問何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實可謂龍頭蛇尾武帝也解用軟尖刀法緩緩問曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求可謂轉見不堪武帝當時若有咬豬狗的手腳道個原來只是者般見解將初祖貶向法海邊外焉得有今日事居士前到寶壽聞個無住相布施話又向佛日設齋且道如何是無住的意還會麼良久曰山僧借花供佛去也若以色見我以音聲求我是人行邪道不能見如來元旦上堂山僧新拄杖是本空老人故物本空木上座是山僧新用到者裏金刀剪不開金針縫不合日往月來初無實跡新之與舊悉是假名若有一個干戈不動自然坐致太平還有麼有則和神養素無則慶無不宜珍重葛去澆居士為顯考屺瞻先生請對靈陞座江山有隆替日月示往來不有斯文主誰將慧眼開屺瞻翁屺瞻翁性既不生不滅身能全始全終為佛法之金湯也感緇流之已識面未識面共山僧而助悼續孔門之慧命也使後學之已及門未及門同孝子而追蹤至于處浙而不居入閩而不出此翁之末後風光也且問即今安身立命畢竟在甚麼處良久曰大眾還聞麼若不聞山僧代為下個註腳南浦綠波靜西湖煙雨寒珍重攝心菴上堂領眾托缽缽盂口闊一任將來有口無舌無舌人語最真木人撫掌石女嚬呻十字街頭關門閉戶三家村裏絕跡無人逗到攝心菴裏來鳴鐘擂鼓設席肆筵要山僧陞座且道是何心行他要問我父母兄弟一門出家今日同眾居士圍繞法座豈不是人是則是不見明明百草頭明明祖師意咄向甚麼處去也雪消溪水活又見一年春解制上堂夜半金烏突出難辨日中玉兔覿面猶迷齊彭殤一生死儒家之妙唱即生滅非生滅釋氏之玄提露柱懷胎特牛生子且道作何詮註不得已說個格外提撕便有結制解制開堂陞座說參說悟諸事還有知非的麼若肯知非一期所修所證所得所悟纖毫吐不盡俱成禍患所以僧問趙州初生孩子還具六識也無州曰急水上打毬子又問投子急水上打毬子意旨如何子曰念念不停留可謂漏泄家風矣諸仁者各各既有如是威光為甚麼被山僧拂子穿卻左不能左右不能右還有脫得的麼莫將送客風翻為留客雨珍重上堂南天台北五臺朝隨雲出岫暮踏月明回所以佛日山門八字打開也不管你法爾如然也不管你神通妙用一任往往來來只是一宿一供雖是淡飯黃虀也要和風相送秪如昔日文喜問文殊此間如何住持文殊曰前三三與後三三且道畢竟是多少若道得攜五臺山向佛日寺裏來若道不得攜佛日寺向五臺山裏去還有麼良久曰山僧代道去也昔日文殊曾看母倒跨金毛獅子來喝一喝上堂卓拄杖曰天高地厚又卓曰日左月右無不照臨無不載覆今之古之法法何咎為甚麼黃鶴峰與仙姑洞商量將一切狐狼野干驅逐在法海邊外使水鳥樹林同聲念無量壽雖則因齋慶讚爭奈三日口臭何故南泉祖師云三世諸佛不知有黧奴白牯卻知有且道知有個甚麼明年五十一去年四十九為甚麼今年不道師忽展手曰我手何似佛手復卓拄杖曰還會麼不見道父母所生口上堂召大眾曰現成公案放汝三十棒汝還甘麼若甘則如蟲禦木偶爾成文若不甘則明珠在淵如何撈摝黃帝遊于赤水因罔象而得之一人傳虛萬人傳實開山本空禪師為問二龍爭珠而失之一人傳實萬人傳虛到者裏虛之與實隱之與現如何分析今日山僧以禪說戒因戒說禪且道是虛耶實耶隱耶現耶若謂是虛為甚麼道白月則現若謂是實為甚麼道黑月即隱若謂是隱為甚麼道胡來胡現漢來漢現若謂是現為甚麼道胡漢不來全無伎倆于此分疏得下不唯扶起本空抑且捺倒老漢如或未然說個戒如明月珠亦如淨滿月屈上堂道道嶺外猿啼簷前雀噪不道不道到即不點點即不到以拂一拂曰釋迦老子來也汝諸人為甚麼眉間白毫大光普照汝還見菩薩處林放光濟地獄苦令入佛道麼汝還見佛子未嘗睡眠經行林中勤求佛道麼汝還見受具足戒威儀無缺淨如寶珠以求佛道麼若見則白日青天飛星閃電若不見則夜光投人鮮不按劍今日日新居士為父母求薦為生母求福又為自己求進道無魔要山僧作個證明山僧念過一遍法華經了也還當得證明麼若當不得再勞大眾為渠向父母未生前道一句看秪如香嚴不會父母未生前一句直至擊竹纔悟說個一擊忘所知更不假修持且道他還會也未莫被他瞞好還有不受瞞者麼良久曰春夢未醒先入夏普梆相送採茶歌硤石惠力寺上堂舉世尊一日敕阿難食時將至汝當入城持缽阿難應諾世尊曰汝既持缽須依過去七佛儀式阿難便問如何是七佛儀式世尊召阿難難應諾世尊曰托缽去山僧則不然有問如何是七佛儀式向他道待缽滿歸來向汝道不知與世尊是同是別良久曰兩山相硤千年寺流水中分萬姓家珍重上堂師舉拂子曰觀音菩薩來也應以比丘身得度者即現比丘身而為說法昨日事已過去了應以居士得度者即現居士身而為說法今日重新又起頭到者裏觀音禮大士大士禮觀音求人不如求己求己不如求人直得刀割不斷剪剪不開山僧但可旁通大眾只堪曲暢昔日曹山問德上座曰佛真法身猶若虛空應物現形如水中月作麼生說個應的道理德曰如驢覷井山曰道則太煞道只道得八成德曰和尚又如何山曰如井覷驢曹山只知入海救人不顧通身泥水秪如山僧今日應齋一句又如何道良久曰能知六月炎天雪定識三冬枯木花錢聖月居士請陞座隱顯殊途存亡各異常人之情見彭殤一致生死齊觀智者之心期若經道眼猶是隔靴搔癢隔羅見月得入維摩不二法門直得覓他病處不得生處不得死處不得到者裏說個郡侯安人全體獨露已是不堪何況更修追悼雖然公于唯識宗旨生死以之夢寐以之已知山河大地明暗色空都是識體山僧有一問既知都是識體為甚麼道生滅與不生滅和合非一非異名阿賴耶識能于百尺竿頭更進此步則虛空粉碎何須顧大地平沉不用疑珍重德藏寺為修殿請上堂大功無功因真果的大德不德形端影直慣聽沒絃琴閒吹無孔笛三十餘年思故鄉及至故鄉人不識人不識打動鄉談俱點額還知鄉談麼揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶此個鄉談從威音王佛傳至如今不論男女僧俗富貴貧賤俱能傳誦于中智不能知識不能識所以達磨特特西來要傳此法門梁武帝問曰朕造殿修佛有何功德磨曰並無功德又問如何是聖諦第一義磨曰廓然無聖帝曰對朕者誰磨曰不識即此不識直接上根其奈小根下劣聞此無功德無聖不識便撥無因果才有施為叱為有漏善因盡是人天小果一文不捨專事空言殊不知此無漏善因全在施為動作處能以無漏心修無漏殿無漏心裝無漏佛無漏心植無漏因無漏心得無漏果便見人人各有一所殿堂只因中間佛不靈聖勞他善眾領首敲梆打鈴秪要喚得你靈便見人人各有一段因果只是中間稍有差誤故勞他諸佛說個因該果海果徹因源還知麼大家出隻手扶起不須疑珍重西林寺上堂昨日不著便今朝更莫疑缽盂安個柄也要大家知說佛說祖是缽盂安柄說菩提說涅槃是缽盂安柄說向上說向下說佛未出世說威音已前總是缽盂安柄所以三藏十二部一切修多羅盡謂之附贅懸瘤雖然一人所在也要到半人所在也要到要識一人所在麼直得三世諸佛口挂壁上要識半人所在麼諸佛諸祖傳法利生所以此事不當容易歷代祖師上堂說法只要你會取一人所在亦因你人人有分所以云百姓日用而不知百姓若知即是聖人聖人亦日用而不知聖人若知即是凡夫又云知之一字眾妙之門知之一字眾禍之門更能于此開看合看左看右看忽然一旦會去有甚麼難昔有婆子送錢與趙州轉藏州遶禪床一匝婆云我要轉全藏為甚麼只轉得半藏此可作一人半人所在一大註腳又舉拂曰會麼西林更有西林寺且把西林作樣看上堂春無三日晴春無三日雨雨既不足憂晴復何須喜憂喜既無永絕生死生死既超壽之與夭老之與少何彼何此為甚麼僧問趙州年多少州曰蘇州有又僧問壽山年多少山曰與虛空齊年若有問佛日年多少荅他道五十五中有一句與佛祖為師有一句與人天為師有一句自救不了簡點簡點看薦亡上堂昨日齋祖師既已書符咒水今日薦亡僧一任煉紙燒錢若問祖師來不來亡僧度不度山僧終不為伊指東話西轉生作熟何故聻東塔有個澄泉老衲自少親近我慈舟師翁稍見一班便隱迎陽至雲門先師繼主東塔又以師禮事之及山僧復繼主席亦以師禮相待不異法門骨肉觀其訓徒有禮治家有法有事不避無事不求至于垂老示病善終可謂深得應門大體者矣奈何有時隱隱呵欬作聲為孝孫者欲為薦往唯恐不順孝道不為薦往又恐不順孝道要山僧為伊下一轉語山僧口門窄特請大眾下一語看還有麼海為龍世界天是鶴家鄉清明上堂石頭祖師道謹白參玄人光陰莫虛度且道即今是什麼時光莫只聽東鄰子哭父西舍母哭兒家家踏青草處處紙錢標還算得不虛度麼山僧幼時記得一頌曰清明時節雨紛紛路上行人欲斷魂借問酒家何處有牧童遙指杏花村咦好個消息三千里外切忌錯舉紫雲菴小參燕語鶯啼非耳之所能聽花紅柳綠非眼之所能觀於此會得步步有出身之路不妨拈一莖草作丈六金身用拈丈六金身作一莖草用昔然燈佛與眾同遊忽指地云此處宜建一梵剎中有賢於長者拈一莖草插向指處曰建梵剎竟諸天散花讚善今有一等癡人見得如此省力便云何必用許多棟梁椽柱金碧交輝方成梵剎殊不知許多莊嚴能向一莖艸上脫出模子來便成佛事若不向此一莖草上脫出盡屬世諦流布如長修居士以來紫堂供佛深體給孤長者之心立願永為一方福地又於今日結餘生社山僧因名之曰紫雲菴取牛頭紫雲如蓋有異人故事且問眾中誰是異人若道總不是爭奈大家在此蓋覆下若道總是山僧有個驗處遂高聲曰速道看雖然舊閣閒田地一度嬴來方始休梅溪菴上堂古今天地古今日月古今人事有條攀條無條攀例祗如蟠桃花三千年一開三千年一結猶可攀攬若是優曇缽花時乃一現且道向何處湊泊有一等義解者流便道時之義大矣哉時不可失時然後言時節若至其理自彰今日陸府張氏恭人八十壽旦請山僧慶讚以世法論之可謂多壽更能于無量壽佛念取一句細看此一句佛前念非古後念非今忽然前後際斷彌陀古佛面目全露昔有僧問趙州年多少州曰蘇州有還攀攬得麼還湊泊得麼還義解得麼不獨山僧難為轉款即三世諸佛歷代祖師直得口挂壁上何故聻明朝持缽去又過一村庄喝一喝下座王侗璧居士請陞座生如寄寄跡猶存死如歸歸蹤何處到者裏一人發真歸元一人虛空悉皆消殞十人發真歸元十人虛空悉皆消殞千萬人發真歸元千萬人虛空悉皆消殞若不消殞便有陰陽相隔存歿相違若孝子能于違隔交感之際覺得音容如在便知今日怡庭公的落處怡庭公有靈亦知今日孝子落處豈不子從父生父因子存所謂金刀剪不開即此義也昔有送喪者歌郎振鈴云紅輪決定沉西去未審魂靈往那方孝子哭云哀哀旁有禪者聞之大悟且道悟個甚麼無住跡西土莫留神珍重清河菴上堂以拂子打圓相曰會麼領眾托缽缽盂口闊若欲說法有口無舌無舌人語最親只要時人聽得真聽得真清河菴是女叢林大眾從來說大道不分男女相為甚麼分男分女會得者倜儻分明不會者未免世諦流布昔日舍利弗問月上女曰汝何不轉此女人相女曰我曠劫來覓女人相了不可得不知當何所轉若真到覓女人相不得不妨穿衣不見有穿衣相喫飯不見有喫飯相迎賓不見有迎賓相待客不見有待客相如此可稱獨脫丈夫遊行無礙今日寶臺菴主為自己誕辰要山僧與他證據知非之日還知非麼若知得則無少無壯無老無病無生無死方不負此一場熱鬧山僧恁麼告報可謂棒打石人頭嚗嚗論實事又舉拂曰會麼遍界稻禾香芰荷香更甚擲拂下座龍門上堂師拈疏曰即此物非他物會得者言滿天下全無口過不會者佛祖家風一時漏洩不漏洩有煩維那善為宣說遂登座宣疏白槌竟乃舉乾峰曰舉一不得舉二放過一著落在第二龍門則不然舉二不得舉一放過二著落在第一且道與乾峰相去多少良久曰多少且置祇如山僧未到者裏與人說青道黃說玄說妙說修說證說消災說獲福說薦昇說超度乃至說戒說定說慧既到者裏為什麼口掛壁上且道者裏是甚麼所在鸚鵡峰為汝道了也向汝道甚麼莫為汝轉根本法輪麼根本法輪是有耶有惟汝自有根本法輪是無耶無惟汝自無與鸚鵡峰有甚交涉所以東坡居士說個溪聲是廣長舌山色是清淨身後有簡點道溪若是聲山是色無聲無色好愁人且甚麼處是無聲無色處莫是鬼窟裏作活計是麼莫是靜悄悄處是麼太遠在莫即于色上見取個無色的聲上聞取個無聲的麼且無色的又作麼生見無聲的又作麼生聞乃舉拂子曰喚什麼作見又敲拂子曰喚什麼作聞到者裏信得及豈不灑落豈不解脫所以道一入信門便登祖位既登祖位說青說黃也得說修說證也得說玄說妙也得說消災獲福也得說薦昇超度也得說戒說定說慧也得乃張口曰你看老僧舌頭在麼喝一喝下座浴佛日徐長修居士請上堂戒生定定生慧顆顆明珠海神不貴慧生定定生戒處處玲瓏實無縫罅到者裏詮註不得比量不得只得舉起個泥牛吼月木馬嘶風慚愧時流卻向者裏說是格外之談說是向上一著說玄說奧殊不知本來面目塗污了也更追思黃面老子降王宮出母胎周行目顧手指天地學他天上天下唯我獨尊之旨盡是依草附木的精靈有什麼自繇分若是自繇的終日孤迥迥活潑潑觸著便消磕著便碎直是停機佇想不得所以溈山向仰山道寂子速道莫入陰界比如現前有人語話一般如何分別得他在陰界不在陰界所以自為則易為人則難難易且置今日徐長修居士因設戒壇中要山僧舉揚個事諸戒子又要山僧即在曲彔木上布施戒到者裏類之弗齊混則知處試問如何布擺還有布擺得的麼波羅提木叉相貌應當學敬謹奉持嘉興府東塔雨花蘭若弟子淨介施貲五兩繡
