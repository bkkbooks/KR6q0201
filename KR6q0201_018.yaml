body:
  text: 嗣法小師淨柱編書問二與石浪首座自首座去後每以入山不大深為憂故今年春亦欲掩關以深之忽無所至知首座早已出關住超山矣豈技癢之若是耶朽尚掩關者有四故一以法門愈亂愈不可辨亦且不必辨以正不勝邪故二者觀時觀機知分知力恐不知不觀非唯無益且有損故三者屢有不可卻之招恐費周折故四以行人數十輩忍苦忍貧死守不去唯恐住持不耐久為不安以約三年之限為慰諸行人故但不識首座何所見而入何所見而出也前光明寺有二僧來一稱首座為姪一稱首座為弟者俱以老成俱以吾首座不甘寂寞為言今聞遷住可謂之知侄與弟者矣雖然倘住超山自有別意非人所能料則慰我甚矣前得首座書讀未竟而象田即念書亦至彼亦往往以我不復出為願故聞其守益堅語益切此與吾首座臨行與藻雪言無異也倘首座之守亦無異則雲門二甘露門他日普天匝地有不可量者在也觀象田嘗以得吾首座為有同氣為幸為慶此深有挽回薄俗之度者首座又不可不時通氣脈為他日計也又聞首座每與人抗此金與石觸之謂也知不可勝而為不可也況法門雖屬不堪不久自有定論何用是汲汲為故我於二月十五入關大書聯曰定論不須下千古偷安聊爾約三秋此立而待之之道也願吾首座亦宜安心而待之今洞下雖不乏人但少遞相護惜者聞永覺師為人頗端此可幸事但可讚之而已以其扶律行事不致損故耳無諍無辨之道正宜今日力行山居殿有半功葵心已退執事月印嵌石二公并知衆敬愚及數十輩少枝葉可稱精進即鶴凌孫亦頗能逐隊執勞能久久不退或有過師之作未可定也首座所應承緣事得能修德以化之則無不濟者若以末為本我不願也目下近遠意頗悅從但以歲儉為難禪堂從房一齊歇下聽緣而已方今各各努力鋤钁山田較首座去時俱已轉生作熟盞飯可供四十人菜圃春收可續絶糧即堂中主有山鳴悅衆有維弦書記有藻雪普梆一響草鞋如虎此山居之近況也寄聞吾首座喜之復黃元公司理宗風雜沓王事勤劬此窮和尚之對極門徒也承訂梅花開後主人對客今梅花開已主對客已有人問客如何是主不識居士何以答之山中萬境雖閒無奈諸禪者往來煎逼特甚此入山不大深之故也故限約三年掩關以深之昨已偷安矣與余集生中丞昨承光顧使十四年來積想一傾頗稱慶快及捧讀復黃海岸居士書至為道不為名為法不為身處令人愧愧不休幾欲薄懶瓚而不為矣復自顧疏拙恐螳努之取笑於人也然法門危亂得居士兼內外而護之衲輩敢終默而置於不聞耶第觀時觀機思懶瓚之尚不可薄也容山居殘局苟完三年鄙願得遂當拼此殘質唯命是從是至願也復章天對居士每當岑寂時與道侶相集一詠鬱花令人遊夢無盡忽接惠翰暢讀花因欣慰欣慰爰發孝廉已先居士著鞭耶天華護彩舍此其誰山荒失賀居士能為我致意否禪道之衰今時已劇所期入此門者以真實履踐為先然後應機接物妍媸自辨所以佛祖言句大似試金石子具正眼者用之任他頌古拈古轉機著語是佛是魔無不悉辨履踐不真者未免金鋀易換矣居士天性生知讀書之暇又能搆此格外語言逢場作戲無不可者再得捉膝時一番商確然後流通為美鬱花之洗豁人目見者無不以為不朽之業也恨不能多得耳昨有相知欲為小序至手當即寄覽也復曹一蕊居士前接尊翰及箑頭深知不忘我故人甚但天各一方流光漸遠每一興懷不能罷衆命千里杖為愧仲春得脫雲門入西溪寶壽非隆慶也較隆慶深數里竹木蕭疏修徑不減雪棲是嚴印持聞子將諸公所蓄以遲某者憶往與兄輩願頗不淺此特為之先導耳天如居士兩番入山場後後訪之想已還新安矣其冷骨如故真隱君子也聞白僧兄獨居故里欲附一信與天如往奈又不果山居初得安懶幾與世隔絶見聞故不及為覓便郵兄有書往幸達此意不識何時來湖上也聞兄近不乏道交為慰又得趙居士偈意更慰第不即覿面為惜想真辦道人應不便爾休去其間出入於境緣逆順處定能以不欺自鑑耳聊評其意以復長至邊果能一遊乎先附力主做功夫語二紙一煩致之嵌石兄近況每同弟打橡栗為安心法因續元去促托筆伸意翰生棧西蘭友兄弟蹤跡何似有便通我以慰念舊之懷世情擾擾法門猶惡有心者能一揀邪正庶報佛恩於萬一弟亦當於岑寂自砥以觀其時也又承書與續元禪友來如親覿一度即以書復續元去亦應如見我然猶未免於一水盈盈之思也不如天如兄偷空入山數日與七十二賢峰分賓列主談以為暢力窮向上不涉世緣令人益珍其為老成聞兄近況頗細稍慰懸懸趙公之約何以杳然不可以兄之憨法帶纍人也笑笑答祁德公居士秋空岑寂忽承令弟至得接尊翰惠施又知道念日堅雖覺喜躍然猶未能深慰鄙懷者以居士是大猛烈人定能一刀兩段討個分曉而肯悠悠說堅不堅乎堅不堅則疑信相參隨人上下而已宜居士所不為也近欲入閩將有一年之別古人云三日不相見莫作等閒看想居士自能努力而不俟衲歸當先有便羽報平安也答邢吉先居士前翰中有一切無心即離俱病之問此特遣著語耳苟執而不化則又有無心猶隔一重之語其疑又何有已時乎真辦道人觀時觀機竿木隨身逢場作戲出處聽緣而已至於功名宜冷則冷之離亦一道也宜熱則熱之即亦一道也但得左右逢原何病之有哉與蔡子穀居士世情戀戀法愛猶覺依依但不可為愚者道耳分袂歸每與相知言及護持金粟之神餘光豈止被及一法相而已哉不知近日戒酒光景何似石車兄以雨阻不及入山特遣侍者渡江踐約可謂不負先師者見時煩為致意元公居士幾日曾相見否與集生余中丞承護念入閩冬復春矣不識道體健飯否叢林得人否某抵長慶來縉紳居士俱欣然誠不虛老居士願華雨監院雖根性過緩亦稱穩當臘八日付戒一壇春新積香儀續置禪堂一所張方伯捐俸結制內外三百餘俱精進擬浴佛解制後同京臺諸居士上雪峰或可存老居士意第欲併爨恐不易也大約閩中法道邪禪未熏似有起色在宿願未酬者今正是時且僧俗望駕如渴未審肯即扶策否否則冤有頭債有主與山僧有何交涉衡廷田事勢不可復茲另捨百金造廊起手其東邊精室向為人得今己力為復之以滿尊願為杜口處耳此間興廢任在居士故不得不喋喋也餘不悉與季超祁居士閩中緣未竟而歸思動者再矣雖知僧無家其如知己何近聞邊報甚恐而憂國憂民之人未審此時作何話說陰翌之論斯林下人所深愧也觀令弟才力裏赤片片終不甘弄寓山片石已者居士能佐之乎今居士既承當個事則知向之稱隱稱逸可謂前言戲之耳古云見道易守道難而行道復難況戴兩莖髮而居於行守之間抑又難中之最難不可不深慎也居士勗之與陳華甫居士福建佛事喜無男女雜踏之擾諸鄉縉紳俱認真護念第衲所深意投老者唯寶壽拳石耳況與諸善信大有夙緣令人夢寐以之非勉強也惟居士力護以俟衲歸歸期舊約或半年一年決不至爽信者今秋入闈定當努力念我山林人自不能安邦定國又無德堪為陰翊惟居士蠖伸一肩任之而已使人人各發此念而國界未有不安者居士勿以一人力微為自怯也我教謂一人發真歸元十方虛空悉皆消殞此雖理路亦可事推況居士已知會萬法為自己者則一人自幹一人事皆居士之本願衲特為饒舌耳忝知愛之私故私望之答陳克一居士石頭南嶽上諸祖以人多質朴故酬對處顯多密少其真證者即顯亦密也其未證者俱以意通意通則落知解即密亦顯也非師家咎也至於石頭南嶽猶顯密兼唱下及五家分門列戶純貴乎密者以人心雕琢殆盡有錯會者有附會者真假莫辨非的悟的傳暗機圓合賓主協通者孰能把住探竿知水之深淺哉所以推此祕密一路最妙最玄極尊極貴使放僻邪侈惡魔外道不能假借以亂真此不得不密也古謂威音王以前無師自證即得威音王後無師證者盡屬魔邪良有以矣今居士雖做處質朴省處亦真故見諸祖平實顯言一印印去略隱密便料理不下此過在以顯為顯未能顯密圓通耳如居士所印正脈中南泉之寬廓非外寂寥非內及不是心不是佛不是物等謂無疑至於斬貓趙州頂鞋等謂不了則疑信相半非過量人所自安者唯居士更過此關則一任懷中抱子腳後登妻盡是祕密法門否則平地上跌有日在珍重珍重復贛州嵯峨諸檀護靈際斯興道音遠播於桑門佳聲此振德化潛施於詞苑瞻貽言而色起聞高韻以神飛恭惟諸大居士閣下心空及弟氣吞秋月之長江意極無為法運春風之百丈嵯峨古剎賴檀信而重整型規寂照寶方得法侄而一新儀範叢林幹蠱祇樹金湯內外得人而有慶邇遐獲善以無虞想佛法之隆盛俱讓豫章思祖道之恢弘咸輸廬阜衲入於仙霞經三百而遊七閩目窮水山之勢離乎浙地幾十度而接八行招歸故里之殷且解富沙之新令還酬寶壽之舊緣或趁春風而笠戴江西事難預定或取白門而棹遊貴境法不先期茲承寵召未便專辰聊申裁復以代晤言復王東里總憲下雪峰滿擬走候道履奈隨緣轉流覽古汀淹滯山水曾以數行遣徒代訊復為永安路阻至今覓便無郵每念華林把晤若非老居士打開格則的又焉能令貧道肆口恣心橫拈到弄為作家相見也呵呵冬制正結建寧之普明而洽禪友適至捧讀翰招住持三平不勝踴躍奈先一日為建陽靈峰邀住未及應命而至然積想未消終當向百丈漈邊與老韓覿面相見不煩向侍者處尋消問息也偈扇伴啓草復不宣答考亭朱步紫使君附來問佛曰覺儒曰睿作聖皆屬思也六祖乃謂不思善不思惡則孔子九思中間思明思聰思問難等獨非善歟周公夜以繼日思兼三王而施四事豈非欲多多益善歟善何不可思也關睢寤寐反側鍾情窈窕思果善歟惡歟豈聖人獨難之歟且善惡雙遣思置何處釋亦戒偏空也抑聞之老莊其言上善若水水和萬物而不爭又曰賊莫大於德有心而心有眼六祖無亦欲人忘其爭去其眼歟易稱無思也寂然不動感而遂通天下之故此語頗有會歟三教一理愚蒙未能融合大和尚何以教之人生日用雜念雖多不出善惡無記三性出則為空入則為有空為小聖有為凡夫唯大根器大力量人以中道第一義諦不偏不倚極學窮參一旦豁然空有雙銷二六時中隨緣任運不著於凡不住於聖兩邊不立中亦不居克盡己私復還天理如鏡垢盡因人妍醜非鏡有妍醜也佛為覺睿作聖亦若是而已非屬思非屬無思也非思故寂然不動非無思故感而遂通道之上善儒之至善釋之性善非善惡相待之善也此語三教真可會通一言以蔽又何足疑若疑六祖不思善不思惡似屬無思不妨深體六祖問意即知宗門謂教外別傳直指人心見性成佛直接引人之言外風規也彼以三教學人著於言教不重己靈去道似遠間有體認誤以思惟測度聖人境界說時似順行時卻違不肯將此思惟測度的心體究一番故祖師西來見人說心說性要覿體舉出個心來性來見人思善思惡要人覿體舉出個思善思惡的道理來故六祖問惠明曰不思善不思惡正與麼時如何是明上座本來面目惠明言下大悟則知宗門為人別有長處其意非專教人不思善惡也今老居士既已會通肯於不思善惡處更加參究體認一番定知飯是米做從上疑情一笑而釋矣然參究體認是又思思者與思不同教中先以無思為體後以有思為用尚屬漸途以其不如頓教以思無思之妙反思靈焰之無窮也故終日思而無思無思而思高登聖域豈小聖只知無思而凡夫只知有思耶此六祖去古未遠尚可如是提撕處今之世穿鑿殆盡才有言語知解橫生不能復爾激發後昆至使升座指揮難為下口不得已曲暢旁通若一味以言遣言以理遣理使人撞入葛藤無有解脫此無貴於宗門也衲不敢以宗自居特信宗之妙或可與老居士同參何如答唐祈遠孝廉昨走數行草草附訊正恐道駕冒暑令人不安忽接惠翰殊慰鄙懷所云辨山法道居士全始實賴全終然全終惟艱貴使先瑞兄安於常寂耳雖雲門一脈靡靡不振而弟兄之分恆安枘鑿者皆貧道自甘所致今一旦僭竊不唯取笑諸方亦獲罪於常寂矣況寶壽雖小未可遽有庖人之越萬不得已尚容秋涼一奠辨山擇一法侄主之一整無諍之風庶不負全始盛懷而且為全終穩策餘則不敢與聞向承布施百不卻一此謹奉璧者恐蹈傷廉故轍耳笑復不盡復辨山諸法侄叢林者道德之所從出也欲行道德先正名言名言不正道德廢矣今辨山法道已遍天涯而獅蟲咀嚙賴以鎮安使愚得以傍觀泉石猶冀略伸管見於他日耳恐一番當局未免迷生此在諸法侄所宜深護於我也況百丈移龕未曾親送二世新遷未曾遣吊萬勿復舉杜我將來常住公物檀護公書統此璧謝與離言法侄冤有頭債有主此大衆告諸龍天而吾法侄有不容避者昨數行中無許多便宜與法侄討得若為先讖焉兼之護法傾城即請高踞龍華頂𩕳則寶壽峰在西溪深處當贊嘆無盡也復考亭朱步紫使君一出仙霞略無寧晷此佛法之纍人耳至於千里神馳夢無迷路知老居士正入慈恩院裏游也自念形骸雖遠而玉枕峰松終無變色此亦貧道於居士另一思路矣冰輪至得接惠翰不異把臂一度何啻閩越作同室觀耶靈峰殘局全賴護法為之合尖其叢林規矩決意付托來雲入室主之以幻來年老午星善病樵之時想住山恐不與一人肩之則遞相推托殊非長策餘樂助者助之貧道則年已知非不復料理常住明年俟寶壽稍妥準頂笠一行一瓢一侍別搆一茅於寺之北隅或資化寺側得與老居士啜茗對奕拭眼看來雲與大衆之有為此又不啻樂死也復會稽諸護法向年濫席天華過蒙內外之護至今銘佩猶懷戀慕之私緣貧道分慚迂拙道力浸微祇合屏跡空巖任情丘壑故拂然渡江似不再問人間事矣豈期入閩輒爾數年蓋素愛閩山故有是舉雖彼剎紛及略不加顧卒一旦竟歸者原為寶壽破壞意欲粗加修葺得把茅蓋頭足了一生誓不欲再現前粧重新舊樣區區此心大都如是前渡江登拜欲寫闊悰復以緣隔不偶茲蒙瑤翰忽頒琅琅珠玉且復有天華之命是更欲鐘鼓爰居耶雖達師弟暫避巽床奈某衰朽難承鼎餗況師侄輩俱翩翩超逸自能料理何藉手一躑躅朽僧渡江濡首耶萬不獲已一到即行并候興居聆霏霏玄屑也復曹石倉侍御西溪道上等個人來十里梅已脫雪飛花而個人猶屬杳然忽接翰惠雖免梅花笑人終未似把袂閒林生我山光也承命作讚聊搆小偈塞責謹書請政靜聞假歸便謝不宣別夏緩公居士貧和尚清宰官正爾相當唯損清惠為受不安耳貴境多善信款話甚殷此皆賴呵護使然所喜郡伯政亦甚善似不復用頭陀法行常不輕行也至草五日始解纜滿擬一造高齊作數刻別語聞交游接踵唯望風依依覺新我瓢笠晤謝有期為道自愛華藏菴朴僧數輩人頗憐之第憐之以道者又不得不仰仗鼎言於郡伯處矣答王祇叔居士正臥疾間高人韻士一時良集復得居士至使荒山生色不淺賤恙亦繇是起第愧黃牛橘皮助話太清耳前已承惠茲復損米正當結制敢不拜領為居士結一度禪悅也謝謝佳扇如命塗抹容補不盡復福城衆護法靈山親囑原為末法之金湯梓里光招適愜同仁之志願豈是祖禰不了端因道種將圓固漸添錦聊用續貂恭惟諸大護法臺下朝廷柱石鄉國觀瞻攄席上之經綸不難旋轉乾坤撥林皋之餘暇亦且推敲堂奧以治國者治心無異孔顏面目展報君者報佛居然楊李芳蹤所惜祖庭秋晚兼之狐跡縱橫愧無寶劍之橫抽猶藉杵光之鎮肅寵翰來當重九後鬱鬱菊花新開期諒在小春初融融冬日暖敬酬台諭無任溯瞻謹復復天寧大衆書干木隨身意在驚蛇撥草逢場作戲妙於唱主酬賓奈何近日宗風似隆而實替法席似安而實危矣佛恩難報信施何當福城東塔既為先師來應萬壽天寧復因寶閣相招雖指揮不能推重於人天登臨未必增輝於梵宇喜法舟之靈塔猶存漢官之威儀復整移藤不遠覿面非遙此復與存憶唐總憲昨者瑤翰賁臨兼承隃糜管城之錫奈草野不文無以克當雅惠可勝缺然蒙君以蚤年掇巍科業已追蹤繼美復以慧眼勘破世籬飄然長逝此豈高閭門陳車馬之亢宗也哉行將起九世之白骨登之寶池珍域矧陟岵在瞻宛然康壽倘轉哀為樂決疑成信只淨名龐老不得擅媺於先宗矣擬欲躬弔靈龕奈方結制不便行邁謹遣監院俚語代伸併祈老居士熙熙怡怡完此一段家風則光前耀後雖今日之慈孝乃他日之道愛也專此布悰統希鑒茹無任顒溯與扶搖唐居士猶憶曩歲萱慈遐逝山僧曾以葛藤一絡索向繐帷饒舌爾時尊公深道德器可徵世德之報不爽不料尊公便爾撒手政以繼美有人掉臂不顧真解脫丈夫也擬躬吊靈位奈時方結制不便攜錫謹以俚語半紙代伸統惟亮鑒可勝瞻跋寄次升陳孝廉久嚮高致不異大蘇乃從小蘇邊得精神交接何幸如之因憶皋亭桐扣雖絶響來久以衲觀之遍山皆石鼓也第復俟知音耳他日既聞聲逸遐邇當不使張華擅美千古矣況渥窪池讀書處蹤跡無恙豈慧業文人多忘前事耶笑笑寄稚升陳居士紫雲佛日兩度快談草草送別雖不作世情想而道念猶覺依依不識日來精進何似深羡師資相契尋常已是難得況契以道乎且當仁不讓頓入頓深吾宗謂智過於師方堪傳授豈虛語哉
