body:
  text: 嗣法小師淨柱編住紹興府天華禪寺語録崇禎五年十二月十二日入寺三門者裏是甚麼所在旁僧曰是三門師曰已後向人切忌道著大殿於一毫端現寶王剎用許多氣力作麼坐微塵裏轉大法輪占許多世界作麼總不如山僧將錯就錯去也遂展具伽藍山僧一向喫飯穿衣屙屎放尿不著個所在今日借重了也祖師一向你拖纍我今日我拖纍你拈起香曰會麼不會看取下梢頭方丈若道此是毗耶離又不是個維摩詰若道此是摩竭提又不是個黃面賊且道畢竟是個甚麼良久曰莫教疑殺天涯客即日上堂拈疏曰自從若耶溪上得者個消息從來不曾舉示於人今日仰勞維那對衆宣出宣疏竟指法座曰此不是寶華嚴飾又非嫩草鋪舒咦且看方上座坐斷天下老和尚舌頭去也遂升座拈香曰此一瓣香竺乾付囑震旦流芳君臣得之而有義父子得之而有親夫婦得之而有別長幼得之而有序朋友得之而有信且道衲僧得之又堪作個甚麼良久曰今日熱向爐中端為祝延今上皇帝聖壽萬安皇后齊年太子千秋文武官僚咸增祿位更願本府各廳兩縣諸衙泊及本寺護法檀那不負靈山之付囑永為我道之金湯此一瓣香下種於南高峰錫杖泉邊生芽於南嶽山毗佛洞裏發幹於天目圓通巷口開花結果於雲門石傘峰頭果熟香舒於黃安小天台鷂兒山下狼藉一個兩個於南天台香柏峰前飄落三個四個於寶泉象田及蘭芎山畔今日天華堂上和盤拈出供養顯聖堂中傳曹洞正宗第三十二代湛然大和尚用酬法乳之恩伏願處處園栽無影樹家家花發不萌枝遂斂衣就座白槌畢師曰若論此事如優曇華時一現耳衆中還有不惜身命向懸崖絶頂攀折得者麼良久曰如無山僧且牽枝引蔓去也山僧也不知佛也不知法只曉得遊山玩水嘯月眠雲與猿猴為伍麋鹿為群誓不出山活埋為計所以自志偈有翻轉杜園還杜田那管十年草年三十年之句今日為甚麼又作者個彀當噫要且不為別事昔日大慧禪師於行腳時因見宗風寥落混濫者多所以誓不作者般蟲豸已後出世有人問云和尚向道誓不作者般蟲豸今又爭得如是慧云盡大地是個杲上座又作麼生雖則事無一向未免相纍解嘲今日山僧倘有人問及又當作個甚麼解嘲方法以拂指前曰你看天華落也大衆回顧師便下座結制上堂拈疏曰釋迦拈的迦葉笑的達磨坐的神光立的一切護法國王宰官護不盡的悉在裏許有煩維那對衆宣出看宣畢指法座曰舉足下足動念即乖瞬目揚眉擬心即錯且道畢竟如何咦不見道若有路可上更高人也行遂登座白椎畢師曰者個第一義達磨西來已被梁武帝當頭一問直得口如扁擔眼似流星滿口舌頭道個廓然無聖不知已落二落三了也爭奈武帝有殺人見血的手段又拶一問云對朕者誰達磨答個不識不識雖好也只救得一半及乎淒淒渡江九年面壁要救那一半不得後得神光立雪斷臂不惜身命也要扶持那一半乃至六代五家沿流至今也要扶持那一半殊不知那一半人人本具個個不無為甚麼不知不道你不知只是你不會即今天華會上若聖若凡若男若女若貴若賤若長若幼遂舉拂曰還知麼既知為甚麼問著那一半便忙然不會莫道你不會即三世諸佛也料理不下故古德也只好旁通一線道欲識佛性義當觀時節因緣時節若至其理自彰大衆且道如何是自彰的理衆中有倜儻者出來商量看僧問如何是不識的意旨師曰恐汝不能皆隨我道進曰不識意旨蒙師指滿口道廓然無聖意如何師曰九月莫道春風多進曰恁麼則人天皆仰四衆咸尊去也師曰鈍漢問十方雲聚克志無為無為的句乞師垂示師曰霜葉紅於二月花進曰人人鼻孔撩天個個腳跟點地師曰知恩方解報恩進曰恁麼則萬方歸化日九土仰清光師曰且到堂中穩坐去進曰眉毛爍破四天下去也師曰閒言語上堂噫莫妄想山僧者裏無恁麼餿茶臭飯穢污大衆只解春耕夏耨秋收冬藏積幾擔米堆幾擔柴集幾個沒伎倆禪和整備著銅琵琶鐵拍板相聚喫莖虀放個太平曲只是莫唱無生歌者無生歌黃面老子語言如山堆海積四十九年不曾唱著一字即歷代祖師說個師師相授也秪是遞相熱瞞直得先師於慈舟師公處竊得個拂子不值二三十文以為奇貨出入隨身逢場作戲拖泥帶水造妖捏怪惹得四衆攢頭又道三根普利將者拂子用得柄斷毛枯付與山僧曰向後人天衆前舉揚個事去山僧彼時幾乎被他連纍幸得眼清手快接來拋向糞掃堆頭十有餘載今日見他伎倆俱消光怪俱絶特地拈來忽得一夢夢見一個無面目的童子唱個歌兒著實有些奇怪歌曰日出堂堂照見皇皇皇皇騎馬上傖塘山僧聞得直得通身毛豎夾背汗流只得掩耳而歸幸不聞他末後一句若聞得如何有今日事衆中還有忍俊不禁者出來試道看僧問凡聖不通人天莫測深深密密的句請師道看師曰巧言不如直道進曰大小天華被某一問直得指東話西去也師曰闍黎伎倆只如此耶進曰任從扯來蓋覆秪得一半師曰者一半還讓闍黎得麼僧一喝師曰野狐精小參金粟打黃檗罵才到雲門便放下若還以此作禪宗後代兒孫成話靶此博山大師偈也流布諸方盡作是非話會天華今日拈來雖不能起博山一笑也要諸方簡別他道金粟打大似自無手怪人打黃檗罵大似自無口怪人罵才到雲門便放下大似自無落處卻怪人說放下若還以此作禪宗大似靈龜曳尾後代兒孫成話靶卻被他道著且道道著個甚麼放下著大衆此是先師潑不了的惡水今日事不獲已不免又污大衆期已過半了米已喫完了柴已燒盡了行人筋骨已磨穿了山僧在方丈裏引領而望巴不得個還飯錢柴錢酬勞行人的來直望到如今杳無消息所以今日只得教你放下良久又曰放下又良久曰更放下諸兄弟還放得下麼昔日大死翁參寶峰入室峰云直須斷起滅念向空劫已前掃除玄路不涉正偏盡卻今時全身放下放盡還放方有自繇分翁即頓領厥旨峰乃擊鼓告衆曰深得闡提大死之道後學宜依之諸兄弟還似你才做到無撈摸處便怕落空亡去麼還似你才得一知半解便胡做去麼還放得下麼放不下且置畢竟如何是闡提大死之道衆無語久之師大怒罵不止一僧才出師以杖打罵歸方丈求嗣上堂第一義第一義打破虛空補不及第二義第三義以楔出楔終不濟第四義第五義如何說個西來意乃屈指曰第六第七第八第九乃至千義萬義無量無邊不思議義總不如個觀音菩薩買糊餅放下卻是個饅頭良久曰饅頭且置畢竟如何是觀音若識得便曉得住處曉得住處便曉得他去處來處曉得去來住處便曉得他不去不來不住處便曉得他三十二應十四無畏四不思議便好求男得男求女得女舉拂曰莫者便是麼若不是畢竟向甚麼處求大衆今日齊主求嗣請山僧升座於中儒宗賢聖聞得山僧如此舉揚大有相違既是三教一家孔子道富而可求雖執鞭之士吾亦為之如不可求從吾所好何故釋門只是教人求殊不知孔子語句四方受敵八面玲瓏只因自古聖賢將孔子鼻頭一把捏住吐氣不得直得釋迦老子為通一線尚未相信今日山僧與他大通一下我也說道富而可求雖執鞭之士吾亦為之如不可求從吾所好你道今日齊主所好好個甚麼他好生男好生福德智慧之男他好生女好生端正有相之女大衆此是孔子自家說的與山僧無干觀音誕日小參你道觀音今日生我道觀音今日死你道觀音今日不曾死我道觀音今日不曾生不是拗直為曲實乃順理成章今日山僧落堂幸而不隨大衆腳跟若隨還教我慶即是弔即是良久曰昨日有人來顯聖明朝更有下天台上堂參頭白椎曰法筵龍象衆當觀第一義師亦高唱曰法筵龍象衆當觀第一義乃召大衆曰恁麼還是山僧辜負參頭參頭辜負山僧若山僧孤負參頭卻是銀碗盛雪若參頭辜負山僧卻是明月藏鷺若山僧即是參頭參頭即是山僧卻又類之不齊若道有甚麼山僧有甚麼參頭卻又混則知處諸兄弟須知人人有如是奇特有如是神通有如是遊戲有如是三昧為甚麼自己埋沒了向人家腳根下求佛求法祗因你向人求所以自己許多妙用都在山僧光明裏許汝能一念回光去山僧卻在汝光明裏許二六時中一舉一動有甚麼過所以道拈來無不是用去莫生疑豈不見法華經云治世語言資生業等皆順正法不要聽得恁麼說便將殺盜淫妄貪瞋癡慢一味鹵莽承當將去必須試看境界現前不似落湯螃蟹一般麼一言半句自然合宗合教麼所以山僧尋常見此等人有個驗處只如上大人丘乙己化三千七十士你道合那一家宗合那一句教若合不得切須仔細若不仔細祗是個鹵莽無慚愧漢舉夾山道老僧二十年住此山未曾舉著宗門中事有僧問承和尚有言二十年住此山未曾舉著宗門中事是否山曰是僧便掀倒法座山休去至明日普請掘一坑教昨日問話僧來老僧二十年說無義語今日請上座打殺老僧埋向坑裏若不打殺老僧上座自著打殺埋在坑中始得其僧束裝潛去師曰你看此等便是鹵莽承當漢若是真個有氣息的待他要你須自著打殺便如前掀倒法座豈不俊哉雖然夾山有法座許你掀假饒無法座又掀個甚麼師忽作掀勢曰哱𠾐大衆此在夾山處即可若是天華者裏須別著個語話始得衆下語都不契師曰山僧與你代轉去也待他問道無法座又作麼生師又作掀勢曰哱𠾐寶泉寺請上堂男子身中入正定女子身中從定起女子身中入正定男子身中從定起人人認作南山雲依稀變作北山雨分明月色在梅花看到梅花遲了矣又何須挂飛帆攜短棹驚風破浪憐同調阿呵呵笑欲倒出門步步皆青草出門青草且置直饒不出門亦是草衆中有入理深談者出來道看僧問鶴出銀籠即不問寒雀啄冰珠曾得飽也無師曰你道今日唱的是天華曲寶泉曲進曰入口無蹤因甚不知凍餒師曰曾到寶泉也未進曰分明踏在天華上看到天華早已遲師曰爭怪得進曰恁麼則故園侵麗色林外換春聲去也師曰有甚麼交涉乃舉拂子曰大衆還見麼盡大地人無明煩惱貪嗔癡等命根如斬一握絲一斬一切斷還信得及麼若信得及從此歸家士農工商挑花紡織堯之天舜之日同唱太平歌共樂無為化若信不及便於拂子頭上分彼分此分親分疏此是著了拂子的漢若更離了卻是徐六擔板各見一邊且道畢竟如何擲拂子曰增錢不如再看佛誕小參召大衆曰各各于此日降王宮出母胎四天王捧足九龍吐水沐浴已竟還信麼若不信各與三十拄杖若信也與三十拄杖且道既信為甚麼也與三十拄杖良久曰無風荷葉動必定有魚行上堂良久曰還見麼釋迦老子初降生時應持菩薩親手捧持諦審諦觀不見如來頂相你看他用了許多殷勤不消山僧一覷又有不唧溜的無邊身菩薩要見佛頂將根竹杖子量了丈六又丈六直量到梵天畢竟不見乃擲下竹杖說偈讚曰虛空無有邊佛功德亦然若有能量者窮劫不可盡你看他用了許多氣力不消山僧一拓大衆若依天華則辜負二位菩薩若依二位菩薩則辜負天華到者裏須吐得口氣方有自繇分若不得自繇便於佛頂頭上推度道佛是有神通的所以人不能見殊不知不獨佛頂即山河大地明暗色空草芥人畜等你還見麼若見即今面前香爐你還作青見黃見赤見白見長見短見方見圓見若作方圓等見即是個方圓等相要且未見香爐在若畢竟不能見為甚麼有香爐佛頂及山河大地一切等名到者裏更須轉身始得若轉不得秪是個百尺竿頭坐的人亦名金剛圈栗棘蓬金剛圈須要透過始得栗棘蓬須要赤身坐臥始得還透得麼還坐臥得麼僧問如何是賓中賓師曰路逢劍客須呈劍進曰如何是主中賓師曰端坐焚香拜鬼神進曰如何是賓中主師曰梅須遜雪三分白進曰如何是主中主師曰不是詩人不獻詩進曰賓主已蒙師指示向上玄關事若何師曰你還見大衆麼僧禮拜師曰一場懡㦬彌陀誕日上堂師召大衆曰即此便是西方還信得及麼若信不及要過十萬億佛土若信得及也要過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法大衆還聞麼若聞汝等尚以緣心聽法此法亦緣非得法性若不聞尚以不緣心聽法此法不緣亦非得法性總不如不離禪者年年此日燒幾對燭點幾炷香為阿彌陀佛慶賀母難之辰欲得自利利他特請山僧升座為他闡揚他欲年年與佛同生生生與佛同住更欲人人知有個西方個個西方有個極樂國土個個極樂國土有個彌陀個個彌陀有個佛母個個佛母於此日生阿彌陀佛個個彌陀於今現在說法大衆還聞麼良久曰彌陀說法且置山僧恁麼告報大衆還聞麼又良久曰莫因竹密妨流水盡謂山高礙白雲過顯聖掃塔上堂召大衆曰石傘峰倒卓了也還見麼若見切忌揚眉瞬目若耶水逆流了也還聞麼若聞切忌伸頭側耳直饒不見不聞卻是知恩者多報恩者少山僧於天啓癸亥年間從此打失先師鼻孔流落天涯奔南走北直至天華天華不現及至顯聖聖又未顯不如少頃向無縫塔前撮土焚香求過懺悔去也便下座端午小參衆兄弟汝等人人腳根下有一無名腫毒生則癰腫死則潰爛只因無量劫來被諸佛祖說真方賣假藥所以至今不能平復今日是五月五日午時正當蟲毒潛藏百草芬馥之際於中有依時及節者折取一莖目療取去好結制上堂古道今開切忌填泥塞土新逢舊識何須眼去眉來躡足進前未免顢頇佛性簇鞭退步猶是儱侗真如直饒不進不退亦不出孟冬初冷衆中有不待東風花信發先來通個小陽春僧問進不得退不得中不得請問和尚如何下腳師曰正好下腳進曰恁麼則一聲吼破澄潭月萬古從教徹底清師曰又成進退去也僧一喝師曰放過則不可乃曰古人問答大似玉線金針一來一往總不徒然今時不出常流只解粘皮搭骨所以向他道山自高水自深個個攢頭湊額盡為知有若向他道魚大于海鳥大于山未免半疑半信何況要他山上撈魚海中覓鳥則個個退身千里所以天華今日開個鋪子只有山田脫粟米野菜淡黃虀芙蓉楷道喫則從君喫不喫任東西天華則不然喫即休云飽不喫莫嫌饑冬至上堂群陰剝盡之後一陽未發之前普慧問若雲興普賢答如瓶瀉雖不露揚家醜也是好肉挖瘡惹得斷拂子惡發輕輕一摑打得雨散雲消那個不知那個不見為甚麼又要升座莫更有別事商量麼僧問群陰剝盡一陽生大地乾坤笑滿襟未審何人受用師曰退步莫落後進曰還有不落時節的麼師曰進步莫向前僧一喝師曰者一喝卻有落處僧擬進語師便打乃曰今日雖則一陽初動幸而萬象未新若肯直下承當山僧不妨與他飲玄酒把臂論文調太音逢場作戲若更要論佛性義又如何時節因緣又如何如何得時節自至如何得其理自彰總不如門外青山青又青屋邊流水深又深客到莫炊無米飯月林連夜褁餛飩四顧大衆喝一喝下座付首座即念法上堂雲興霧起皆顯別傳之旨龍吟虎嘯齊承密受之宗別傳何傳盡謂釋迦不說說密受何受俱云迦葉不聞聞賴有超師作略捉取木毬安舊處求人為法剎竿倒卻出常流蓋為人心不古學處不玄宗師家舉揚者多大都以字不成學人輩承當不少依俙八字不就所以道入我門來一機一境不用當場拈出拖泥帶水直須異類中來近有說正說偏往往烏焉不辨論玄論要明明魚魯難分縱有師資道合賓主協通只解袖子裏暗傳春色誰能向樹凋處獨露金風今日天華登座不敢說扶揚宗祖祇因他曹洞中衰偶爾借雪峰毬子輕輕拋出孰能假慶喜剎竿緩緩扶將衆中若肯欣然終不囊藏被蓋還肯麼首座出曰如是我聞師默然座便禮拜曰明言猶未的密囑豈應真師索筆曰衆兄弟莫因他在香雪庵輔具足兄如師麼在東山寺事爾密兄如長麼為什麼到天華卻不肯住且看山僧下個注腳遂疾書付法偈書竟乃舉問大衆曰還會麼不見道住即印破雖然三十年後錯舉者少舉錯者多解制說戒上堂舉如意曰盡大地人都來總是者個只因你要修行出家參禪受戒復以如意打此相曰所以被者個礙卻及至入禪堂受具戒說迷說悟說犯說持又以如意打此相曰所以又被者個礙卻及乎今日解制圓戒了又舉如意曰依舊原是者個有什麼礙與不礙所以道原來只是舊時人不是舊時行履處乃舉法眼問永明潛云隔壁聞叉釧聲律中便名破戒今日朱紫駢闐又作麼生潛云好個入處師曰今時錯會者多盡道觸目皆是所以擎拳豎指胡言亂喝認作六根妙用於事無心無非入處苦哉若作是解不唯不得名為解制亦不得名為圓戒且道畢竟如何理會良久曰久晴無驟雨上堂滴水不滴凍臘月春風動緣心聽法人切忌作春夢大衆世尊道汝等尚以緣心聽法此法亦緣非得法性衆中還有不以緣心聽法而得法性者麼一勤宿出衆打一圓相問曰和尚者個是緣心不是緣心師默然宿禮拜起師曰者個是緣心不是緣心進曰先師靈骨何在師曰老兄也須具眼進曰人天交接兩得相見師曰隔靴抓癢乃舉龐居士參石頭便問不與萬法為侶話師曰你看者兩個老漢一個誘人犯法一個停囚長智天華則不然待他問不與萬法為侶者是甚麼人即向他道六祖道的大衆你若要了生脫死須向石頭掩口處會取你若要續佛慧命須向一口吸盡西江處會取雖然若不會天華六祖道的猶是依門傍戶漢退院小參庭際蕉軒後竹三年愛惜如珍蓄大雪打不枯大風吹不曲一旦辭之過別峰細雨蕭蕭初夜中不學白雲端去瞥只因無個圓通訥所以遲遲一盞茶攢頭共語笑相別大衆相別且置如何是別後一句良久曰不見道難得不相見嘉興府平湖縣東皋釋行旦施資刻
