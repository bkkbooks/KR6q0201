body:
  text: 嗣法小師淨柱編詩偈三七言絶白蓮輕雲新夏葉初擎嫩蕊俱含無染情雨過明珠千萬斛臨風著意向人傾自笑持梳不耐聊成禿作佛無心偶出家究竟不知因底事也來隨衆挂袈裟重登黃鶴樓有序戊午秋同葉西一蕊入南嶽從此過洞庭登嶽陽險涉君山今葉西已作故人一蕊又棲遲舊里余因參黃蘗將遊眉山阻風復登一望愁賒不勝腸結轉蓬飄泊又經秋情在那堪此再遊明日洞庭風縱便拼教不上嶽陽樓翻空惡浪想君山涉險乘橈共往還何事殊途今日淚當時談笑死生間死者難追生者疏名山五嶽更愁余癡心終擬同禽向肯使山濤請代書九峰送士遜居士還蘄水暫離不必重為約相聚何曾夙有期歸去致聲真好友九峰新得一相知送九峰三如行腳多年浪子不還家對此因憐客路賒會得隔江招手意送行茶是罷參茶拾枯學個樵夫打個歌無腔無奈興來何牧童笑倒黃牛背約我明朝早上坡同三宜法兄踏月過秦止于豹囊齊鷂兒山下兩狂僧卜夜登臨引瘦藤犬吠豹囊齊上月敲門喚醒讀書燈住香柏峰六首石梁三度半生餘山鳥溪花也笑余擲卻破瓢拗折杖吾心休矣卜吾廬斷橋殘雪猶迷路幾片落花何處渡溯流披雪得其源茆菴一箇無人住初居積雨憩勞肩山境商量勘老禪一喝籜龍齊豎指滿山雞蕨也擎拳打筍錯過羅漢菜採茶開遍了松花歸來撥火忙敲石煮得羹成日已斜無端妄想不能降種芋便聞煨芋香想到鼻邊流涕處更添三召也尋常休糧一味打黃精無意飛升腳已輕五百頭陀邀趕供不分遠近好同行答汪天如居士殷勤積取十分閒買得天台半角山君欲住時須借看清貧幾許在腰間贈南湖萬如禪師新築桐月菴殘雨殘煙湖水隈新桐為月繞籬栽得閒舞棹乘橈去等個人來問渡來宿雲竇閲默先稿微雲拂月不知春露滴幽香冷徹神夜半細敲天外響是鈴是塔是風筠負暄抱衲重岩捫虱兒不禁背癢喚沙彌無端搔著虛空脊說與傍人但朵頤答石梁陶居士索竹栽欲空諸有維摩室一日不宜無此君數縷秋雲掃花去閒庭月影任紛紛送正南監院乞糧一鉢千家自在身神通未及飽諸人應知牛首辭天供背負腰肩肯厭頻看嵌石此間二關主於小東山山亦愛謙名自小人俱尚隱共為關隔江洗屐遊如倦石指長伸羡此間三十初度偶來掘地覓青天㘞地無聲三十年直卻鼻梁橫卻眼幾回堪笑又堪憐施茶菴客到便請吃茶去趙州昔日嘴頭禪兒孫近代成狼籍處處為人種福田大佛頂峨峨佛頂覯何難解者須從腳下看更請撲翻千古鏡紅光覿露影團團雲鏡行腳頌三轉語贈之饒不出門亦是草遊情當下宜了了囊中惜取草鞋錢路債須防人索討出門便覺草萋萋良驥偏為鞭影欺何似牧童揚曲去飽餐黃犢任東西萬里無寸草處去死蛇滿路須回避逢人急著早歸鞭共我開田說大義挂瓢堂林深忽見許由情身外能將長物輕道似未同耽寂寞尚餘風打挂瓢聲和陳居士韻當陽一曲落梅花冬暖三山草亦芽千古流傳無孔笛不逢知己自須誇示禪人天地如舟一水浮從來船子善遨遊同人也解垂絲意誰是金鱗得上鉤一水古寺雲橫徑不通鳥啼花落自從容僧心不是羚羊角只為時流逐去蹤雲徑石巖如鳳自棲遲豈不飛鳴為待時翼未凌雲空掠掠銜魚白鷺上楊枝鳳岩人人眉底眼橫空三際如何豎可窮獨許摩醯羅面上如伊三點異還同豎目敲空作響不須疑擊木無聲亦可思曾信祖師親口說聞時用眼始方知聞空悟得浮雲無去來道人於此眼初開幾時化作如膏雨看取龍驚動地雷悟雲數墨尋行讀梵文煙迷霧鎖正紛紜忽然月出開殘卷彈舌橫眸舉向君古梵日既歷天而不周葵心傾倒欲何求形端影向中庭直你若無心我亦休葵心山隈髮塔雨煙堆昔日從空震法雷我到湖光開曉鏡宛如螺髻見如來法雷有燈破室千年暗無法傳人半夜心若問度生誰易度木毬輥出任他尋傳度枯木逢春花未開花開要等箇人來望州亭外重為望明月如珠出蚌胎珠胎學道從來要素心軒窗無恙掩關深何時打破關來看欲上峰頭尚隔津素軒玄路須知到者稀碧雲如水露華微千秋錫杖泉邊月肯與人間照是非玄微非臺明鏡即無塵自古皆知面目新近代殊多抹胭粉幾何昧卻祖師真非臺僧心淨即現曇花不負安身佛祖家但有木毬皆會輥悟迷何必隔天涯悟曇寶筏何愁浪潑天為憐無主趁風船指開古岸無多隔只在當人回首邊是岸生即無生悟未曾謾誇博飯種田能詢參百丈當年意大義分明上祖燈無生孤情卓爾出雞群幽谷陰崖叩蘚紋風翮有時超物表此行寧免纍浮雲鶴凌硯田何似慧田寬喚出溈山水牯看耕破石田知寶壽祖師靈骨露巉岏慧田摩尼至寶伴衣襟盡地人俱向外尋淨極瑞光遮不住真堪耀古與輝今瑞真雪峰泉水應潮生一滴能諳巨海情是法本無高下路誰能自肯放心平應生不鳴則已鳴則驚不修則已修則成會須啄破無明殼瑞羽靈毛賀太平鳴岐唯有塵中作主人能知化外自來賓儒冠釋履千江月喝去浮雲只一輪爾賓紅塵浩浩不勝情一念回光宇宙寧但得怨親平等看團圞便好說無生寧宇欲溯西溪覓本源群居七十二峰賢浴開萬古瞿曇面石澗淙雲出細泉石淙喜陳克一居士入山躡屐呼笻挈伴遊雪峰堂上整三毬因而識得衣珠在用處應如急水流祁德公季超止祥世培冒雨入山剔起燈花仔細看曲談名理總無干交馳棒喝空山裏竹影敲窗月又殘送敬愚法姪攜母歸江南骨破皮穿事辨山天華叢裏每倫閒曾攜寶鏡堂前月照過東關送爾還話月軒月當圓處難為話指向人添指上痕意在聖經賢傳外一回親見始忘言同浪首座應建州葛含初家信宿言及十年前先師亦曾宿此屈指三代矣遞代沿流過建川相逢懶話祖師禪爭看梅蕊含初碧我愛千秋火裏蓮飛來廨誰為片石本無情飛去飛來主廢興憶昔梵卿隆宋世此番不逐野雲輕雪峰寄曹能始居士登幾重雲天幾重長年無夏那知冬衲衣一種高寒色山外憑人想雪峰克壯方居士負高才秋試未遂欲棄去詩以慰之選官選佛較疏親肯賺丹霞見未真及至見真燒卻佛不如留取舊頭巾喝水巖震威一喝響千秋何止泉從別處流多少游人猶不信翻山爭禮石龍頭獅子峰石如獅子踞孤峰霧鎖煙籠幾萬重一日吼教群獸恐爪牙摹捋弄晴空如意贈考亭朱步紫使君如意家傳上祖圖贈君老景扶高歌高歌切莫捶吐壺吐壺捶缺將奈何考亭書院看梨花玉雨香飛趁霽遊高人自起理茶甌靈峰溪古連書院千樹梨花千樹侯遊武夷虹橋斷板閣高巖非鬼非神可得參款乃一聲清夜分半空明月挂仙帆仙船岩巖巖虎踞水龍盤吟嘯風生百谷寒降伏不煩仙佛力直教霞搏與雲搏虎嘯岩十二樓頭第一宵城高不讓五城高相逢不復疑仙跡節節梯雲犯九霄城高岩盡詫神仙也愛錢我來探討豈徒然披雲一解山靈愧散作苔文片片鮮鑄錢岩石龍千古鎮長吟噴沫成溪八曲深中有老僧閒結搆萬山春雨和鯨音龍吟菴武夷歸道九灣三十六峰頭應笑披圖學臥遊老病不煩登陟力雨輕雲細一帆收山居七首採薇不足又採蕨山居那得貪嗔歇草鞋繩斷行復行大嘯一聲探虎穴飄花過眼白兼紅片片香隨何處風幸自夜來春夢穩不從醒後更談空當牖森森起籜龍未驚雷雨未成功一枝石裏夜斜出便擬臨崖學釣翁幽居初見樹驚秋山上登山當遠游一覽不知天下小鏡湖隔岸曉雲流夜詠秋空夢欲清西風故作短長聲寒塘曉起看搖落自愛巖松老不驚白雲片片欲飛秋橋斷天台不斷流好友有懷誰到夢遠山何事獨登樓身間橡栗滿秋林眼向人翻白轉深兩袖持歸珠欲瀉溈山千古一知音錢武山太守過皋亭相訪不值寄懷皋亭山似武陵山種遍桃花戶不關為寄問津賢太守再來應不怨空還錢雍明居士以護法入皋亭因贈法號掌亭談空亭裏莫談空八面春風入座中宿食事完何處去不妨別別主人公主人無客亦寥寥聽鳥觀花暮復朝聞道主中還有主踏翻流水斷溪橋贈楞嚴壇懺主十首觀入微塵法界寬不勞心力得心安花香散滿全無物少室天台總一般不將心去復觀心諸佛全身何處尋一色一香一作禮幾乎漏泄垢衣珍解未圓通證未圓香臺繞遍話猶偏袈裟角上風輪輻撲滅燈花月一天大時梵響奏晴空諸佛何妨影現中一散煙雲遍花雨抬頭子夜日輪紅細和香土結壇儀不是其人不可依二十五尊同學侶善觀音響即當機結侶登壇不等閒況當劫濁亂離間誰云法地曾無動呵護神工讓主山春光周匝主山神繚繞風幡話不真一句伽陀無義語若云心動賺當人經行坐臥在其中海印光生觸處通舉意塵勞先起客施為動轉未忘功咒心熟處憑三昧三昧圓時賴咒心撮土作香香作土會須彈動沒絃琴咒力功深願力深共將大地變黃金更轉黃金作大地了然無事昔時人寄次升陳孝廉桃綻天台劉阮心皋亭石鼓待知音神交不復論深淺論到神交言也深香上葉孝廉擬裂逢掖樂搭袈裟謀豫以書詩亦真切真慧業文人何遽輕天福耶因先以法號大夢喻而止之孝廉尊慈霞舉然後抽身入山飯牛上流風瓢挂樹非分外事也其他參究上乘衲不能更添饒舌即請質之大夢禪士蝴蝶莊周兩未真回看總屬故園春至人無夢堪游夢哀樂難尋夢裏身陳次升居士以桃花風雪孰寒孰暖為問因答四偈桃花日暖雪風寒道在平常日用看看到不分寒暖處人生甘為眼睛瞞桃花非暖雪非寒不涉春秋心已安燕去雁來緣底事當陽一問海天寬雪風撲面一何熱日晒桃花片片寒豈是陰陽故顛倒不妨作句話頭看沒風雪亦沒桃花寒暖教人何處誇撤斷溪橋復招手隔江相見話偏賒寄橫山江雲叟壽蒼松氣結紫芝香石老雲凝碧蘚涼久嚮住山知此意何妨更送引年方示晴雲青天喫棓亦奇哉多少禪人著意猜拂拂清風磨日月晴光不礙白雲來募三衣何故僧衣似水田檀那種福要豐年耕鋤不費纖毫力我搭袈娑汝出錢募豆腐供佛西天用乳糜此方唯腐更相宜秋收顆顆摩尼重磨水成舟點得奇下雪峰坐古泉精舍適何道人索書偶拈一偈示之閒居何事可思量思入無思道味長梅向寒岩將脫凍春回難挽世情涼示趙淨塵居士下地修行早已遲團圞眷屬好尋思從今識取為人本父母生前爾是誰偶成峰高佛日洞山宗成始因緣見本空明教重興支派正難將斷拂又成終秋雪灘昨日山中始立秋如何積雪滿汀洲風翻日晒蘆花白浪拍波飛趁小舟七言律答天目友人問行腳別來君獨隱松關愧我瓢囊曾未閒先煮瀑花澆渴想漫移殘月照頽顏棒頭幾度辭黃蘗屐底三翻破博山語及雲門不欲語一溪風雨過潺湲乞糧靜侶星分已有年偶然雲聚柏峰前三間細雨斜風屋數畝寒苔瘦石田拄杖埋頭應自遣鉢盂開口畏人嫌龐公倘未浮家去且結今生未了緣訪盤銘弟掩關古廟適聞昨夜破關入小天荒噉筍去矣廟古爐寒澗草香有扉慵掩護雲光扣門殊愧言辭拙飲水寧甘杓柄長髮不剪除真抖擻詩非摸擬舊文章狂歌昨夜破關去筍欲參天上小荒為得山林農部五十壽機前殊不少知音把臂於君語更深忠膽暫從林下碧香臺曾向夢中尋籌剛半貯滄桑室杖每雙懸緇素心驗取若耶溪上記疏通洞水正如今答昌基陳居士來韻一曲春先已落梅為誰搽抹強登臺旗峰未展機如電鼓石方撾吼似雷香啜數甌茶盡醉光吞萬井月初開夢回卜夜成多事鐵笛敲殘惹鳳來游勺菴答雪澗禪士勺園居士原韻三千里外是何人擬易疏渠擬易親妍醜許誰窺寶鏡淺深容我探波臣澗猶凍鎖雪峰遠園已春回勺土新看到落花思結子不須梅熟齒津津靈峰見雪酒斝茶卮較異同老梅吹瓣又春風犬聲似豹驚山屐溪勢如雷驟玉驄蕭寺歲歸閒倚磬賢關讀罷冷欹桐千秋自許尊凝靜對雪長懷到剡中雪中補壽朱步紫使君七十薄雪沾松鬢欲垂考亭文業信繇誰才推玉枕談名理又索靈峰補壽詩上國懶呼鳩似杖沽村嬴得醉如泥歲寒不倦尋遊履共攬煙霞接武夷壽京臺王光祿六十共乞新秋巧月涼朝餘瑞靄為稱觴呈將延引芝苓術品入氤氳鼎鼎香言不慮深於耳順交非云淺則情忘雪峰若是前身我檀越當年亦姓王遊溪山寺橫拖拄杖入溪山博得同遊半日閒話到中興黃菊綻摹開斷碣碧苔斑機鋒欲解東坡帶公案須參佛印關茶罷索書留偈別塵勞有路又思還同公履次倫二居士遊龍潭蛟戶風回度石關此番恰值遠遊還搏珠反擲當兒戲屑玉飛空似等閒不為詩人消渴想亦應於我破頽顏情知世界紛無緒何事歸山又出山守歲得歲爐灰消盡不勝寒又向循環覓起端鄉國夢魂星散散水雲骨肉日團團香憑梅蕊開詩眼法禁椒花入頌盤彈指剔翻燈是火無邊憂喜不相干祝香幢兄六十壽一灣蘆荻一溪煙一箇菴頭一指禪春信鷓鴣傳語外生涯黃葉止啼邊風高檇李心先醉聲遍胡笳耳不宣試問阿兄多少壽趙州還有半生緣登拱宸橋有感為問甘泉學避兵鄉名調露正秋清人煙已逐浮雲散烽火猶連野燒明身在茱萸囊且佩籬無黃菊把難盈登臨雖有津梁在欲遠塵氛傍禁城居山雖則深山亦不寧草衣木食尚堪撐古人為道尊清寂我獨偷安避戰征呼吸光陰真可惜死生大事豈無驚曾聞有片閒田地得者方知不染情七言古寒食懷葉西眉子寒食食寒食不得陰窗淒淒暗雲逼四野風號薤露悲白楊酒空鬼雨泣千古如藤一握愁慧刀欲裁提復休桃花峰頂在匡山葉西塔于此琴溪裏在古歙為眉子歸安處臥碣沉碑未易求答曹白僧居士索黃獨住山人堪辟穀山尾山頭種黃獨日日時中煮一枚額定一年三百六西風起一朝霜家家門口稻頭黃山居我亦秋收足松鼠牽藤落子香北鄰老病初好裁詩寄柬頻相討杖頭掘起雪絲根大者如瓜小如棗呼童子聽吾訣莫著油鹽火須裂送與主人親口嘗氣味相投再來說再過江陵訪蘭友居士哭眉子葉西二法友將辭遊峨眉二友是丙寅秋同作于此君家黃山下別業楚江頭一帆縹眇三千里來往常為雲水遊我亦生平耽此癖十載飄流再經歷徘徊指屈社中賢此日惟君款瓢笠荒園流水便河橋要離隔岸紙錢標淒淒風雨當寒食懶上幽魂似可招多情有約追圓澤相逢那必三生石木供綿綿如有神欲理愁腸向誰泣景物依依情總關無寥辭擬上峨山峨山峨峨不忍攀三峽猿啼路幾盤活埋社言志并序往閲高峰録至掩死關處畏其骨幾欲退還及遊天目登千丈崖履酸不敢上謁中峰活埋菴讀紫柏大師題像云自古名高纍不輕飲牛終是上流清吾師未死先埋卻更向巢由頂上行因愛二老之風并愛其山得一絶嶮居之二易寒暑以侍師歸江南初沾法乳即叱余遠遊復適楚久之忽聞師訃奔喪歸與田園二兄言舊聚行腳事深慨道法零落有意續活埋之燈見余同志即欲結影恐香雪未深邃意得更入層巒共我一坑埋卻比余有天台之興偶得香柏峰頗寂故駐錫遲之今處已定志已決侶已集田兄囑余敘活埋之約余謂活埋何約第苦久長難得人耳略請各言其志以見終老之懷不同志者不得入社他時或有岐路借意龍天忍俊不禁者不惟永絶交遊北山當更有移文在也半生山水固耽神博得身貧道亦貧潦倒自甘成廢棄骨頭那許埋紅塵中峰昔亦患此癖幾度欲埋埋不得其父高峰抱枕眠撲然一笑成狼籍慚哉而我何人斯敢以其名契所思所思未遂在佳侶頑鋤拙斧今相知相知不必忘我你你去搬柴我擔水好在無心唱一歌舉起钁頭齊和取翻出春雲鳥亂鳴飛花不向水流輕本色自超諸隱逸肯使華歆笑管寧靈雲悟桃香嚴竹遺臭纍人空碌碌何似衡山芋子香千秋糞火今猶熟但得團圞志不遷蒲團破爛補教堅開轉杜園還杜田那管十年草年三十年同嵌石遊石梁下寺和壁間楊修齡先生韻瀑聲雜雨聲愈惡新霽攜笻攪雲腳雲飄微風吹瀑花散入修篁翠盈壑玄龍化石眠橫空欲跨擬心那能著應供人歸瀉影輕巉嵈錫響從空落三度何緣我得遊結鄰更許甘貧薄有時耽懶依重岩不禁爽朗憑寥廓寒拾風流不可忘挈侶登臨願如昨偶一行吟句可書空山毫楮何從索清磬一聲分下方寒濤面面迎松閣泉石何曾非舊時何似翻翻成旅泊杯茗悠然客氣消主亦忘懷心自諾再和前韻有序辛酉春偕吳翰生曹一蕊遊有歸邀白僧同投閒散之願余時已肯之今余與嵌石結居二載音問絶聞亦可念也適有僧歸新安書此寄懷意趣不佳神亦惡三日芒鞋懶縈腳士夫胸貴五車書山僧秪愧無丘壑隔院苔荒仙徑幽石枰花影空相著徘徊可憶爛柯人悠悠何處星零落洞口殘紅如餞春涼飆忽贈秋雲薄信是高巖暑不歸披襟一嘯何清廓課程且喜定登臨明日斷橋華頂昨枕瀑石梁今夕眠靈蹤五百堪須索都來不出魂夢中認是曇花羅漢閣萬里郎當到水雲駭目那能暫棲泊煩歸傳與有心人回首看看全舊諾送即念西堂歸小天荒送君歸住茆屋有好茶有好竹溪聲久不共人語拽杖莫驚山宿鹿梅花開須早來天華隨意點蒼苔人生韻事春風足放個小舟山陰溪上回樂已哉燒卻茆菴請不猜贈懶散蓮花菴掩關大地一關房知音不少關房一大地識者偏多若論懶散分中兩俱不涉雖然直得蓮開臘月滿湖香須記天華舊風月警侍者淨地住山好住山好犁鋤放下三餐飽枕石高歌帶月眠犢兒不喚歸來了我無端你何緣打起腰包出翠巖又道不明生死事挈錫持瓶願頗堅瞞卻母辭卻父父送子行三五步忍淚千行無可言子若修行來度我破險浪驚長江眼眼紅塵非故鄉戒基不築隨流去他日如何架棟梁起五更睡半夜吃飯穿衣是什麼冷灰煨豆熱將來爆地一聲真痛快急收裝歸故里雙親一見愁生喜不羡人間衣錦衣逍遙舊日閒田地示空諸既空諸有復空諸無空諸又空雪點紅罏紅罏雪花偏潔不逐春風輕漏泄掀起眉毛問是誰屈屈掉棒打月贈道興關主再住錢塘錢塘江上結茆處先師親手栽楊樹一點千秋利濟心幾度海風吹不去豈少天涯弟與兄惟君已去還來住不負先師囑托因茶湯冷暖隨人意越水吳山來問渡天華龍華兩條路雲門道法似中興憑君指去無差誤示謙光重住小天荒天荒未破雲蒼蒼天荒已破水茫茫水冷雲寒人去去蕭蕭瑟瑟仍荒荒汝其復住無多事離披草屋因風拄東斜西傾沒可何添新換新隨他去不雕不琢山之靈一丘一壑僧之精倚松倒影碧潭靜清宵要使龍吟聲莫遣春雷知所止龍不隱鱗真可恥我亦當年學住山住不慣時看樣子單丁結伴依穴巢草衣木食耕火刀罵風捶雨暮與朝而今博得徒勞勞汝其汝其無以我謙乎謙乎光乃超題悟衡手書華嚴佛豈不知不可說最初三七何饒舌小聖當場啞復聾微塵偈祕蒼龍穴菩薩名龍亦可疑入宮探討知時節從茲傳演紛紛然畢竟何者為華嚴走殺芒鞋瞌睡禪問著葫蘆口向天何如深掩破蕉菴脅不沾床信筆參十年鐵坐只尺龕如無所獲寧自甘顧我眉毛何足惜忖彼之心之所宅須彌可握海為墨贊彼東南指西北以彼之心擬佛心佛心擬經亦如惑我贊鼎立于其中任人千古空思測祝吳真人靈峰伽藍三月十五真君生九十六歲真君死若將生死見真君靈峰未識伽藍主靈峰伽藍今若雲不護不法凡愚群論其有禱必有應不擇良賤唯真君曾聞真君寓此像潭陽敬之負之降兩地相爭莫可何聽之溪流溯流上始知真君護靈峰隨緣赴感施神通我來寄錫非無謂掃其塵坌修其宮為其辨出茶酒味悟比純陽了無異世人只聞醉洞賓不聞曾受黃龍記從今了此生無生覺得趙州茶有味緇素相將獻一杯神通便與靈峰契示省一省得一萬事畢稍不然勤旦夕東若安西可必祖師意最省力柏樹子莫忘憶信手拈當面擲為靈韻禪士題不借居說即不說借即不借打開袋盆傾瓶瀉結卻口木枯花謝閒言散語盡期無至道于中討甚價有人來討草鞋錢豎起拳曰借不借訪雲屏兄於菩提山絶頂結屋矮亦高海風吹老松枝驕養性不令雙眼縱紫竹遮窗不剪梢每當靜夜枯定起愛聽松濤連海濤客來躬自為桔槔汲泉煮茗翻山腰七間僧堂不肯住孤峰獨宿何其勞我來話舊夜扣關開門一笑掀眉毛嘉興府萬壽菴智耕施資一兩淨行淨戒各五錢智古三錢薛鳳岑成筏吳佳道顯道聞淨雯潤凡心賢等上比丘尼照真慧光寂空內音各二錢五分同梓
