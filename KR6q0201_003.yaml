body:
  text: 嗣法小師淨柱編住福州府雪峰寺語録崇禎十二年己卯四月二十二日入院京臺王光祿請上堂拈香祝聖竟就座召大衆曰心外無我我外無物物外無人人外無心所以道盡大地是個解脫場一機一境盡從自己胸中流出直得蓋天蓋地大衆既是自己胸中流出自然孤迥迥卓巍巍活潑潑阿誰無分不見雪峰大師與巖頭同至鰲山舉向來見人得力處被巖喝曰不聞道從門入者不是家珍若要播揚大教一一從自己胸襟流出來與我蓋天蓋地去峰於言下大悟連聲叫曰師兄今日始是鰲山成道大衆還見鰲山麼只在雪峰裏許還見雪峰麼只在各人自心裏許還見自心麼良久曰快築堤塘水風來文自生上堂雪峰大師來也還見麼若見則官不容針若不見則私通車馬雪峰從先德山處傳得石頭祖師祕密法門今日被不肖兒孫一時揭露然一顯一密一抑一揚環轉無窮也是諸人本有事衆生於此輪回三賢於此安身十地於此立命諸佛於此設教立數立量説大劫説小劫結算到一十三萬四千四百萬年以謂始終之極且喜未夢見在縱饒於華嚴會上説到不可説不可説轉不可説的田地亦未夢見在禪門以為格內事做盡伎倆用盡手段直得斬釘截鐵要將者輪環子撲破乃打一圓相曰總不如雪峰用得恰好一個兩個三個數到盡未來際其實也只是者個今日本真請山僧上堂自己卻叨叨呾呾説了許多將謂攔我毬門路乃打拂一下曰還攔得麼不是自家無伎倆令人特地憶玄沙結制上堂擊拂子三下曰會麼此是石頭路滑不死的命根德山棒打不回的消息一句是甚麼殺人不見血三毬覿面提節外生枝到者裏須是劍刃上行冰淩上走若一味道是古人分上事大似千年田八百主者一藏文書正好合藥有病者出來問取良久曰脈斷去也求嗣請上堂古今一道生佛皆然若論感應道交便有門庭施設得之者臘月蓮花失之者炎天瑞雪今日山僧升座盡大地人一時升座大衆立地聽盡大地人一時立地聽大衆聽時山僧與盡大地人俱在大衆耳邊放光動地山僧説時盡大地人俱在山僧舌根上語四言三所以雪峰輥出木毬養子之緣猶在玄沙捉歸舊處事父之道居然祗如魏善人求子一句又如何舉不見道常念觀世音菩薩便生福德智慧之男且問觀音菩薩作麼生念若解念不用默念不用響念不用口念不用舌念不用心意識念應如是念如是念者佛亦如是生亦如是今亦如是古亦如是雪峰亦如是玄沙亦如是山僧亦如是大衆亦如是盡大地一切如是衆中有如是念者麼僧問門外風聲熾然念未審和尚作麼生念師曰巢知風穴知雨進曰恁麼則無剎不念去也師曰耳朵當眼睛僧禮拜曰不勞讚歎師曰將謂讚歎月印師五十初度請上堂天不足為長地不足為久閃電影裏翻身石火光中垂手難垂手撈得若耶溪月大似腰懸金斗到處印泥印水印空若經若論若律究竟如何下口吹布毛曾學安心賣生薑仍有辣手吃著大顛拄杖便去諸方亂走逗到今始知非七七消歸四十九乃卓拄杖曰若要慶我月印兄壽須向者裏會取不見釋迦老子成佛已來甚大久遠壽命無量復卓拄杖曰也出不得者裏盡未來際行菩薩道所有壽命亦復無量又卓拄杖曰也出不得者裏且道者裏是甚麼所在良久曰炎風吹不到且作雪峰看月曾作雲門侍者及庫頭首衆遊鼓山上堂敲空作響擊木無聲喚甚麼作聲喚甚麼作響還有道理商量麼若有道理安得有今日事若無道理安得有今日事且道如何是今日事莫是拈槌豎拂要接續晏國師聖箭麼屴崱峰高滄海近片帆早已透錢塘莫是語言三昧要起博山遺香麼遊人不坐忘歸石水盡山窮總是愁莫是為張道人因齋助薦麼昨夜面燃親口説鬼王早已自知羞恁麼則總不干今日事也雖然要會今日事也不難大家汲鼓山水烹鼓山茶吹鼓山笛唱鼓山歌興鼓山叢林作鼓山佛事只不要打鼓山鼓何故只恐落在今日故元旦上堂陽春布德何必囊藏被蓋百物咸新不須天外舉頭大衆今日是聖天子體元居正之晨我林下人合當酬恩報德若一向目視霄漢身坐白雲且道臣退位以朝君一句作麼生道良久曰條風開獻節灰律動初陽古泉菴請上堂日日日東出月月月西沒偶爾扶笻下雪峰相逢盡問承誰力此處若有代山僧下得一語不妨鈯斧頭邊鏟去參天荊棘如或未然晝見白夜見黑業識茫茫如何委悉好委悉拈起雲門六不收誰知臨濟打黃檗一切聲是佛聲一切色是佛色鳥自空啼花自狼籍又道耳不聞聲眼不見色乃擊拂子曰者個是什麼良久曰青山雨過真堪惜澗水無情日夜忙解制小參大衆雲集師曰今日解制須要各人自家解始得若要我解則不同銀花砌就玉樹粧成識得春風面目管取破顏有分若識不得去即印住住即印破夜明簾外轉身難門外也滑倒門內也滑倒荊棘林中下腳易到者裏解結從人收放在我若是虛空無背面解即是結即是各各親切道一句看衆無語師曰恐汝不能皆隨我道住汀州府靈山禪寺語録崇禎十四年辛巳三月入寺上堂拈香曰此一瓣香陰扶王化陽翼宗風端為祝延聖壽萬安伏願不忘佛囑攝護生靈秉般若鋒而消兵甲揮金剛焰以照群昏此一瓣香九龍灘上洗出根源鐵石磯邊掀翻瓦礫專為供養開山耆碩重創覺靈伏願處處長菩提之樹枝枝放優鉢之花此一瓣香夜半明傳當陽密付端為供養會稽雲門顯聖堂上傳曹洞正宗三十二代湛然澄和尚法乳之恩伏願人人懸照魔之寶鏡個個佩驅外之莫邪白椎竟師曰若道靈山未散大似眼花果是真龍便解拿雲攫霧遊戲性天之外若是香象不妨截斷衆流超出心海之邊大衆取辨個事大須子細祗如智者大師見個甚麼道理便云靈山一會儼然未散須具眼始得豈是者般死呆呆地口巴巴地有甚交涉即今山僧豎拂大衆揚眉與昔日靈山拈花微笑是同是別到者裏回互不回互二俱有過何故不見道如是之法佛祖密付浴佛日開戒上堂以拂子打圓相曰會麼會得猶是戒相若是戒體須向父母未生前會取父母未生前作麼生會須向己生後會取手清腳快者待他㘞地一聲便捉敗將來管取報恩有分若眼睛動定待他手指天地周行目顧九龍吐水浴將去持地菩薩捧將去便見薦取不及更待成佛道降外道度衆生説法四十九年入涅槃遠之遠矣今日山僧為汝將一個優波離一個大迦葉扭作一處你道圖個甚麼不見者裏喚作靈山如人地起還從地倒若會得四恩與汝一時報竟如或未然梵網經中道汝是當成佛我是已成佛常作如是信戒品已具足更要識相護持聽取誦戒五月初六日結夏上堂攪長河為酥酪有背拈花之旨變大地作黃金全乖微笑之宗若道靈山未靈賴有谷神呼徹應休云鐵石非鐵縱使金刀剪不開昨日採藥蜈蚣蚰蜒蚖蛇蝮蝎藏蹤有地今日用藥菩提涅槃真如佛性斂迹無門到者裏説個病瘥藥除也是靈龜曳尾總不如㙔埠衆信炊無米飯調不濕羹一齊供養將來禪衆若無握菖蒲劍驅艾葉虎的手腳擬欲吞噉也大難果是善知時節不妨騎龍頭踞虎尾與大家廝鬥一場略有些子氣息如或未然要説個結制法教山僧向何處下口倘謂結即是解解即是結結不是解解不是結於中便有一句子能殺能活能縱能奪未免遭人簡點畢竟如何良久曰人人盡謂西天有那個男兒不丈夫解夏上堂若論結也不論凡聖賢愚冤親高下盡大地人一時結若論解也亦不論凡聖賢愚冤親高下盡大地人一時解到者裏正令當行殺活在我於中有一個不解不結的山僧要他有個用處你若草深一尺拄杖子也深一尺草深一丈拄杖子也深一丈縱饒白雲萬里拄杖子也不得不隨他去乃卓拄杖曰且道向什麼處去良久曰相隨去也便下座橘山上堂闢草開荒我王庫內無如是刀幸有鐵爐在近隨緣乞食大庾嶺頭拈提不動此去瓦窯不遠雖然泥土燒成的山僧要與他打碎金鐵煉就的山僧要與他摧折饒有二虎把門天神送供也須退身三步不見四祖見牛頭山紫雲如蓋親訪懶融見二虎把門祖作怕勢融曰猶有者個在少選祖卻於融宴坐石上書一佛字融睹之竦然祖曰猶有者個在便爾契合自此三虎絶迹天神不來者個公案拈提問答自來已久山僧有一頌為大衆料理去無端要顯祖師風惹得旁流亂正宗今日為君俱截斷唯留一線話相逢話相逢鳥自啼香花自紅延祥新林菴上堂山上田高處高平田下山低處低平夏木陰陰幽鳥唱新林之曲涼風拂拂野老集延祥之慶雖無本據煞有來由人人放定光之光舉一步如獅子遊行凡夫日用而不知凡夫若知即是聖人個個具法相之相回一盻如象王旋轉聖人亦日用而不知聖人若知即是凡夫所以常不輕菩薩道我不敢輕於汝等汝等皆當作佛乃召大衆曰你看他道我不敢輕於汝等多少直捷及至説個汝等皆當作佛便被一切衆生各以杖木瓦礫而打擲之今日山僧則不然我不敢輕於汝等汝等皆不作佛衆中亦應以杖木瓦礫而打擲之管取報恩有地還有麼如無山僧自打去也卓柱杖下座住建寧府普明寺語録崇禎十四年十月二十九日入寺上堂拈香祝聖竟乃曰文不加點蛇不添足為甚麼諸方尊宿盡道繼宗續祖高登曲彔不見臨濟向三聖道吾正法眼藏被者瞎驢邊滅卻不知即今繼的是何宗續的是何祖若道千年文書好合藥你看盡大地那個是病的人貪者是貪嗔者是嗔癡者是癡喚甚麼作病須知貪嗔癡不是病能知貪瞋癡的卻是病知得病的定應知有知有的定能打破玄關闢開要路山僧要與他相見臨濟祖師道一句中具三玄一玄中具三要若識得一玄一句則五位三玄四賓主四料揀是甚麼乾屎橛大衆今日普明寺接斷橋倫一脈山僧只好作個證明何故不見道他家自有兒孫在薦母請上堂佛法雖下秋逢人莫蹉過拗折拄杖頭不為人超度何以故泥佛不度水金佛不度爐木佛不度火乃召大衆曰得好休不肯休惹他説個真佛家裏坐且喚什麼作真佛致使趙州老不能無口過還會麼若不會曹山所以立三墮一者類墮溈山水牯牛是一個是兩個二者隨墮山色與溪聲不知有何過三者尊貴墮垂衣而治者古今能幾個若謂今日是李成濂薦母上堂乃呵呵曰設有個漢出來道也是龍頭蛇尾又爭怪得他何以故普明寺裏僧不見有鬼故朱聯嶽黃蘇門二孝廉請上堂報本酬恩一義二義選佛選官是同是異到者裏分疏得下不唯就路還家抑且心空及第如或未然縱饒是個昔日丹霞忽被禪者一問直得腳不點地大衆你道今日檀越入山為是選官耶選佛耶薦父耶保母耶各各下取一轉語方可為應供之張本還有麼衆無語師曰恁麼則山僧代轉去也若是保母須以智度為母若是薦父須以慈悲為父若是選佛百草頭上會取祖師若是官鬧市叢中識取天子鬧市裏識得天子則念念不違於北闕百草頭會得祖師則時時奉重於西天以大慈悲為父則先天地而不為精以智度為菩薩母則後天地而不為老於此徹去所求皆遂於此未徹且要祖道重興試問如何是重興一句普明一向門朝北懶得從人復向南冬至上堂舉乾峰舉一不得舉二話師曰諸人還知乾峰意麼也是一面送客一面留人雲門也只得隨波逐浪今日山僧要與大衆判去舉一過水腳不濕不得舉二爛泥裏有刺放過一著鵔鷂趕不著落在第二即今在甚麼處昨日有人從天台來山門未開時如何卻往徑山去良久曰相續也大難大衆拈也與你拈了判也與你判了若要應個時節更須聽取一頌君子道長小人道消陰陽交接不隔纖毫若隔纖毫昨日明朝會麼無語師曰大家應取時節去衆女信請上堂今日女信入山與他説禪他又不會與他説淨土又不是者拂子本懷大衆還有方便麼僧曰兩個五百卻是一貫師曰不是今日當機又僧曰不男不女請師別道師曰別道個甚麼僧無語又僧曰一稱南無佛皆以成佛道師曰是你自己境界又僧曰請觀音菩薩出現師曰出現也未僧一喝師曰不是乃曰還有麼若有大衆喫齋與山僧無分若無山僧喫齋與大衆無分畢竟如何完滿利益他去良久曰山僧有個方便乃喚慧定尼尼出師曰應以女人身得度者即現女人身而為説法遂下座上堂道無可道孔子無知達磨不識一個陸地行舟一個水中走馬一個當道栽荊棘普明者裏則不然以一言三石馬驟千山會三歸一泥牛奔大澤到者裏得之即失失之即得得失分明天地懸隔不懸隔儒冠道履釋袈裟一擔擔來當面擲乃顧衆曰向甚麼處去也西堂曰好個消息師曰只是難委悉上堂有物先天地將甚麼作眼無形本寂寥舉拂曰者個是什麼能為萬象主天際日上月下作麼生不逐四時凋瞞歷代老古錐即得今日普明者裏也有一偈無物先天地有形本寂寥不為萬象主嘗逐四時凋于傅大士邊會得百鳥銜花二虎把門天人送供於普明者裏會得腰纏八斗肩挑十二化米齋僧雖然若得江南風氣暖梅花何必待春開李居士為母初度請上堂父母未生前是第一義麼良久曰生也衆中還有不報四恩三有的麼不報四恩三有的人還堪應供麼若堪應則終日喫飯不曾嚼著一粒米若不堪應則粒粒咬著粒粒咬著的如子憶母子得母而常靜不曾嚼著一粒的如母憶子母得子而常動常動則海底塵飛山頭浪滾常靜則龍吟霧起虎嘯風生到者裏直得動靜雙消子母俱遣方與香巖獨腳頌子相應頌中道同道唱和妙云獨腳且問既曰同道為甚麼又曰獨腳於此徹去同報不報之恩共助無為之化如或不然大家相聚喫莖虀不喫任從伊上堂舉藥山供養主抄化因緣師曰藥山雖辦來鋒爭奈行者兵符在手不唯化主著賊藥山著賊猶深直得帶纍盡天下叢林凡受供者至今著賊行者至今把住不放若是山僧待化主持歸舉話了便命知事收入庫房上常住簿云某日收甘贄行者買藥銀二錠管取行者一場敗闕今日普明者裏化主回來收已收了帳已上了且道山僧舉他作麼只要一手扶起藥山一手放倒行者衆中還有救得行者的麼衆下語師皆默然良久曰解制已在近鼻孔漫撩天臘八解制上堂舉拂子曰見麼夜半明星何似者個瞌睡朦朧説悟不悟一喚即醒天曉不露逼塞虛空向何處去去不去住不住鶻眼龍睛徒勞佇顧滔天白浪紫雲峰為君脫卻娘生褲脫卻也未喝一喝下座嘉興府平湖縣東皋釋行旦施資刻
