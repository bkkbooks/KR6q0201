body:
  text: 嗣法小師淨柱編住紹興府雲門顯聖寺語録崇禎七年甲戌臘月十二日入寺三門從門入者不是家珍為什麼倚肩踏躡大衆且道喚甚麼作門良久曰莫待當來問彌勒大殿洞山麻三斤名不須虛雲門乾屎橛迹不須實且隨我將錯就錯切忌道如何是佛伽藍宰一寺之權衡須要密不通風作衆生之保障仗你略通一線祖師放去西天為惜法堂深草拈來東土猶憐遍界葛藤明年更有新條在腦亂春風卒未休方丈背先和尚像曰大衆祖父從來不出門為甚麼爺向裏頭因惜隆冬春意動漏泄寒梅香幾枝拈疏山僧一向鼻孔撩天因到天華被者個礙卻今到顯聖又被者個礙卻且道者個是甚麼試宣看維那宣疏竟師曰還有向上事也無良久曰且向下會取遂升座拈香祝聖竟師曰隨緣赴感靡不周何故寂然不動而常處此菩提座卻又道感而遂通切忌道依稀相似誰敢云倣佛不同不特儒扶釋教亦乃釋合儒宗喜得山僧間卻衆檀越又要向蜃樓上重施棟梁冰花上刻畫青紅有時向顯聖堂前屙屎撒尿於淨白地上有時向天華寺裏説妙談玄於鬧市場中更有間工夫於若耶溪汲水浣石傘峰若欲撑天柱地須仗衆兄弟各顯神通有麼問答竟師曰如此問答還當得神通妙用麼明日天晴再主張剃度上堂天華寺以九龍水沐浴已竟顯聖堂將金剛刀剃度為僧倘得不待雪山六年苦行而睹星成道則不惟觀彼久遠猶若今日則心佛衆生三無差別情與無情共一體真大衆此個語話才入門來阿那不知且問既共一真何故一人食時難令衆飽問答俱不契師曰恁麼則無量劫來頭髮把盡在山僧掌握中遂下座法相寺上堂古定光今法相驀地相逢難度量短十尺長一丈橫看成嶺側成峰幾希惱殺丹青匠無底鉢盂一個斷鼻草鞋一緉海角天涯走一回兩耳依然在肩上錫杖卓開不是他忽作江湖大波浪誰能知有莫能知重將舊案新提唱作麼唱鴨吞螺螄兩眼脹上堂舉拂曰未入雲門人人盡有者個及至到來為甚麼卻在山僧手中莫為兩眼所瞞麼且道者個喚作什麼衆無語師曰盡道冰霜苦誰知節後寒付石浪首座法上堂天華寺華落也果熟也雲門寺門開也未若開已重重樓閣種種莊嚴更須知開已復閉的道理便見彌勒善財同在山僧鼻孔裏許得大安樂得大自在得大受用得大解脫得大無礙師忽打噴涕曰正恁麼時且道在甚麼處蹲踞山僧今日初度升座為浪首座向在天華會中識得曹家女話便擬唱還鄉曲調入嶺受徒住寺因山僧書去腳根未穩領衆來雲門且喜稍通浙語故在人天衆前有個斷拂子與他只可趕蒼蠅子若是傳法利生更聽取一偈遂展卷曰分明識得曹家女便把閩言通浙語石傘峰高浪潑天誰信耶溪淨如洗一枝斷拂春風生謾道無頭亦無尾相續情知也大難持書莫到他家裏大衆既是持書為甚麼莫到他家裏首座出提坐具曰者一枝花誰人拈得起師曰諒闍黎也不得進曰暗去明來又若何師曰昨日雷聲浩大進曰也是雨過雲門師曰雪雹分身又作麼生時雪雹大作座以坐真搭肩上曰且喜今日唱個耍孩兒去也師遂拈印打卷上曰耍孩兒且置還識得者個麼切忌道寶印當空妙重重錦縫開司理元公黃居士請上堂士禮拜曰請大師舉揚雲門未了公案師曰竹拖鳳尾慵迎客士曰今日親見作家師曰松作龍吟懶送人乃曰説法不待人待人乃可説及至有人來依舊無言説無言説佛殿山門強饒舌大衆今日元公居士特特入山要山僧舉揚未了公案祗如大慧禪師道二僧入門一僧已悟一僧未悟不待他開口便揀辦得出方可為人且問大衆還辦得元公居士已悟未悟的端的麼鐵山推倒誰能信此是居士省發因緣深入雲門孰可憑士遂問還扶得鐵山起麼師曰山門頭與居士道了也進曰明頭來時如何師曰耶溪不許扁舟宿進曰暗頭來時如何師曰此去錢塘尚隔程進曰不明不暗來時如何師曰杭州理公事時向居士道小參舉中丞盧航居士與圓通旻禪師擁爐次士問諸家因緣不勞拈出直截一句請師指示通厲聲指曰看火士急撥衣忽大悟謝曰灼然佛法無多子通喝曰放下著士應諾諾師曰圓通只知自己殺活施為不顧他墮坑落塹山僧則不然待他道諸家因緣不勞拈出直截一句請師指示向他道隨緣宿一宵他若悟了道灼然佛法無多子向他道明朝相送一杯茶住杭州府寶壽山光孝寺語録崇禎九年丙子春入寺唐祈遠孝廉請上堂拈香曰此一瓣香頑鉏底下掀起堯風蕩蕩鈯斧頭邊披開舜日巍巍爇向爐中端為祝延聖壽萬安此一瓣香荊棘所不能埋瓦礫所不能沒用報唐將山宋石田薰禪師建立之德以及宰護之誠此一瓣香既已貴買於江南終不賤賣於江北端為供養顯聖堂上傳洞上正宗三十二代散木大和尚用酬法乳之恩上首白椎師舉拂子曰此是第二義又舉曰此是第三義百義千義萬義咄有甚麼交涉若是個漢子拈起斧子從教斧子謳歌放下鉏頭直得鉏頭作舞那管江南江北瓦礫荊棘如或未然也要披苔剝蘚讀殘碑續斷碣免使碌磚瓦子七片八片泥金剛努目木羅漢攢眉僧問重揚古路拈提今事門頭今事門頭且置重揚古路一句請師指示師曰鉏頭柄短斧頭長進曰今事門頭又作麼生師曰栽完芋子又栽瓜進曰恁麼則曹源一滴浪滔天沒卻三千及大千師曰開田去士問如何是參禪得力處師曰拂子頭邊無限春進曰如何是參禪險難處師曰溪山溪水莫留停進曰如何是參禪受用處師曰明日到瓶窯進曰逼塞虛空時如何師曰香煙堆裏看進曰學人正當進前無路退後無門時和尚如何相救師舉拂子曰者個是甚麼士擬議師曰又道進前無路退後無門師舉龐居士參石頭馬祖因緣乃曰諸方盡謂石頭處得名馬祖處得地石頭處得體馬祖處得用若作如此批判入地獄如箭且問不作如此批判又作麼生會得不妨重顯寶壽家風若不會則定打瓶窯上徑山甘露寺請上堂蕭蕭一夜雨為人何太切其奈負心何杜鵑啼不歇春去了春去了明明大棒當頭楔髑髏痛癢有誰知淋淋甘露啼成血忽然識得主人心石女揚歌笑不徹師回顧大衆曰且道如何是主人心有識得者不妨出來通個消息看良久曰門前有古路一直透長安上梁小參拈拄杖召大衆曰還見麼者個人人有分為什麼卻在山僧手中不見道千年田八百主又拈曰且道者個是什麼獨有青山人不取古殿無香煙壁多風雨泥諸天撒手跌腳木羅漢自言自語惹得主山神忍俊不禁撑的撑拄的拄盡謂革故鼎新我道是將敗壞補敗壞而已舉賢於長者插標建剎因緣師曰大衆者一標子上三世諸佛泥諸天木羅漢向何處蹲踞衆無語師驀卓拄杖曰不信天開黃道日都言平地湧樓臺為嗣南容公茶毗小參孤孤迥迥崚崚𡾓𡾓青松為友翠竹為朋一生滴水滴凍今朝雨似盆傾大衆此是龍門舊住容公本有家風也爭奈現前一切眷屬拈提不出若拈提得出方見容公末後殷勤不惜眉毛徹底為汝不然未作龍門客空教點額回卓拄杖下座除夕小參八除二成一十九除一成一十除到今宵無可除休從杓柄聽凶吉不見道愚人除境不除心喚什麼作心智者除心不除境喚什麼作境不知心境本如如戍犬黃昏趁野豬觸目明明無障礙明朝更有新條在晦堂老人無大人相説心説境説智説愚説如如説無礙寶壽今夜一一歸除祗解依時及節敲破鑼打破鼓若是本色住山人畢竟了無刀斧痕要識刀斧痕麼説佛説法是刀斧痕説心説性是刀斧痕説迷説悟是刀斧痕説賢説愚是刀斧痕且聽爆竹聲中一歲除時如何珍重珍重住福州府西禪長慶寺語録崇禎十一年戊寅十一月念二日入寺三門古人道入門須辨主即今入門也還辨得主麼良久曰只見潮生朝自暮誰知山色古猶今佛殿丹霞燒的雲門打的山僧即今禮的還有差別也無不是我來時候早只因庭外荔枝無伽藍邪可驅正可輔忽遇沒面目漢你又作麼生噫大似當年忘付囑而今勞我更噓嗟祖師祖禰不了殃及兒孫兒孫不了殃及祖禰且道為甚如此不是不分先與後大都冤愛要分明方丈坐斷十方山僧自肯密移一步分付諸人還會麼補出蒲團秋月現列開五位照人難山門疏酬佛恩報佛怨世出世間都在裏許維那宣竟師曰是則是更有不落言詮坐致太平一句作麼生會良久曰恁麼則山僧拖纍去也遂升座拈香祝聖竟乃曰雨浙僧八閩客為君一一皆狼籍會得者退席五千不會者萬無一失失不失閃電光中尋古迹且道是什麼迹長慶破蒲團怡山發願文懶菴裂縫掖者一隊老古錐個個鼻孔遼天今日總被山僧拂子頭穿卻了也還有救得者麼衆無語師曰今日光祿王京臺居士特地入山設供請山僧升座未免便借教敷揚教中道應以宰官身得度者即現宰官身而為説法説法且置宰官身作麼生現顧左右曰鄉風處處別日月一般明上堂第一義無可説無可説非第一義盡道狹路相逢個是法門兄弟今日陳居士自皈依先師以來深念閩中祖庭寥落特特入山要山僧舉揚第一義怎奈黃河水向源頭濁了也釋迦掩室於摩竭淨名杜口於毗耶坑陷衆生個個不得轉身不得吐氣致使達摩西來對武帝道個廓然無聖大似披心挖膽轉見利害所以歷代祖師事不得已將第一義喚作長慶蒲團雲門胡餅今日又突出洞山寶鏡無非要人枯木上生些子花寒灰裏發些子焰使汝一切動轉施為圓陀陀活潑潑盡大地都做個大解脫場世出世間永不被人瞞豈不快哉山僧每見人信不及不惜口業更向人道者第一義即是吾人的本命元辰亦喚作主人翁亦喚作未生前面目亦名菩提亦名涅槃亦名真如亦名佛性可謂盡情注破今日何須重宣殊不知錢塘江解纜時為大衆道了也策杖仙霞嶺為大衆道了也遊南浦詠緑波為大衆道了也過潭陽歷劍津為大衆道了也既而泊洪塘登岸應供入山作佛事乃至王光祿請上堂總為大衆道了也何得今日更要在山僧口中取氣不知此事全靠山僧不得請各各自道取看首座石浪問曰既是沿途賣弄因甚麼弟全歸兄師曰人天首座也須珍重進曰嚼盡楊枝誰人知味師曰問取堂中長老進曰大衆難瞞師曰大衆在甚麼處座曰一片青山無痕不淨有儒者持書呈曰弟子有幾則問頭請和尚批判師立舉書曰大衆看看批判了也便下座陳玉尺居士請上堂召大衆曰還識玉尺居士不是好心麼居士以儒業潛修佛道入我雲門法眷今日便將玉尺要量我斷拂子多少長短多少闊狹噫直饒你豎量量得豎窮三際橫量量得橫亙十方也量他不著殊不知者斷拂子向在雲門顯聖堂中因打蠅子忽然斷卻至今不能相續有時在糞掃堆邊放光動地有時在十字街頭帶水拖泥有時在高高山頂有時在深深海底且問你向何處尋覓他乃豎拂子曰莫者便是麼若是則天無二日不是則家無二主居士不如將玉尺自量一量好若要自量直須向未生更未生已前下手量得定定當當方方圓圓然後向已生後及未來更未來俱量定當已自堪安邦定國維持世難那時斷拂子不妨出來與你同報國恩同報佛恩兩個眉毛撕結玉尺與斷拂子打作一團如何分別遂以手作鳩觜勢曰谷呱呱且道為甚如此只因昨夜梅花放惹得行人報曉春上堂天何言哉地何言哉人復何言哉所以古人道我語顯無語的大衆還識得無語的麼若識得便可添壽於山納福於海增祿位於無極若是遊山須見頂玩水要知源底便要問如何是無語的卓拄杖曰者是語如何是無語的若道離此是即同魔説若即此是亦非聖解不即不離又作麼生話會會得不妨山頭白浪海底紅塵如或不會大家齊念薩婆訶從天寧過南禪寺上堂過去天寧寺不可得汝作麼生觀未來西禪寺不可得汝作麼生觀現在南禪寺不可得汝作麼生觀莫是象骨分枝致使威光赫奕麼是則是奈被浪首座昔日拈一莖草插破面門帶纍一切人拖泥帶水及至雲門顯聖堂上和盤踢倒直得海底翻身今日衆善信福有所歸住持者功有所滿且道承誰恩力還知麼聽取半偈終日承渠力相逢不是渠既是相逢為甚麼不是渠昨宵春雨足枯木盡生機結制日宗曉張方伯為保釐請上堂天得一以清雲興霧起時如何地得一以寧崩巒偃嶽時如何君王得一以安天下虜寇縱橫時如何莫是不曾得一麼莫是得而不行麼莫是行而不普麼莫是雲興霧起不干天事麼莫是崩巒偃嶽不干地事麼莫是虜寇縱橫不干君王事麼不干且止且道者個一為甚與麼難會還許會麼泥牛吼月去還不許會麼木馬嘶風來若是座主家便以釋迦掩室於摩竭淨名杜口於毗耶為極則事謂是不二門殊不知已落二落三了也所以我曹洞宗有臣須輔君子須順父不順非孝不奉非輔要汝諸人於見於情於語言處絶滲絶漏直須如擊石火閃電光還有向石火光中垂手電光影裏翻身者麼有則便好與他商量道今日張方伯設齋結制要祈陰翊王度大家須時時奉重念念輸忠以圖報酬有地還委悉麼雖然此猶是因齋慶讚畢竟如何是結制一句乃拋出拄杖曰波濤靜處蛟龍隱兵革銷時宇宙寧上堂昨日法今日説明日聽時方解脫世人盡欲報親恩自家恩愛何時撇昨夜觀音文殊普賢等一隊漢被老僧各與二十拄杖趁出山門且道何故只因他自未度而度人為菩薩發心故果自未度而可度人為甚大目犍連是神通第一的度母不得勞他世尊教供養十方賢聖仗彼威神方可得度老僧與汝判去世尊權衡在手目連捨重從輕只知目連母生天殊不知衆聖賢著賊還知麼老僧從西階上向東階下若有個漢出來道老和尚袈裟著地也與我同參有分師誕日上堂未離兜率已降王宮降王宮後一場懡㦬未出母胎度人已畢出母胎後一場懡㦬致使歷代釘樁搖櫓把纜放船漢個個盡道不動步而周遍十方不開口而言滿天下蒼天蒼天總不如東村西舍胡張三黑李四朝隨流水去暮踏白雲歸前日有個衡廷道人道此是大解脫場大無礙處被山僧捏住鼻孔七日不得吐氣今日卻來為山僧慶壽壽則從汝慶秪如僧問趙州和尚年多少州云蘇州有汝又作麼生良久曰莫謂江南霜雪少松枝不逐歲寒凋上堂極苦無苦極樂無樂拄杖一條千巖萬壑只為證龜成鱉勞動箍籬木杓昔日甘贄行者入南泉設齋時黃檗為首座行者請施財檗曰財法二施等無差別者曰恁麼道爭消得某甲嚫便將出去須臾復入曰請施財檗曰財法二施等無差別者乃行嚫且道差別在甚麼處此是一段未了公案今日為大衆了去行者請施財拈來無不是檗曰財法二施等無差別用去莫生疑者曰恁麼道爭消得某甲嚫但有天在上須臾復入請施財更無山與齊檗曰財法二施等無差別者遂行嚫且道又如何判一片白雲青山內一片白雲青山外青山內外俱白雲白雲飛去青山師頌至此良久曰還有人續得後韻者麼僧曰在師打三棒復問曰還有麼乃卓拄杖曰三世諸佛只頌得到者裏歷代祖師只頌得到者裏山僧也只頌得到者裏復卓拄杖曰者裏是什麼於此會得不妨省力如或未然祗為農夫愛春雨從教鳩婦怨蒼天嘉興府平湖縣東皋釋行旦施資刻
