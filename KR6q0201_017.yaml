body:
  text: 嗣法小師淨柱編疏裝大悲像疏示菩薩身影現婆娑衆生心量種種自訛如千江水千月隨波大施小施福女福夫所以莊嚴手眼不可無如是之多裝地藏像疏勝奇賢侄為度母故誦地藏經見聖女救親因緣即發心裝願王聖像復思人人有母吾安得而盡度之欲即此一尊結普利緣乞疏於豫豫諾之久之無隻字又久之復無隻字別曰行矣又復無隻字余自笑曰豫豈無母耶豫豈不孝母耶豫豈不信有冥苦耶豫豈信而不願入耶何鈍置若此適三宜兄在座笑曰作疏已竟豫亦大笑索筆疾書曰明珠晃晃金錫琅琅是幾許短是幾許長人人有個地藏王何論貧富兼存亡色身金身一任裝三宜兄曰咦重修大船砌路疏持地菩薩因平地而得平心雲門先師因平心而得平地蓋先悟後修先修後悟之謂也余忝繼踵天華欲重修大船廣運沙石補其坎坷固其隄防使代代平先師之心年年平持地之地願施者勞者與天華共成不朽之業雖曰末法三災難逃定論獨不聞有妙莊嚴路一門超出者乎修寶泉寺疏古虞寶泉色味俱佳源流不絶故古人以此名寺奈久經廢荒僧多散去今衲輩偶爾雲留擬疏其源通其流欲使盡地人尋心地流者易得其源耳今在著力之始能有一助鋤鑿於其間者他日寶泉遍地流香煩客一杯清涼熱惱其福利有不可思量者莫道山僧以境示人好活埋社募藏經疏藥山看經祇圖遮眼離經一字魔言説趙州轉藏只解繞床依文解義佛冤家社結活埋經師經論師論何關數墨尋行田開大義參實參悟實悟豈類死灰寒木宗通處管取山神難著眼説通時從教頑石易顛頭募三教方册疏為學日益為道日損此齊運之語也各見一邊者遂成偏僻殊不知日損即損為學之益日益即益為道之損也果以廢學為道者豈孔子十五志學於中盡廢其學而平至從心所欲乎以余論即為之廢學亦可也第廢學之學不易為愚者道耳古靈欲擇三教中所堪助道之損者而學之當以我語俟諸中行君子或不無少助山居之高志云蘭芎山募藏疏蘭芎秀發壁立江干善接一方總歸三寶然三寶雖一體使人知有佛而敬僧乃法寶流通之力也能流通者似又僧尊奈何近代僧多口受口受則疑誤後人此蘭芎主者所憂而發心募藏之所緣起也募畢當大開閲藏道場使一方生正信驅邪外備倫理人通途知三教之大全知自性之本有此本有之法佛不能宣僧不能演吾故曰法尊攝心菴𮘗華嚴經疏攝心菴古名清溪雪師蓋誤稱也國初耆舊以清溪雖幽隱未稱實參本色故以攝心易之欲以諸所有物攝歸於心入一微塵裏冥搜禪定已二百餘季矣神宗末年有涵如承雲諸公者從雲門飽參歸結社其中剖破微塵出大千經卷為語溪一帶有緣檀信作無邊佛事三載一周周而復始復請三宜和尚掩關三年茲當來雲上座新董其事以此新新無盡之義正之於余余因喜而助言并疏其所從來云龍泉寺改應為禪募疏創業易守成難此世俗家之説也佛家亦然一人為道處亦隨之而興興必有衰衰而不至淹沒無迹者賴應教存羊之守居多也以羊存故有賢子孫者出知禮之可復則合衆歸仁焉內仁而外必有仁者至此龍泉劍合之舉感來平石禪友之謂也人有一矣翕然來歸十方響應轉瓦礫作金碧特易易耳將使天下應門徒守而不能克一己之私者聞此發心躍然樂改為禪當自龍泉始善信其樂助之法相寺募建白衣大士閣疏定光現相元是主張宗乘大事留下肉身原是拖泥帶水心腸所以感得一切求男女人終日耳朵邊嗩嗩聒聒不得已攙行奪市隨所樂求莫不響應茲者白衣大士忍俊不禁擬向山門頭把住要津要挂專門牌額雖然寶壽於此不無線緣寧忍坐視乃因晴雪融禪而説偈言長耳乃可圓通圓通豈離長耳聞説主中有賓便要賓中有主閣高高聳千尋衣白白雲萬里融禪畢竟能融一任人人參取大悲菴化米疏得住山三昧者必以大悲心為體不與厭喧求寂者同日語也故我友平石見菴以大悲名即喜而隱之不專以木食草衣為得也豫願所見聞者俱發大悲心行正施度所有四事供養盡入大悲體中平必從正定心受之正定中所受即萬兩黃金也合消請諸善信勿以隱居無為謂施無所著而失善利也葺小荒天疏會稽山有天峰今名天荒俗所誤耳曾是雲門先師圓頂相處故天荒以避名稱小真天峰之隱山也宜乎隱山之流居之故即念與謙光親手誅茅廣僅盈丈既蔽風雨稿守三年苔田漸闢可絶外緣以豫住天華強念出山及歸道侶雲從遂成雅集次年又強之首衆歸為小東山菴主邀入關似亦愛其字小偕嵌石弟而從之天荒則有古靈書記受托焉盤銘弟往來養痾兩山相望朝雲夕霞正得意時也忽敗茅風妒古靈欲葺之余曰近地住山者盡天荒耳今賴即念僅得一破何復補之古曰天荒可破茆屋不可破也余嘉其志之堅喜而助之并囑其輯集凡所題詠法語詩賦使千古之下知我道亦有破天荒之故絶勝天台一招隱峰也報國院募疏證道歌云住相布施生天福猶如仰面射虛空狂慧者往往呵布施為有為余謂住相布施為有為固是矣請不住相布施可乎則知乃福乃慧只知住與無住一布施間非離布施而別説無住也今報國院往來浩繁監院事者深憂粥薄發願以百福莊嚴接待高衲募三石三年為一願一任水雲朝暮挂笠攜囊請問昨日有人天台來卻往徑山去不知是住非住道得者也要一願道不得者也要一願何故一盂香飯子何處有飢虛如離掩關募疏參究到黑漆桶牛角尖當銀山鐵壁轉側不得處此關意也其次禁遊覽客喧屏嗜好焚筆硯吟詠稿其身心一番寒徹大地回春則梅花撲鼻矣今法相皎然耽心翰墨余以向上事發之遂猛欲避去易字為如離傋笻笠為遠遁余復緩之且曰今以大地為關房者皆是説空行有不敢效之且從迹上徹去甘為鈍根不到千穩百當不休復擬掩關又不暇計日給之需余不得不告諸檀護共成其美也西禪結制募米疏世有論儒釋者以是證非而已是非心生未免乎兢兢則於道懸遠此過在言遣言也復不能廢言以近道故大覺璉以三皇治世及五帝三王弊而為秦漢得我教迭相扶持配以四時循環可謂千古確論矣戊寅冬余應雪峰西禪之招先集西禪與諸護法談三教同家意出大覺答孫莘老書讀之咸謂陰翌之論為不虛即以護國保民報親之道與林下人計書疏遍告結制一期以西禪是唐懶安禪道入閩初地至雪峰則大盛當時國界之盛亦隨之矣奈威儀久既不堪得余中丞集生公同衆鄉紳並力併爨舉花雨監院總之功虧一簣耳愧余耽山水人無補助才每揮麈弄無義語為活中有不甘炊無米飯者領疏分衛為法忘軀倘或同道相親直出是非之表當以豫言作無言觀堯峰山募建藏經閣疏姑蘇名藍堯峰其一也觀夫聳出奇巒白雲朝暮直不下虎丘諸峰而主席代不乏人規繩整整夜半鐘聲千古破客船之夢矣邇林皋禪師以磬山法道補次其間一枝笑杷覿面相呈三藏十二部置之空間無用地不為分外然雖如是離經一句即同異説固當以金針玉線莊嚴正法眼藏令向往者至重重樓閣彈指門開諸佛全身於中獨露庶幾堯峰道場更添光彩云東塔募建山門疏把住放行全賴者個大家扶起出入有度無住勤舊接待募疏生緣在錢清而不居出家在方外而不寓此無住耆宿之行腳也見行腳僧往來錢清者乞茶乞飯頗煩施主心力欲體施主之意結庵為主以接納之朝朝暮暮迎雲送水願成就日抖抖空囊一文不帶比諸昔守郡侯投一錢而水清不又超勝有功不宰無住之真也檀信其成就之化千僧鍋疏無底鍋炊無米飯木偶人調不濕羹乃祖師之玄唱鍋須底飯須米唯有智人能和妙饌是如來之實語若各見一邊者名擔板漢不勞拈出今皋亭山佛日寺有數百僧俱弄虛頭漢被老僧把住要津使他步步踏著實地粒粒咬著米糝此全非禪者募大鍋所由起也人以腰纏十萬貫騎鶴上楊州為得意不知遊戲無端不如全非不帶一文赤腳下楊州使楊州罹變之地轉禍為福知有此無漏功德庶不虛往全非其努力焉靜聞堂主結社興萬壽禪院為接待疏昔寶峰真淨禪師舉淵首座主奉新縣慧安禪院時湛堂為座元問淵曰公去如何住持淵曰某無福當與一切人結緣日負栲栳打街供衆湛堂以偈餞行淵去逐日打化遇暫到即請歸院歇泊容某歸修供如此三十年風雨不易百廢具舉一日見黃龍死心禪師訪之淵曰新長老汝常使沒意致一著子該抹人今夜且留此待與公理會些細大法門新憚之不宿而行今靜聞堂主辭佛日庫司結社共興萬壽禪院雖不及淵北人之孤硬而慈意過之他日有如黃龍者來不知如何接待若肯一味承迎禮拜茶飯殷勤宿歇方便亦不管他有意致沒意致亦不管他是聖是凡一任他去諸方擺尾搖頭定不怪靜聞爛泥裏有刺也呵呵古泉菴募藏經緣疏泉從地湧菴得泉名僧依菴住法藉僧弘然僧欲弘而法有未廣者此古泉募藏所由興也時當末運僧行荒疏才入禪流便學繞禪床為轉藏出入息為轉經動欲廢置文言殊不知不屬文言何從得此省事法乎且一大藏教不過説此省事法耳從上古德莫不精心妙思悉了佛之方便乃得門庭闊大宗説兼通然後隨機設化非如不識一丁者專以一機一境為得也今古泉禪衆力事耕鋤減口接待一時名士高僧嚮集淳風漸成法窟種田博飯與商量浩浩並行食輪與法輪共轉報四恩資三有俱承此一滴泉開甘露門他時源遠流長有莫可涯量也其成就者福亦如之大佛廠募供佛地疏淨光禪士古德法師之嗣祖雲棲之淨業結侶發願募造西方三聖身皆丈六不惜頂踵歷數寒暑今始得成金光煥赫見者欽仰以未得善處供養正與余謀客曰佛靈自解尋覓住處何勞人力為余曰人力即佛靈也一念精進勸破慳囊令人捨所難捨辦所難辦無非接引大意悉是彌陀化身以我化身嚴我法報心佛衆生三無差別良有旨哉外道欲毀外像別説報身小乘欲離報化別説法身凡夫欲捨自性別説佛性所以不信立地成佛有如此者則莊嚴為自莊嚴捨為自捨辦為自辦自性自度自性自成一香一花一瓦一笠是真布施施能即到彼岸即到彼岸非立地成佛之別名乎客又曰燃燈佛指釋迦佛布髮掩泥處曰此一方地宜建一梵剎衆中有賢於長者持標於指處插曰建梵剎竟時諸天散花相讚此是宗門捷徑願事斯語矣余曰識得此一方地則大地具足識得此一標子則萬木森然如或未然再請淨光禪侶從頭指出書問一答太平山一我徐居士買山而隱可屈本懷但貧無所措則不可也倘得居士為外護主衲為內護聚幾個可雕琢漢一整開田説義之風山居庶幾可守矣何如何如別後無他念獨以居士英氣未消知見太闊做不得鈍工夫為懷耳大凡不肯鈍做者才到無趣向處十個有五雙退還腳底一絲終不能斷此皆近代士大夫參禪通病也見居士不以衲為白墨屢施惠教衲雖不敏又敢以居士作士大夫觀耶翻貝雖佳第居士此時尚是出爐熱鐵極宜一氣打成若於道理棲遲便道冷落他時欲重整鉗鎚只恐頭醋不酸二醋可知矣答子將聞居士昔曾識面於西築雖不及接語然以親近家師得神交於居士久矣昨家師過天華蒙寄問參話因緣正抓著貧僧癢處適值季超祁居士設茶茶話已悉其概茲以居士深心此道故不得不重饒舌耳所謂參了竹篦話了又參三玄三要者蓋因彼不知凡是話頭殺活俱具將謂竹篦但能殺為小法為一橛頭禪故須更參三玄三要以活之為之堂奧為之大法使一切瞎驢見人便道我已會竹篦話了今正參三玄三要在或云三玄三要等俱會了一切淆訛公案尚未透脫在此皆以古人有某處得名某處得地之説貯於胸田殊不知得名非小法也非一橛也亦與話頭無涉也悟之淺深也悟竹篦小法為一橛即一橛小法也悟竹篦為堂奧為大法即堂奧大法也故古人有一兔當陽橫古路蒼鷹才見便生擒後來獵犬無靈性空向枯樁舊處尋之偈又有悟三玄三要者曰得意忘言道易親豈拘拘以話頭為淺深耶以話頭為淺深者即認語中有語名為死句死句其可示人乎居士履踐既久或以此探貧僧則可耳若果未能確然不回狂瀾於既倒則未之信也近來宗門雜沓非內外護者不能揀別或有人問喚作竹篦子話即向他道石人慣弄無針線又有問三玄三要話即向他道石人慣弄無針線請問同耶別耶深耶淺耶大法耶小法耶居士能一眼覷定定不以野狐涎為是師子乳耶非師子乳耶以家師還渡吳山匆匆喋喋不覺滿紙聞公車北上戰勝歸時當與居士共出隻手一斬支離何如何如答祈遠唐孝廉自先師圓寂愚兄弟俱抱拙巖阿唯家瑞兄努力一出別業辨山非居士不忘佛囑為功德主恐道風未能遐布之若是也謝謝不盡敝寺天華雖係先師殘局奈貧衲薄德鮮福縱有雲水相依不過種田博飯而已獲蒙來問愧無以酬忽記古人有若有路可上更高人也行之句則知所云半年參究毫無進步是居士真實得力處也果能以此無進步穿衣無進步喫飯迎賓待客有什麼過處近時宗門雜沓知解紛然賴我辨山古朴孤硬稍可一挽軟暖邪風然非國主大臣并力於其間必難扶持此末運者昨冬草草登座門人隨録剩語梓行聊寄一册并先師塔銘及拙題大士畫像以赴尊意晤面之緣不識在何日也臨楮依依答即念首座吾弟出先師之門賴諸方知識及衆兄弟鉗鎚雖在天華人天衆前偶爾成文亦是吾弟本有之物於我何關況欲易此虛幻之名分乎若欲與近代法門有益則吾弟自有兼人之度當於授徒之際虛淨一派以智字傳則不負先師不辜兄弟無損於古有益於今可以循昭穆可以便稽致而一舉盡得之矣故諱與字俱仍舊貫唯號贈此間蓋取前題小東山之詩曰山亦愛謙名自小人俱尚隱共為關隔江洗屐遊如倦石指長伸羡此間之意亦不俗也答蔡雷讓居士向聞居士造履綿密將謂專修淨土中人及一促膝居然禪宿也古謂見面不如聞名唯居士能反是耳本色修行人何又欲煩行腳為雲門雖淺賴有竹可看泉可飲如肯留意衲當分半榻以俟日來與諸衲力用磨磚法頃刻無暇忽睹尊翰及諸法言固自一種意味然未免心識運為耳衲又不喜人脫空漫語於其間不識何以教我來語偶以朱筆點污想在個中必能情諒也又見索頌古公案若不淆訛處果得淨盡無礙更説淆訛無有是處答寶壽衆檀越僧懶僧也喜聞寶壽可容我懶有檀越可成我懶又何煩尊翰為即欲月杪拽杖以雲門兄弟尚爾聯纖故先遣徒數輩料理之隻影渡江當不出春半間也俟入山後方敢遣訊通意蓋不欲以住持俗套相及耳倘檀越亦能以野人宥之使他日懶瓚家風復布寰宇或可一遣熱鬧時流是檀越之正信護持也呵呵與黃元公司理清淺若耶不能久款玄論為悵茲入西溪深處寶壽家風不減楊岐唯春暖花香僅免縮項嗟吁耳浪首座尚未能以公署作蓬戶觀又不欲效顰投刺倘居士不惜乘橈衲當以快钁掘迸土籜龍供居士大嚼一回也何如答祁季超居士正岑寂間忽得知己書如獲至寶又與世寶兼及感當何如更感餘杭邑宰之囑此又居士與令弟之分身護法也便當達之昨小徒三登回知居士同令弟結制寓山不勝欣羡衲常謂令弟既精於遊宦其遊禪窟亦必有精而後已者今果孜孜無倦耶二令兄八令弟曾入七期否煩俱為致聲天童歷然之爭居士欲衲有以息之此亦有關大事意欲居士先我著眼倘於此辨得不惟可驗兩家之妍醜即天下衲僧正邪俱可驗矣惟試為辨以寄我衲當相隨來也與嚴印持居士別後訪瓶窯老師談及法門何啻抓著癢處惜居士輩不在座未便趁水推船耳其間更多忍俊不禁處俟晤語時述之倘有及於子將居士幸以此意通之使此老不致埋沒一生掃蕩近日野狐狂妄然得處所就成廣容萬指不可不商諸海岸公也心海師卜居淨林寺側獲一訪之恨識之晚彼聞居士許我度歲山中亦為生喜品字爐頭當有一段佳話在也嘉興府梅溪菴通勝助刻資二兩東塔盛時一兩淨朝五錢通識三錢宛在菴行普一兩同壽梓
