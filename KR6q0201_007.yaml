body:
  text: 嗣法小師淨柱編住杭州佛日淨慧禪寺語下結制上堂僧問開選佛場續諸佛之慧命登寶華座振洞上之玄風還有不涉化門一句也無師曰有進曰如何是有的道理師曰皋亭石鼓鼕鼕響僧打一圓相以坐具作呈勢師曰放汝三十棒乃曰選佛場開只要個心空及第的人既是其人便能善通個消息若一機一境問答語言轉身拂袖以為能事教山僧何處與汝分個優劣你又何處會得舌根談而不談的道理若會得終日穿衣不曾挂著一絲終日喫飯不曾嚼著粒米稍不如是一入門來便死在佛日語下要見佛日重輝也大難在還要見佛日重輝麼倒騎黃鶴峰何須問彌勒珍重上堂師舉拂子曰看看有心所作難成無作隨緣易就到者裏迷之與悟聖之與凡直是刀剪不開所以二僧一齊捲簾便道一得一失二僧同時下喝便道賓主歷然二僧共入法堂便道一迷一悟近日宗師家要具如是眼目豈能容易山僧忝主此席只解喫飯時知得茶味嘗苦時識得甜味嘗辛時卻知酸味便要與古人抗衡自知慚愧今日菴主以設浴入山請揚般若貴期徹悟發丈夫心立丈夫志要與天下比丘尼出口氣美則美矣若要種秧須看上帶如昔空室道人因看法界觀有省後在保寧設浴揭榜曰一物也無洗個甚麼纖塵若有起自何來道取一句子玄方可大家入浴又曰盡謂水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗卻大眾且道水垢既除洗個甚麼於此會得悟迷有甚麼難辯凡聖有甚麼難分雖然佛日者裏更有事在且道是甚麼事若到諸方切忌錯舉上堂僧問人人氣宇如王為甚麼觸著便生窒礙師曰還見方纔孩子麼進曰也是某甲為眾竭力師曰哆哆啝啝說個甚麼進曰從教大家自在去也師曰一任𨁝跳問坐斷十方猶點額密移一步看飛龍如何是密移的事師默然僧禮拜曰謝師指示師曰飛龍聻僧便喝師曰灼然不見乃曰寒風落葉格外鉗鎚夜雨空階個中爐鞴於此會得纔發心來所求皆遂如或未然不免引古證今蘇子由參佛印曰麤沙供佛佛喜受怪石供僧僧不嫌空手遠來還要麼更無一物可增添佛印曰空手呈來放下難三賢十聖聚頭看此般供養能歆享木馬泥牛亦喜歡子由可謂抱贓叫屈佛印也是將錯就錯總不如今日施主設齋供眾一飽能忘百饑老實求福要福求壽要壽求般若要般若且道般若還求得麼者裏也須子細不見龐公道難難十石油麻樹上攤龐婆道易易百草頭上祖師意靈照道也不難也不易饑來喫飯困來睡且問還依那個即是若是總依般若豈有三路若只依一路爭奈公案不圓若總不依則莽莽蕩蕩畢竟如何還聽見方纔孩子聲麼不見道如世嬰兒五相完具上堂師召大眾曰今日水月菴主為求干戈寢息天下太平要山僧陞座與他道取一句山僧住持事繁仰勞大眾代答一句看眾下語不契遂下座曰牛生三個子到老自拖犁雲萍師請上堂僧問雲師入山為是因尋故舊為復就裏呈機師曰一人傳虛萬人傳實進曰賓主相見所談何事師曰忙者不會會者不忙進曰不落宮商曲陽春和者稀師曰我只會唱個打草竿進曰相逢謾道空歸去洞口桃花也笑然師曰看取露柱僧拂坐具歸眾師曰錯問師子遊行不求伴侶忽遇道伴交肩一句請師道師曰我者裏不道進曰為甚麼不道師曰不見有道伴進曰一種沒絃琴惟師彈得妙師曰放汝三十棒乃曰天無私不蓋地無私不載人無私不和且道主山案山今日商量個甚麼于此會得客聽主裁不會則主隨客便我雲萍兄自先師遷化住個菩提山子不涉世緣一任松參霄漢竹遶柴扉可謂得計何故又損口腹之餘齋我數百閒漢且道是何心行若要舉揚先師宗旨爭奈先師無宗旨遂舉拂曰既無宗旨且道者個又從何處得來若分疏得下大家相聚喫莖虀為甚麼喚作一莖虀入地猷如箭射參紫雲菴開光上堂師舉拂指曰看看六鑿未分至體虛玄一爻纔動妙用無際到者裏合不為一分不為二乃可觀天文察地理知休咎識生死雖然若要施五彩列五眼全仗此一毫頭上放光動地始知肉眼則礙天眼則通法眼觀俗慧眼觀空且道佛眼要他作甚麼雖然無用也要伊燈燈相續代代相承祗如西天四七東土二三直至於今光遍大千為甚麼又借兒孫得力方見雙眼圓明聻莫不是從此法界流還歸此法界麼此猶是教意若能易短為長轉麤作細變大地作黃金攪長河為酥酪猶是以幻修幻且道更有向上事麼鴨欄兜裏木仍舊是栴檀相鯁生求嗣請上堂夜天月冷白兔懷胎曉洞雲腥神龍孕子世出世間何彼何此一入信門沿流不止所以道信為道元功德母長養一切諸善根秪如相居士為世間法求子為出世法求道是他信心切處麼逢干戈而不擾遇禍患而不侵是他信心切處麼發心至此途路迢遙盜賊無干虎狼不懼是他信心切處麼似則似是則未是何故聻將雲間移向皋亭山皋亭不知你還知麼若知得真是信心切處將皋亭山移向雲間雲間不覺你還覺麼若覺得真是信心切處且道掬水月在手弄花香滿衣又是甚麼道理良久曰參取去啟建保安道場小參師召曰大眾眾俱迴顧師曰者裏非哀樂所及非禍福所到亦名凡聖同居處亦名方便有餘處若覷不破立不穩踏不著便有山河大地明暗色空遮汝眼睛聲色貨利役汝心慮以至生死輪迴無有了期若覷得破立得穩踏得著那裏有山河大地明暗色空遮得你那裏有生死輪迴得你那裏有聲色貨利役得你即今萬方多難也有趨吉避凶者也有趨凶避吉者若是有智主人二俱不受今日一方善信建此道場畢竟有何功德昔日達磨老胡說個功德實無爭奈蕭帝不肯全身擔荷致使凄凄渡江九年面壁若肯向無功德處擔荷將來管取一色一花一香一味一頂禮一合掌一低頭語言談笑咳嗽掉臂盡入此無遮法會無非解脫道場且道無功德處畢竟如何擔荷良久曰目前景物人皆見取用誰知各不同喝一喝遂下座薦亡上堂昨夜西風蕭瑟曉起日光失色不作佛法商量管取度亡事畢大眾為甚麼不許作佛法商量祗如道佛身充滿於法界為甚麼天地懸殊普現一切群生前為甚麼陰陽相隔隨緣赴感靡不周為甚麼生死離別而恒處此菩提座為甚麼日上月下會得者四個為甚麼死人頭邊有活鬼若不會活人頭邊有死漢珍重𮘗藥師經小參僧心月現客意泉清賓主相逢合談何事到者裏轉得身吐得氣不須更造續命旛燈修諸福德自然人有無量壽壽有無量福福有無量樂如或未然然燈造旛放生修福一些也少欠不得倘能依教奉行易短壽為長年轉愚癡為智慧有甚麼難處且道因齋慶讚一句又如何委悉良久曰藥音樹下傳消息看取琉璃遍界光遠思曹司理為太夫人慶壽請上堂心心心念念念無壽相有定限大眾既無住相為甚卻有定限若能奮起金剛威逢山把柁遇水乘車踏斷溪橋踢倒山門掀翻法座喝散大眾始見蓮華峰現瑞黃鶴峰呈祥看取蟠桃一會儼然猶在若論佛日家風直須扶起法座喚回大眾整理山門接起溪橋依舊陸行車馬水渡舟航穩到家庭抱子弄孫呼奴使婢看取靈山一會儼然未散如或不然下壽六十歲中壽八十歲上壽一百歲忽有個長老出來道今日遠思曹司理護法為太夫人壽誕請師上堂為甚麼說佛說仙說人到者裏山僧妙語只可旁通大眾玄言秪堪曲暢且道如何是通暢一句良久曰散心雜話信施難消養虛堂主請上堂僧問個中若了全無事體用何妨分不分如何是體師曰佛殿東南缺一角進曰如何是用師曰腳跟下進曰如何是體中用師曰香爐缺兩耳進曰如何是用中體師曰拂子頭邊無限春師舉拂召眾曰今日拂子拖累諸人去也還有轉得身比得氣的麼你若向拂子頭弄機鋒呈轉語如日中逃影相似走愈速而影愈隨矣不是拂子有如是威光有如是能事只是大眾尋常日用為物所轉無能自由所以拈出拂子見著便粘住若於此脫得自然於物物頭頭上不作冤親見不作逆順見不作爾我見便是獨脫丈夫山僧如此說話也是入水拖人自救不了何故今日堂主又要山僧為他薦亡秪如薦亡一事或看經可以仗經力或持咒可以仗咒力或齋僧可以仗僧力乃至修橋砌路等福可以仗福力以拂子擊座曰到者個曲彔床上又無情緒又無道理又無言句又無可為人處畢竟作何薦拔若於此信得五僧度一鬼于此不信一鬼度五僧擲拂子曰險玄珠關主請上堂僧問透關的人來如何接待師曰不接待進曰為甚麼不接待師曰只為他透關的人進曰若然則禮拜和尚去也師曰錯錯問玄珠護于赤水為甚麼又要求出師曰你者問何處得來進曰舉起撈摝無蹤放下普天匝地師曰忽然泥沙混時如何進曰有求皆應師曰不是不是乃曰十方同聚會個個學無為既是無為又如何學此是選佛場心空及第歸且道歸向甚麼處去大眾相集未久只因題目未見所以只將個窗下擬的燈下讀的到者裏十個有五雙不濟你看或菴參此菴舉到此是選佛場此菴便震威一喝或菴大悟作偈曰商量極處見題目途路窮邊入試場拈起毫端風雨快者回不作探花郎你道他見的是甚麼題目入的是甚麼試場拈起毫端做的是甚麼文字為甚只說不作探花郎今時流輩便作狀元郎去也所以是者等人下者等鉗錘便承當得去你看他不等到心空及第歸便一喝喝住若是初修後學話也被人喝住了還要念盡方歇是此等人如何下得驅耕奪食的手腳適纔僧問玄珠赤水雖也恰好待山僧道忽然泥沙混時如何便見不堪又焉能消得出關齋供忽被索取飯錢畢竟將何抵對擲拂子曰參彌陀誕日為剃度上堂山頭昨夜剪新茅體露金風正寂寥更問出家求解脫我王庫內無此刀大眾既無此刀將何作個剃度佛事到者裏說個無量壽佛是今日生且道既稱無量壽為甚麼說今日生既是今日生為甚麼說無量壽於此分疏得去佛事已竟如或未然更要說個身口意清淨是名佛出世身口意不清淨是名佛滅度此等盡是不了義語所以今人更要覓個身口意清淨的境界秪如三羯磨三皈依是清淨境界麼錯求懺悔發弘願是清淨境界麼錯搭衣剃度受持戒法是清淨境界麼錯會得者三錯不妨將錯就錯忽有人問豈非大錯你又如何答他良久曰有漏笊篱無漏木杓冬至上堂銅墻鐵壁撞頭磕額密移一步通個消息若待舉頭天外看飛龍直饒駿馬良駒追蹤不及噫好消息汝等比丘比丘尼優婆塞優婆夷只知嚴淨毘尼高登戒律那裏曉得昨夜子時初刻灰飛六律山僧只得整備個無底壺沒孔笛要你大家和取太音一曲嘗曲玄酒一滴呵呵且道太音是甚麼曲玄酒是甚麼味若道玄酒淡味太音稀聲卻似揚聲止響何處有衲僧氣息如何是衲僧氣息不見道光陰莫虛擲僧問一陽已動五位纔分如何是不遷義師以拄杖東觸西觸進曰不遷意旨蒙師指出格一句如何道師曰拄杖無頭進曰推出五位通前徑裂破三關世界寧師曰為甚麼聻進曰石虎嘯峰前去也師下座上堂昨夜纔添一線長今朝便擬繡鴛鴦金針欲度誰能度屋後臘梅空自香大眾你道金針是有耶為甚麼不度與人道是無耶鴛鴦將甚麼繡於此諦當得即是菩提涅槃即是諸佛真體即是親得戒法即是大解脫場便好說道三羯磨時早已破戒了也便好說淫怒癡即是戒定慧雖然於如來禪始得若是曹洞門下直須橫抽寶劍斬諸見之稠林妙協弘通絕萬端之穿鑿不知誰是其人良久曰還會冬至起頭九麼一九二九相喚不出手喝一喝薦亡上堂鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後此等說話古人做到細膩處方能如是論量若是初修晚學聽得鐘鼓一齊震動便覺分疏不下雖然便恁麼去即是在天而天在人而人在六道而六道在輪迴而輪迴更須知在天非天在人非人在六道非六道在輪迴非輪迴方稱了事人今日石微禪者為薦母設齋請山僧上堂要許多清淨僧眾為汝超度汝還知母落處麼若知得度母已竟如目連尊者為尋母落處卻在地獄裏相見放聲大哭求脫無由乃於七月十五日設盂蘭盆會求仗清眾僅得生天殊不知母親不在地獄不在天上亦不在人間且道在甚麼處若知得落處則應時超脫矣又豈止生天而已哉大眾各各所生父母今在何處乃至過去父母復在何處試說看一僧出眾頂坐具曰某甲供養父母去也師曰不孝之子一僧問那吒太子析骨還父析肉還母將甚麼說法師曰冬不寒臘後看上堂應以比丘身得度者即現比丘身而為說法應以比丘尼身得度者即現比丘尼身而為說法正當比丘說法時眾中無有一比丘尼者正當比丘尼說法時眾中無有一比丘者還會麼若道默時說說時默無法可說是真說法此等見解只可做得座主使下我者木上座自從開山本空祖師傳到如今他不甚肯放人過今日要與大眾論量諸大德既是默時說者木上座即今現在說法但不知所說何法華嚴耶阿含耶方等耶般若耶法華涅槃耶試說看眾下語師俱曰不是不是維那結椎曰諦觀法王法法王法如是遂下座為剃度上堂胡三黑四張七李八治世語言皆順正法佛日者裏也無心傳也無妙法只要機教相投有問有答答若不在問處莫怪我松篁橋滑舉丹霞剷草因緣師曰你看他有甚禪道佛法麼有甚奇言妙句麼也只是一個觀機逗教一個依教奉行若差些子則不順正法若不順正法則一戒應當學敬心奉持化主薦親請上堂智者一言快馬一鞭便恁麼去猶涉聯纖卓拄杖曰松篁橋水逆流了也既不見地復不見天又何處見有人物龍仙又卓拄杖曰松篁橋水順流了也一任你蓬頭赤腳願募個十萬八千要將惡因緣勸作好因緣又要山僧將他三爹八母從九地之下超歸九天喝一喝曰消得龍王多少風平湖眾居士請上堂塵說剎說熾然說無間說釋迦老子恁麼告報大似卿自用卿法塵聽剎聽熾然聽無間聽山僧恁麼舉揚也是吾自愛吾廬若要主賓互換父子協和且看今日化主與施主同參若施者受者一齊說且道聽者是誰若受者施者一齊聽且道說者是誰呵呵還見月下孤舟漁子笛麼自家吹與自家聽臘八道懷禪人薦親友請上堂舉一不得舉二放過一著落在第二古人恁麼舉揚大似開眼說夢今日說個孝名為戒亦名制止孝順至道之法山僧亦是開眼說夢道懷禪人為薦親友要山僧善入遊夢三昧還見昨夜明星獨露麼致使好夢難成有個公案為汝拈出昔日十地菩薩夢見眾生身墮大河欲救渡過忽然猛省且道省後如何若道夢裏明明有六趣覺後空空無大千你看者千二百五十人俱是個甚麼良久曰一百應當學敬謹受持眾戒子請上堂恁麼也不得不恁麼也不得恁麼不恁麼總不得過去事已過去了恁麼也得不恁麼也得恁麼不恁麼總得未來何必預思量無可得時與麼得與麼得時無可得即今即道即今句臘梅花裏水仙香大眾且道臘梅花裏為甚麼卻是水仙香古人道持戒但朿身非身何所朿大似不曾圓菩薩戒在何故比丘朿身不犯菩薩朿心不犯設有個人出來道持戒但朿心非心何所朿又作麼生抵待他良久曰途中善為除夕火頭請小參小盡大盡同歸於盡小年大年等是一年若是知時識節的漢自然古今慮絕新舊情消更須跟腳堅牢田地穩密不妨輥雪峰木球打普化觔斗吹無孔笛善解改腔彈沒絃琴偏能易調倘不如是便去念貧米無春笑富粉轉磨盡虎衛凶桃符捉鬼直饒唱到普天樂步步高總屬世諦流布是非留於心憎愛存於念胸中如沸湯相似何時有休歇處更有一等略肯回頭只解揚湯止沸又誰知有灶裏抽薪的方便還要灶裏抽薪麼問取火頭看元旦上堂一輪始曜萬物維新信手拈香普天共慶低頭作禮匝地同歡榮耳目之觀情知雲月是同崇玩弄之好須信溪山各異且道今日吉祥方在甚麼處良久曰眼底休尋兩道眉初三日解制上堂僧以坐具打圓相曰佛祖聖賢為甚到者裏不肯住師曰途中善為進曰嶺上數枝梅長空一輪玉師曰此去長安不遠進曰赤體無依表分身萬象中師曰甚麼人境界進曰別行一路人難識借婆衫子拜婆年師曰草鞋繩斷也未進曰伏惟和尚萬福師乃曰人人藤斗笠個個水雲包出門踏著草途路轉迢遙到者裏不倒斷得一回直饒說個回途得妙就路還家便是千里萬里昔洞山辭雲巖巖問向甚麼處去山曰無巖曰莫還鄉去麼山曰無巖曰幾時回山曰待和尚有住處即回巖曰此去難得相見山曰難得不相見今日若道難得相見便生幾多情見了也只因洞山是個得的便道個難得不相見看他何等穩密何等把細佛日期中豈少一知半解只是到者些原委處未免走作即今你要東去西去不見古人道直須向萬里無寸草處去又云出門便是草又云不出門亦是草便見舉措不得只因你不能向異類中行且道異類又如何行乃屈指曰一雞二犬三豬四羊五牛六馬為甚麼七人不道參即晚陞座辭眾曰一期圓滿可謂有始有終若論本分家風一落始終必不免於始終之患須知本自無始又何有終今人不解自推只管向外推求推到伏羲神農黃帝以上說盤古便為分混沌之始不知盤古是個甚麼混沌是個甚麼若看一念未萌以前父母初生之際豈不真是盤古真是混沌只因不覺總在始終裏面安身一有始終便有生滅便有輪迴所以一切聖賢苦口教你參禪參到一舉一動亦無始終處便是就路還家便是出輪迴處且道始終畢竟如何免得你且將年月日時推看推到一剎那際如擊石火閃電光相似以拂子擊案曰如者一響說他始也得說他終也得說他生也得說他滅也得若再推到初生即有滅再推到當處發生隨處滅盡再推推即是不生不滅便好孤迥迥峭巍巍一任逆來順往七縱八橫踢倒便行撩起便走有甚麼拘戀處便是解脫丈夫便是出塵羅漢還有此等人到此等地步麼不則惜取眉毛好嘉興府東塔雨花蘭若弟子淨介施貲五兩繡
