body:
  text: 嗣法小師淨柱編序香雪遺稿序昔大陽玄將入滅思無可踵其迹者作偈并頂相革履及衣寄托浮山遠偈曰楊廣山頭草憑君待價焞異苗翻茂處深密固靈根遠受之一夕夢青色鴈曉起得投子青符其夢大陽一絲復繼皆遠之力也嗟乎具足兄與余同出先師之門各天一涯聚首未幾忽言長別亦以如意法衣法卷寄余曰香柏支峰秀隨緣折一枝花開香雪遠何必異苗為蓋香柏是余棲懶處也比讀偈時屈指其門所遊處者為豫默靜即念現子數子三年來俱周旋其間余非敢暫疏其意也今結制天華仲冬無嚴寒盤銘弟輯余剩語得香雪録共謀入棗將落成索敘於余余曰此吾未了事也遂欣然點筆即擬聲鐘告衆曰道得即今句子即入天華一數道得過去一句即是香雪一流余肯以香雪作異苗觀耶抑非異苗耶請看看若耶水逆流了也雪峰語録序古尊宿剩語如雪峰者殊難多得但其間趙州不肯處至今疑賺殺人若不是個裏轉身具一隻眼未易望殘蠢而津津也得山林居士以入道因緣紀號於雪峰夢裏雲門先師奇之將謂拾得寒山同時説夢居士亦以夢身奇緣不忍忘卻雪峰法脈輒尋諸簡編獲玄沙稿請序於先師然猶以未行雪峰語為悵耳偶從雲水拾全帙欣未曾有書付剞劂政山野抵西禪日也適問及雪峰語録居士躍然曰何緣奇若此因備述前話併夢中景索豫辨言竊謂居士夢入雪峰見的是紫衣羅漢胡親到時面目儼然而衣煥金色脫無主僧説破未免覿面疑生則是録也雖現成古板在乎眼底一新亦須另著一番話會庶幾與雪峰親相見乎顧所喜當年原夢於先師者今日夢破於山野矣汪子野山中樂序樂有世間出世間世即身口家事眷屬入山林為清出城市為濁以未參樂地樂實苦也出世亦然以既參樂地苦實樂也樂地者淨土也境緣殊勝也境勝則觸處皆樂無退轉繇也此以舍受言也現在何如一心不亂也不亂則境不能動謂之有主主為何六字真言也即此六字逼塞虛空雖身口等滿前如子龍挾真命天子直破重圍而致坐平也然則禪與淨一乎曰禪無著力淨可著力也抑有異乎曰禪從無主而得主主即有仗忽問正睡著無夢主人何處則真主現前而不識必欲死關遇緣方識識則安邦定國矣淨從有主而無主無主即空寂故目前法法寶花行樹而不覺必欲親見彌陀而後回入娑婆回入則安邦定國矣一異之義如是然此一絡索何因因吾友淡然與子野汪居士交喜居士之為人嚴身口以持戒儉家事以供僧對妻子同梅鶴以閉戶為深山乃深信淨土而不毀禪并其著述視豫豫則不啻搔著癢處矣余愧生不諳音律見人歌轍喜喜至忘倦故詠居士之作不覺雲興霞舉雖不合韻而七十二賢峰皆響轉憶寒山詩謂入夜歌明月侵晨舞白雲居士足以當之謂焉能住手口端至鬢棼棼豫足以當之即此歌舞生則定生去實不去又詎可與愚者道南明禪師語録序昔彙雲門先師稿有無趣無幻二大師語録序其中稱趣為仰山再來稱幻為臨濟直下兒孫無趣克家之子乃知南明大師為幻之嫡傳也余初參雲門即入龍居禪席值南師首衆重蒙提挈一日遽問曰一念緣起無生超彼三乘權學等見阿誰緣起有生耶師與一喝余時茫然夜坐單後過數炷香如彈指頃始知有做功夫事南師之力也時同席有玄微兄者又為南師嫡嗣及師遷化余在山水中每遇玄兄聚舊即以大事為問玄兄以病自謙遁名匿影余住雪峰嘗一接書問再接偈言知己住持普明矣逮余遊汀州遣禮招至欲行古道遜余上堂余復邀衆檀護迎請升座堅執不允故勉為結制竟成賓主焉話次復及大事即頽然示疾余曰斷橋倫一脈至兄止耶曰不然脫有可兄意者能指出以相示乎余唯唯即索南師源流并斷橋倫歷代付法偈及語録一卷莊讀行狀益知居常孤潔不肯輕展鎗旗竟以退託終其身故余不得不憑贓揭出使人知斷橋兒孫猶在也和栯堂詩序凡和詩者不超原唱不若無和此余於栯堂山居幾搆而幾閣筆也茲讀鴛湖兄所和如啜蘿岕於酩酊令人眼目一新實稱老手近代禪講集必有詩詩必有山居多屐不食丘壑杖不飽煙雲縱描寫十分何異矮子觀場而因人啼笑哉鴛兄一生肥遁全節避名故自比於龍山之菜葉黃牛之橘皮其高臥何慚哉急付剞劂以代招隱度親菴序孝有世間出世間世間資身出世資神世間資存出世資亡世間資近出世資遠為人子者若不會遠近存亡身神為一致而超然於世出世外者何足以語孝哉凡有身者必有心有心者必知身之所從出有身而無心異類也有心而不念身之所自者夷狄也能知身之所自即知有親有親始有本有本始有末如樹本生枝葉仍受雨陽以資本未有暫不資本而能枝葉婆娑以蔭覆於人也外道有忘身離念耽空滯寂者佛必深呵痛叱此不以無身為貴也貴有身而知本知末本末不離此人子所以不可不孝亦必不能不孝也雖然永言孝思世有幾人嗟乎此儒之追遠釋之薦升道之祭祀不撤可不嚴整痛志不忘耶古航師倣武林度親菴事菴為葛屺瞻公舍宅供佛中設接引彌陀旁設上中下位不論富貴貧賤僧俗男女各以宗親牌位羅列香花六時佛號鐘鼓晨昏主其事者俱精律衲僧至今遠近繕紳士庶咸欣然從事謂度親第一義諦此余發心欲隨處舉揚於古師之先而行遲於古師之後故一展師疏愧喜兼抱敢不合掌敬附永言遐哉古師也既已超然物表何患親不可度而猶深體佛言佛言二親最神也最神之言智者參之則度親之舉將見爭趨競赴而梵宇輝煌殆不煩神運矣鴛湖禪師語録序近代禪宗多旋蒸熟賣且向人曰直待龍天推出語此太平話耳斯何時也敢栖隱耶初聞亦覺心爽更二十年彼此悟者皆是也三家村土地廟點心鋪子唯恐不售甚至挑糖擔子敲鑼上門換亂頭髮鐵釘者又不可勝數欲求如鴛湖兄東躲西逃避名全節曾不一二見其又患斷橋脈微實當己躬林下水邊照影珍重故其器之晚成不期自貴余下雪峰以富沙之普明招余開法余亦為撾毒鼓推出瞎驢拈五位入三玄絶無剩少及輯南明大師語録敘之知為臨濟二十九世孫鴛兄即踏翻船子法嗣如夾山者三人録師遺語過寶壽請敘并塔銘憶昔雲門先師敘無趣無幻二老録則今日之敘又敢以不文辭耶隨事寫神庶使生摘之流與分洞分濟者一醒春夢其中奪食驅牛雷奔電掣當有如張無盡者點出金剛眼在嚴無敕居士山居詩序詩中有禪者唯奇幻絶人非有關於性命也道人之詩不真妙悟必多雜蔬筍氣易令人作嘔無敕老居士因病得間日叩大事因緣融文心為禪思和唵㘕山居詩語語遒邁復多警人心意如流水細聽看念斷非老於林下聽水二三十年者烏能至是哉此真詩禪也陳默公居士詩序泊舟苕上寄宿溪庵曉窗照雪人盡稱快快應候耳默公在座歌落花三十韻一助飄瞥憶曾補落花草八言不因學士遣黃州彭澤先生醉未休懶向春籬數狼藉誰知依舊可憐秋殆補菊花也擬更補雪花飯香催供而止香幢兄山居詩序香幢兄代先師座余亦得次僧倫頗稱交契及兄分化檇李真得兼宗説於先師者每托病韜晦結一指菴吟詠水邊遠絶四鄰若深山谷余亦為名山纍了無定蹤時法門既碌碌矣兄自若也余適楚歸同鴛湖兄訪之鴛居桐月衡宇相望氣味相類余自顧覺形穢焉及僭主天華顯聖住寶壽入閩歸法門更碌碌矣兄猶自若也每一興懷得不移我北山亦既幸矣寒松顏色敢冀復青耶客冬作三泖遊取道一看話舊而已茲主東塔復得披襟領契已出意外更出平生法語詩偈一字一珠讀不忍置因以山居小册序梓以鴛兄稿成余亦得董其事耳聊志歡喜敢讓不文記上虞寶泉寺記上虞寶泉寺去縣南五十里建於唐大中七年咸通六年賜額寺南為南寶村隔飲牛溪數十武渡溪北折里許即寺溪西三里即剡溪可通竹筏雨過溪深則大帆乘潮直泊山趾緣溪東南二里曰牛步以昔為白道猷騎牛入山處牛隱其地有牛倒形迹江公亮詩曰亂山深處隱招提古木層陰白晝迷好是道人岩畔月夜深清照飲牛溪此指其膚近者言其前後在望則覆卮東山兩俱為靈運遊樂處若夫雲連台嶽波接海濤梯寶泉頂𩕳一覽而盡寺之興廢自唐及今不知幾幾豫庚午年入寺時聞諸鄉老曰數十年前寺經大廢國産四百餘畝古册尚存至今俗呼為和尚田竟為居民所有指舊住僧仁賢曰彼重興時僅復山田百餘畝又以鄉宦有圖風水成訟後廢去復指寺前梵宮池白蓮曰此種每年間發居民無知侵為稻畦今師來復睹此花之盛且欲卒仁賢之業則仁賢之功不虛矣詢昔賢名氏則曰有白禪師住此不知何許人因憶公亮詩亂山招提之句知其為騎牛翁無疑也寺有古觀音伽藍二尊是守道場主見侵害者輒多靈護古磉石板山門石柱舊迹此不繁述考諸新志款只有三志叢林則有建寺賜額及廢併事志軼事則有大和中鄭注在寺出身事志山川則有白道猷從此入山事新志為神宗時邑侯大聘徐公所修故凡志廢寺概以國初目之其過於略可知矣抄册又以寺産易為舊田其故又可知矣有心此道者深念國家多事未暇及此則新創庵院不能無故宜以此不朽之迹主之庶使諸方衲子有所歸佛道有所賴即國亦有所補也因記之復寶壽泉記戊寅初夏彌月不雨泉井俱涸飯頭西土者引鋤覓源直入主山後澗掊棘裂石迸沙而出者三其次者已似兔兒梅花虎跑上者筧痕尚存知其為五百年前所銘寶壽泉也味特香潤土人相傳飲者多壽蓋指此耳諸禪侶爭以偈呈以美西土之勇焉余乃向疑井在懷遠樓下其陰重易使人病即室後小泉雨過濁不可煮茲得此知井上之銘皆後人衰相不求源而源愈沒矣今當填井廢小泉移銘以復其源俟夫有福者來他日千鉢盈盈即真石田再世也諸禪侶其深識之識畢大雨三日豫復為之歌曰入虎窟探蛟宅棓棘烈荊身不惜虎跑錫卓何足奇頓令鋤齒生津液閣下井室後泉細品情知味不鮮不似厭常新可喜尋源意在石田邊竹苗枯秧苗死山下人家望雲駛一雨三日誰之功能令枯者榮死者生夭者壽病者起吾聊以徙其碑復其古記其事而已銘調象菴越山兄塔銘向上一路千聖不傳卻之不後引之不前所好者道進乎學也才既吾竭恩愛自捨越山崢嶸實稱其名朋來以樂未免於情縫掖思裂髭髮思截會稽雲門中有古佛挈侶辭家嶺出仙霞不惜腳指卻笑玄沙登雲門堂遐契於夙擺壞金鎖香象躑躅葉落思根酬及至恩還鄉一曲友誼復敦鼓山靈骨蔓不可覓禱於北林舍利湧出建宰堵波結茅於窩通霄古路剪藤伐蘿虎窟狼窟百廢始葺遙迎博山躬為輔弼溯流建川盟結死關老矣瓶窯指畫其間復歸屴崱調象為適象王回旋度生事畢有塞優婆仙陀純陀永佩遺則塔樣峨峨我銘其上不幾點污林孔升居士旅菴銘二界旅泊賢愚共處吉凶係焉趨避取與爰有居士結菴以志占旅之易在九之四良哉至道惟嫌揀擇素位之思安往不適方竹拄杖銘內法於天外法於地以禮節之逢場作戲拄杖銘迷為彼用悟則用彼兩端忽超此公之旨其二山無高下水無淺深窮玄極奧資爾行吟碗銘虛而能受應量無咎飯食已訖勿存窠臼龕銘天地一龕一龕天地因堅固物置不休器死埋則同生埋則異生死一如離出入際跋寄浮法師手書華嚴跋寄師以親老不事遠遊甘隱法華山塢於織履之暇書此大經點畫從虛精孝思中流出故嚴謹之氣開卷挹人觀其軸終愈整使龍樹當時以上本品偈傳誦人間寄師見之或未以為繁耶昔子瞻謂顏魯公書雄秀獨出以其精神蓋有感於以死赴國之時也而寄師其嚴謹獨出者歟心海師數珠七翼跋一集春雨古澗流香究其所自費我商量提起數珠舉似亦易欲理其由與水何異座有耆宿胸自淵博尋流得源其書可讀嗟彼世人日用不知今也百八顆顆可思或顯或密深入理窟如雜寶叢無所不攝讀罷聯末雨歇花芳夢亦就醒枯木欲狂嚴印持居士日記卷跋記功論過凡有心者俱可能之至於無功之功無過之過俱不可能也今居士日記大半從本地證得所書師友法言如人飲水冷暖自信自信信人何過之有哉無過無功則孰曰中庸不可能也我故曰居士能之唐祈遠居士所蓄關虛白山水圖跋以見山忘道之説遂廢幽尋者此俗子也何足與語道嘗見袁石公有聽水無蕩思愛山無熱顏之詩何止深於山水亦能深於道矣余行腳時於山水不啻如頭目髓腦南嶽匡廬天目黃白台宕出入瓢囊者二十餘年然亦不費苦參而轉煩惱作清淨如明師如良友然邇來嘗以湖光溪色遠嶂平林指點向人以振西來祖意人往往曰吾因是而見道矣忘山矣我亦曰此俗子也何足與語山水今從江南雲門遷居間林寶壽山坐七十二峰樓上戲作趙州水法間以子瞻枯木竹石綴之至苦無知己忽祈遠居士以關子圖索題開卷三丈煙雲吐納不知其幾千萬里長江太湖石山曲折種種畢具兼讀後跋韻極可稱二絶遂書此於卷端請視諸知己我衲輩鮮知此者知此唯徑山雪嶠師耳雪師見此定當點頭曰此三絶也真歇了禪師碑尾跋物不速朽曰金與石金石匪堅以示靈宅靈之起伏人之賢愚得人則引失人則漓爰有禪士字曰虛量諱曰慧明能起塔樣塔既祝融銘亦丙丁遍告同志數年克成一字一句無損無益我為合掌以記時日省眉禪士書華嚴經請跋拈來皆是用去無疑無內無外孰能辨伊一微空處衆微若為譬如春至花敷枝枝一枝受暖萬木依依秋風葉落歸根何知人之履踐七通八達是大丈夫兩眼斯豁具大總持無所不攝嘗海一滴識全海味會全海波歸一滴義只在毫端變幻無際作如是想書經有地雜花榮榮菩薩寶髻髻中明珠書得也未嘉興府香萃菴等雄捐資一兩東塔浮璩祥符普聞選勝淨儀法華寂涵楞嚴海坤各五錢照內牲鑑各參錢普忍淨照各二錢五分紹興府天華寺智孝五錢
